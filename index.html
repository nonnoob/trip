*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}

.wrap{padding:14px 16px 8px}
.greet{font-size:12.5px;color:var(--muted);margin:0 4px 10px}
.hero{background:linear-gradient(135deg,var(--accent),#0b5c73);color:#fff;border-radius:20px;padding:18px 18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer}

.hero .meta{font-size:13px;opacity:.9;margin-top:10px}
.hero .go{margin-top:14px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600}
.hero .glow{position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.12)}

.cd{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:13px;padding:10px 14px;margin:12px 0 2px}

.docbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:10px 0 2px;background:var(--accent-soft);color:var(--accent-ink);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:13px;padding:12px;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer}
.block{margin:18px 0}
.block h3{font-size:15px;margin:0 0 9px;display:flex;align-items:center;gap:7px;font-weight:700}
.note{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:0 13px 13px 0;padding:11px 14px;font-size:13.5px;color:var(--ink);box-shadow:var(--shadow)}
.wx{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:11px 14px}

.lnum{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tl{position:relative;padding-left:4px}
.it{display:flex;gap:11px;padding-bottom:4px}

.it .rail{position:relative;width:14px;flex:0 0 auto}

.leaflet-container{font-family:inherit;background:var(--bg)}
</style>

const DETAIL={"sf":{"联合广场 Union Square":{"intro":"联合广场是旧金山市中心的心脏，一块被高楼、百货公司和老牌酒店围起来的开阔广场，中央立着一根纪念美西战争的胜利女神柱，棕榈树下永远有人坐着晒太阳、喂鸽子、听街头艺人弹唱。它的魅力不在于某个必看的景点，而在于它是整座城市的交通和购物枢纽：Macy's、Saks、Neiman Marcus 等大牌环伺，Powell 缆车总站就在广场西南角几步路外，往东南走几分钟就是你们这次的重头戏 SFMOMA，往西北穿过几条街便是唐人街龙门。对你们这趟行程来说，它的意义是一个完美的起点。周五中午到了旧金山、在 Union Square 一带的酒店放下行李后，先在附近随便吃个午饭垫垫肚子，然后就能从这里像扇形一样把第一天的行程铺开。广场本身逛十几分钟足矣，重点是利用它的地利。6 月的旧金山是雾季，中午时分这里通常已经放晴，阳光把白色的纪念柱照得发亮，但海风一来还是凉，所以外套别脱。周末又恰逢 Juneteenth 假日，市中心比平时更热闹，街头表演、临时摊位都会更多，氛围很市井也很有活力。提醒一句，这一带是游客密集区，扒手和兜售也多，背包往前背、手机别放后裤兜。广场地下还有停车场，但你们这趟主要靠步行加缆车，用不太上。把它当成一个定调子的地方：站在棕榈树下，看看四周的老建筑和缆车叮叮当当爬坡的样子，旧金山的感觉一下子就来了，然后元气满满地走向 SFMOMA。","traps":["中午到先在 Union Square 附近吃午饭垫肚子，但别在广场正对的旅游餐厅吃，价高三四成，往唐人街方向走几步更划算","这一带扒手多、兜售多，背包往前背、手机别放后裤兜，尤其人群聚集看街头表演时","广场本身十几分钟就够，别在这里耗太久，把时间留给步行几分钟就到的 SFMOMA","周末假日市中心更挤、停车更紧，这趟靠步行加缆车，别开车进来","想买大牌的话周边百货退税和折扣码可以提前查，但行程紧就别为购物耽误景点节奏"],"info":[["门票","免费开放，全天可逛"],["建议时长","约 15 至 30 分钟，主要作为起点和中转"],["最佳时段","周五中午到达后，放行李吃午饭即来，正好放晴"],["到达/交通","Powell 缆车总站旁，SFMOMA 步行约 5 分钟，多条 Muni 与 BART 在 Powell St 站"]]},"SFMOMA 现代艺术馆":{"intro":"SFMOMA 是这趟旧金山行程的重头戏，也是整个西海岸规模最大的现代与当代艺术博物馆，七层楼把二十世纪至今的艺术脉络铺得明明白白：你能看到 Calder 的活动雕塑在空中缓缓转动，Warhol 的波普丝网版画、Rothko 大块色域的沉静、Diebenkorn 的加州光线，还有草间弥生的圆点与镜屋，以及大量摄影和当代装置。建筑本身就值得一看，2016 年扩建后的白色波浪形外立面在阳光下像被海雾雕过，馆内最有名的是那面三层楼高、种了近两万株植物的垂直绿植墙，站在露台上喝杯咖啡看这面活的墙，是旧金山式的惬意。把它安排在周五下午是这趟行程最关键的一招，原因很实在：SFMOMA 周三闭馆，周五和周六都是下午五点关门，没有那种周四的夜场，所以中午到、酒店放完行李后第一时间来这里，预留约两小时从容看完，再赶在五点前出来往北去坐缆车，节奏刚刚好。逛法上建议别贪多，先拿一份楼层图，挑两三层自己真正感兴趣的重点看，比如七层的当代、四五层的战后与摄影，其余快速扫过，否则七层楼走下来腿会先投降。馆内有几处餐饮和咖啡，看累了可以歇脚，但你们午饭已在 Union Square 解决，这里点杯东西坐坐即可。6 月雾季的下午，室内恰好避开外头的灰冷海风，是个温暖又有内容的去处。门票约三十美元一位，十八岁及以下免费，具体以官网为准，旺季周末人会多，提前在 tickets.sfmoma.org 上买好时段票能省去排队。看现代艺术不必端着，挑你看得进去的停下来多待一会，看不懂的笑笑走过也无妨，这才是逛美术馆该有的轻松。","traps":["务必排在周五下午来，因为周三闭馆且周五周六都是 5 点关门，没有夜场，错过就只能挤周六","提前在 tickets.sfmoma.org 买好时段票，旺季周末现场排队买票费时间","七层楼别每层都细看，挑两三层重点逛，否则两小时根本不够还累腿","18 岁及以下免费，带证件可省票钱；成人票约 30 美元以官网为准","午饭在 Union Square 解决，馆内餐饮当歇脚喝咖啡用即可，不必在此正餐"],"info":[["门票","约 30 美元一位，18 岁及以下免费，以 tickets.sfmoma.org 为准"],["建议时长","约 2 小时，挑重点楼层"],["最佳时段","周五下午，赶 5 点关门前最从容"],["到达/交通","Union Square 步行约 5 分钟，151 Third St"]]},"唐人街龙门 Dragon Gate":{"intro":"旧金山唐人街是全美历史最悠久、也是北美最大的唐人街之一，而龙门 Dragon Gate 就是它气派的正门，立在 Grant Avenue 与 Bush Street 交叉口。这座绿瓦飞檐、石狮镇守的牌坊是 1970 年由台湾捐赠的，梁上写着孙中山的天下为公，过了这道门就算正式踏进唐人街了。从龙门往北沿着 Grant Ave 一路走，是最经典的逛法：街道两旁挂满红灯笼，药材铺飘着当归和陈皮的味道，纪念品店堆着丝绸睡衣、招财猫和功夫拖鞋，中餐馆、烧腊店、凉茶铺一家挨一家，空气里是叉烧和炸物的香气。这里不只是给游客看的布景，旁边的 Stockton Street 才是本地华人真正买菜、办年货的生活动脉，鱼摊菜摊人声鼎沸，烟火气十足，有兴趣可以拐过去感受一下。放进你们第一天的行程里，它正好是个顺路的过场：从 SFMOMA 出来往西北走，穿过龙门快逛一段 Grant Ave，拍拍牌坊和灯笼，顺手买点心垫垫，然后继续往北接回市中心去坐缆车。时间上别安排太久，半小时到四十分钟边走边逛拍照足够，因为后面缆车排队和渔人码头都要时间。如果嘴馋，唐人街的点心很值得带一份在路上吃：Good Mong Kok 在 Stockton St 1039 号，烧卖、叉烧包、蛋挞便宜又地道，基本是外带窗口、现金优先，排队也快；想坐下来喝茶吃点心也有不少老馆子。提醒一下，这一带街道窄、坡也多，人多的时候顾好随身物品；6 月傍晚这里背阴又起风，会比市中心更凉一些，外套穿着。逛唐人街的乐趣在于那种时空交错感：出了门是美式高楼，进了门是另一个世界，短短几条街就走完一段华人移民百年的故事。","traps":["半小时到四十分钟足够，别逛太久，后面缆车排队和渔人码头都要留时间","想吃点心去 Stockton St 的 Good Mong Kok 买外带，便宜地道、现金优先、排队快","纪念品店东西大同小异且偏贵，别冲动买，真想买货比三家","Grant Ave 是游客主街，想看真实华人生活拐去平行的 Stockton St 菜市场","街窄坡多人也多，顾好随身物品；傍晚背阴起风会更凉，外套穿着"],"info":[["门票","免费，街区随意逛"],["建议时长","约 30 至 40 分钟，边走边逛"],["最佳时段","周五下午从 SFMOMA 出来顺路，傍晚前快逛"],["到达/交通","龙门在 Grant Ave 与 Bush St 口，SFMOMA 步行约 10 分钟"]]},"Powell 缆车总站":{"intro":"旧金山的叮叮车 Cable Car 是全世界唯一仍在运营的人力抓缆爬坡缆车系统，从 1873 年用到今天，被列为国家历史地标，坐一趟不只是交通，更是活着的古董体验。Powell Street Turnaround 就在 Powell 与 Market 街口、Union Square 旁边，是 Powell-Hyde 和 Powell-Mason 两条线的南端总站，也是一个本身就值得看的景点：这里没有自动转盘，缆车到站后，工人要亲手把整辆车推上一个圆形木质转盘、合力转个方向再推回轨道，几个人喊着号子推车掉头的画面，围观的人总是里三层外三层。缆车没有发动机，全靠车底一个抓手钳住地下持续转动的钢缆带动，司机喊 grip 拉杆的就是抓缆，叮叮的铃声也是这么来的。放进你们第一天，从唐人街逛完往回走到这里，坐最经典的 Powell-Hyde 线往北，它会一路翻过几座陡坡、经过九曲花街的坡顶，最后下到 Hyde 街尽头的渔人码头一带，沿途从车窗探头看海湾和层叠房子的视角极好，站在车外踏板上手抓立柱、迎着风往下坡冲那一下，是旧金山最经典的画面。要有心理准备的是排队：周五下午这个总站排队往往要三十到六十分钟，假日周末更甚，所以要么趁早来排，要么错峰，实在不想等也可以走两个街区到沿线的中途站点上车，人会少很多但不保证有空位。车票现场单程约八美元，或者买 Muni 日票约十三点七五美元含缆车，用手机上的 MuniMobile App 提前买好最省事。坐缆车记得抓稳，过弯和上下坡晃得厉害，想拍那种探身车外的照片务必一手抓牢。这趟车把交通、观光和怀旧揉在一起，值得为它排一次队。","traps":["周五下午总站排队 30 到 60 分钟，假日周末更长，趁早来或错峰，实在赶时间走两个街区到中途站上车","提前用 MuniMobile App 买票，单程约 8 美元或 Muni 日票约 13.75 美元含缆车，免得现场买票又排一次","坐 Powell-Hyde 线而非 Powell-Mason，前者经九曲花街坡顶直下渔人码头，风景最经典","想拍探身车外的经典照，务必一手死死抓牢立柱，过弯上下坡晃得厉害","看工人手动推车掉头本身就是一景，排队时正好在转盘边看，别只顾刷手机"],"info":[["门票","单程约 8 美元，或 Muni 日票约 13.75 美元含缆车，用 MuniMobile App 购票"],["建议时长","排队加乘车约 40 至 80 分钟"],["最佳时段","周五下午尽量早排或错峰，避开队伍最长的时段"],["到达/交通","总站在 Powell St 与 Market St 口，唐人街步行约 10 分钟"]]},"九曲花街 Lombard St":{"intro":"九曲花街是旧金山最上镜的街道之一，官方名字叫 Lombard Street，但真正出名的只是 Russian Hill 上那短短一段：在原本陡得几乎无法直接行车的斜坡上，工程师用八个连续的急转弯把车道盘成一条之字形，弯道之间和两侧种满了花草，以绣球花为主，夏天还有玫瑰点缀，红砖铺的路面在花丛中蜿蜒而下，被称为世界上最弯曲的街道。6 月正是绣球盛开的时候，蓝紫和粉白的花球一团团把弯道夹在中间，配上背后的科伊特塔和海湾，画面饱满得像明信片。逛法很简单也很关键：坐 Powell-Hyde 缆车在 Hyde 与 Lombard 交叉口下车，这里正好是花街的坡顶，从上往下俯拍那条蜿蜒的弯道加远处海湾的经典构图最好看，所以重点是站在坡顶往下取景，而不是走到坡底仰拍。你们也可以沿着两侧的人行台阶慢慢走下去，边走边从不同角度拍花和弯道，走到底是 Leavenworth 街。这条街仍是住宅区，弯道里还真有车排队一辆辆慢慢开下来给游客让出了拍照的前景，但两旁都是民居，记得别踩进人家花圃、别大声喧哗。放进第一天的节奏里，它紧跟在缆车之后：下了 Powell-Hyde 线在坡顶拍够，再顺势往下走，正好离 The Buena Vista 和渔人码头不远，一路下坡接着走。提醒几点：坡很陡，穿好走路的鞋；这一带是热门点，人多，拍俯视图要稍微等没人入镜的空档；6 月傍晚起风又凉，花拍完别久留；另外这里没什么遮挡，放晴时阳光好，但雾一上来弯道也会显得灰扑扑，所以尽量趁天还亮、还没起雾时拍。花街不大，连拍带走二三十分钟就够，但那条盘旋的花径配上海湾，是旧金山最值得按快门的角落之一。","traps":["在 Hyde 与 Lombard 口的坡顶下缆车，从上往下俯拍弯道加海湾最经典，别跑到坡底仰拍","这是住宅区，别踩进民居花圃、别大声喧哗，弯道里有车在开注意安全","坡很陡，务必穿好走路的鞋，沿侧边台阶慢慢走下去边走边拍","热门点人多，拍干净的俯视图要等没人入镜的空档，有点耐心","趁天亮没起雾时拍，6 月傍晚雾一上来弯道会灰扑扑，拍完别久留，海风凉"],"info":[["门票","免费，街道开放"],["建议时长","约 20 至 30 分钟，拍照加步行下坡"],["最佳时段","周五傍晚下缆车后，趁天亮未起雾"],["到达/交通","Powell-Hyde 缆车在 Hyde 与 Lombard 口下，即坡顶"]]},"The Buena Vista":{"intro":"The Buena Vista 是旧金山一家有故事的老咖啡馆兼酒吧，就坐落在 Hyde 街缆车终点旁、面朝海湾的转角上，从 1916 年开到现在。它真正的传奇身份是把爱尔兰咖啡引进美国的地方：1952 年，店主和一位旅行作家合力，照着爱尔兰香农机场的配方反复试验，终于在这里调出了北美第一杯爱尔兰咖啡，从此风靡全国。所以来这儿，招牌就是一杯爱尔兰咖啡，做法很有看头：吧台师傅一字排开十几只耐热玻璃杯，先放方糖、冲入热咖啡和爱尔兰威士忌搅匀，再用勺背贴着杯口把现打的厚奶油轻轻浮在最上层，一整排同时操作行云流水，本身就是一场表演。喝的时候不搅拌，让温热微苦带酒香的咖啡穿过顶上那层冰凉绵密的奶油入口，层次刚刚好，6 月雾季傍晚海风一吹，捧着这么一杯下肚，从喉咙暖到胃里，是再贴切不过的体验。放进你们第一天的动线里，它简直是为这一刻准备的：从九曲花街顺坡走下来就到 Hyde 街缆车终点，旁边就是它，进去点杯爱尔兰咖啡歇歇脚、暖暖身，再继续往渔人码头走。店里是老派酒馆的样子，木色调、人声鼎沸，常常满座，尤其傍晚和周末更挤，可能要在吧台边站着等位，但流转挺快，等一会儿就有。这里不是讲究安静的咖啡馆，而是热闹亲切的老地方，和陌生人挤在吧台边碰杯聊天也是乐趣的一部分。提醒一下，爱尔兰咖啡含威士忌，点的话会查证件，不喝酒也有普通咖啡和简餐；一杯爱尔兰咖啡价格约十几美元，招牌就喝这个，别的可不必多点。把它当成第一天傍晚的一个温暖停顿，喝完这杯，带着暖意走向海边收尾。","traps":["招牌就点爱尔兰咖啡，看吧台师傅一排杯子同时打奶油本身就是表演，别点别的浪费","喝的时候别搅拌，让热咖啡穿过顶上冰凉奶油入口才是正确喝法","傍晚和周末常满座，可能要在吧台边站着等，但流转快等一会就有","含威士忌会查证件带好，不喝酒的有普通咖啡和简餐","就在 Hyde 街缆车终点旁，从九曲花街走下来顺路，喝完接着走去渔人码头"],"info":[["人均","一杯爱尔兰咖啡约 12 至 15 美元"],["招牌","爱尔兰咖啡，全美第一杯诞生于此"],["是否订位","不接受订位，直接到吧台等位，流转快"],["营业","约每日上午至深夜，以现场为准"]]},"机械博物馆":{"intro":"机械博物馆 Musée Mécanique 是渔人码头一带最有意思也最容易被错过的宝藏，藏在 Pier 45 的一间大库房里，免费入场，里面塞满了三百多台从十九世纪末到二十世纪中叶的投币式古董游艺机，是全世界最大的私人收藏之一。这里不是那种隔着玻璃看的博物馆，而是几乎每一台机器都还能投币玩：你揣一把 quarter 进去，就能让会跳舞的西部小人动起来、让算命机吐出一张命运卡片、玩老式弹珠台和拳力测试机、看微缩的游乐场和马戏团模型转起灯来，还有那台标志性的、笑得有点瘆人的胖女人 Laffing Sal，投币后会发出魔性的大笑。从最古老的手摇活动西洋镜，到二十世纪中期的机械臂抓物、早期街机，一台台亲手玩下来，像穿越了一整部投币娱乐史，大人重温童年、小孩玩得不亦乐乎，真正老少咸宜。它的另一个好处是开到晚上八点，而且是室内，所以特别适合 6 月雾季傍晚海风又起的时候来避寒消磨一会儿。放进你们第一天的尾段刚刚好：从 The Buena Vista 喝完爱尔兰咖啡往码头走，先拐进这里玩一圈，再出来去看 Pier 39 的海狮、然后吃晚饭，室内室外冷暖交替，节奏很舒服。实用提示：虽然免费进门，但玩机器要投币，记得提前备好一些 quarter，门口和附近一般有换币机，但高峰期可能要排；每台机器投币额从几个 quarter 到一两美元不等，玩个十来台也就几美元，花得很值；场地不大但东西密，逛玩半小时到四十分钟正合适。这里没有讲解、没有路线，就是随便逛、随手玩，带着一种旧时游乐场的市井欢乐，是这趟行程里轻松又有惊喜的一站。","traps":["免费进门但玩机器要投币，提前备好一把 quarter，门口换币机高峰期会排队","开到晚 8 点又是室内，正好当傍晚海风起时的避寒消磨点","场地不大东西密，逛玩半小时到四十分钟足够，别误以为要很久","紧跟 Buena Vista 之后、去看海狮之前拐进来，室内外冷暖交替节奏舒服","每台投币几个 quarter 到一两美元，玩十来台才几美元，放开玩很值"],"info":[["门票","免费入场，玩机器自备 quarter 投币"],["建议时长","约 30 至 40 分钟"],["最佳时段","周五傍晚海风起时，室内避寒，开到晚 8 点"],["到达/交通","Pier 45，从 Buena Vista 步行可达，渔人码头核心区"]]},"渔人码头 · Pier 39":{"intro":"渔人码头 Fisherman's Wharf 是旧金山最热闹的滨海游客区，而 Pier 39 是其中最核心的一座栈桥，从一片旧码头改造成了商店、餐厅、街头表演和海景观景台集于一体的木栈道乐园。它最招牌、也最免费的明星是 K-Dock 浮码头上的那群加州海狮：自 1989 年地震后，成百上千头海狮莫名其妙地占领了这里的浮台，从此赖着不走，一年四季都能免费看，它们挤成一团晒太阳、互相推搡争地盘、吼叫翻滚、扑通跳水，憨态可掬又吵闹得可爱，看上半小时都不腻，是孩子和大人都喜欢的免费秀。除了海狮，栈桥上还有双层旋转木马、街头杂耍艺人、海湾全景视野，天气好时能远眺金门大桥、海湾大桥和恶魔岛 Alcatraz 的轮廓。整片渔人码头沿岸都能散步，海风咸咸的，海鸥盘旋，叫卖声此起彼伏，虽然商业化、游客多，但那份热闹本身就是体验的一部分。放进你们第一天的收尾段：从机械博物馆出来沿码头走过来看海狮、逛逛栈桥、看看海景，正好接着在这儿吃晚饭收官，海边的夜色和灯火给第一天画个圆满句号。吃的方面，码头上著名的有 Boudin Bakery 的酸面包蛤蜊浓汤，把汤盛在挖空的圆面包里，是旧金山的招牌小吃，值得尝一份；不过要提醒，渔人码头一带的餐厅普遍偏贵、偏游客向，正经吃饭性价比不如 Mission 或唐人街，所以你们把第一天的正式晚餐订在了 Crab House 这种点对了，其余小吃点到为止即可。几点实用提示：这里是扒手和兜售活跃的区域，顾好随身物品，街头要钱的表演者拍照后可能伸手讨小费，心里有数；6 月傍晚海边格外冷且风大，外套帽子围巾全用得上；假日周末人尤其多，逛的时候随大流别赶。把它当成轻松的滨海漫步加免费动物秀，看够海狮、吹够海风，就去赴蟹宴。","traps":["看 K-Dock 海狮全程免费，别被附近收费观景或表演忽悠掏钱","码头餐厅普遍贵且游客向，正餐已订 Crab House 是对的，其余只点 Boudin 酸面包蛤蜊汤等小吃尝鲜","扒手和兜售活跃，顾好随身物品，街头表演拍照后可能讨小费，心里有数","6 月傍晚海边格外冷风大，外套帽子围巾全戴上","假日周末人极多，随大流慢慢逛别赶，看够海狮吹够风就去吃晚饭"],"info":[["门票","免费，看海狮和逛栈桥不收费"],["建议时长","约 45 分钟至 1 小时"],["最佳时段","周五傍晚，接机械博物馆后，看海狮加海景再吃晚饭"],["到达/交通","Pier 39，Powell-Hyde 缆车终点步行可达"]]},"Crab House 晚餐":{"intro":"Crab House at Pier 39 是你们第一天压轴的正式晚餐，一家开在渔人码头 Pier 39 二层、专做螃蟹的老牌海鲜餐厅，坐拥海湾景的位置，窗外就是停泊的渔船和远处的海湾大桥。它的招牌是那道整只蒜香烤蟹 whole roasted crab，用秘制的大量蒜蓉黄油裹住一整只邓杰内斯蟹 Dungeness crab 下烤箱，端上来时蒜香扑鼻、蟹壳焦香、肉质饱满多汁，配着蒜油和面包，是很多人专程为它而来的一道菜，点它基本不会错。除了招牌烤蟹，这里的蒜香大虾、蛤蜊、生蚝、海鲜意面和各式现捞海鲜也都不错，适合两个人点一只蟹加一两样配菜分着吃，边吃边看海。把它放在第一天傍晚的终点很合适：看完 Pier 39 的海狮、吹够海风，正好就近上楼坐下，用一顿热腾腾的蟹宴给奔波的第一天收尾，从机场到 SFMOMA 再到缆车一路下来，这顿饭吃得踏实又有仪式感。最关键的一条提醒：这家店周五晚上非常满，尤其碰上 Juneteenth 假日周末，务必提前订位，用 OpenTable 或直接打电话订，订一个靠窗能看海的位子更好；不订位的话现场等位可能很久，白白耗掉看海狮和散步的好时光。价格上，邓杰内斯蟹按时价算，一只整蟹加配菜两人吃下来人均大约五六十美元甚至更多，属于这趟的一次小奢侈，但来都来了、又是招牌，值得。几个小贴士：吃整蟹会弄脏手，店家会给围兜和工具，放开吃别拘谨；蟹是按只或按磅卖的，点单前问清份量和时价免得超预算；海鲜讲究新鲜，趁热吃口感最好。把这顿当成第一天的犒赏，蒜香烤蟹配海景夜色，旧金山的滨海风情就齐活了。","traps":["周五晚很满又逢假日周末，务必提前用 OpenTable 或电话订位，订靠窗看海的位子","招牌整只蒜香烤蟹必点，两人一只蟹加一两样配菜分着吃刚好","邓杰内斯蟹按时价或按磅卖，点单前问清份量和价格免得超预算","吃整蟹弄脏手很正常，店家给围兜和工具，放开吃别拘谨","就在 Pier 39 二层，看完海狮顺势上楼，别跑远，趁热吃海鲜口感最好"],"info":[["人均","约 50 至 70 美元，蟹按时价"],["招牌","整只蒜香烤蟹 whole roasted crab"],["是否订位","务必提前订，OpenTable 或电话，周五晚很满"],["营业","约每日午餐至晚间，以现场为准"]]},"金门大桥":{"intro":"金门大桥 Golden Gate Bridge 是旧金山乃至整个美国最具标志性的地标，一座横跨金门海峡、连接旧金山与北边马林郡的橙红色巨型悬索桥，1937 年建成时是世界上最长的悬索桥，那抹被称为国际橙的独特颜色，既在灰蓝的海天间醒目，又能在常年雾气里被看见。站在桥下或桥上，看那两座高耸的桥塔和钢索撑起近三公里的桥身，海风呼啸、海面渔船穿行，那种工程的壮美和自然的辽阔扑面而来，是亲眼看了才懂为什么它是无数电影和明信片的主角。拍它的经典机位有讲究：最出片的是桥北端马林一侧的 Battery Spencer，这是个废弃的海岸炮台高地，免费、不用预约，从这里居高临下能把整座桥连同身后的旧金山城市天际线一起框进画面，几乎是金门大桥最经典的构图；南岸这边则有 Welcome Center 游客中心、Fort Point 桥脚仰视点等多个角度。放进你们第二天上午很合适，但有一条必须提前有心理准备：6 月的清晨，海雾常常把整座桥吞掉，只露出红色桥塔尖在云海上若隐若现，虽然这种雾中金门别有一种仙气，但想拍清楚整桥，得等上午雾散、通常临近中午放晴时最稳，所以这一站别太早赶，看天气灵活安排。交通上强烈建议直接打 Uber 或 Lyft 去，因为桥边停车位极少又难找，假日周末更是一位难求，打车直接送到机位省心太多；去 Battery Spencer 要过桥到马林那侧，导航设好点位即可。其他提示：桥上和高地风极大、体感很冷，务必穿防风外套、戴帽子，围巾别让风刮跑；桥很长，若想步行上桥走一段感受一下，来回要留足时间和体力，光看和拍照则二三十分钟到一小时按兴趣定；海峡风大，拿稳手机和帽子。把这一站当成第二天的震撼开场，橙红巨桥配海雾city，旧金山最经典的一眼就在这里。","traps":["6 月清晨常起雾把桥吃掉，想拍清楚整桥别太早，等上午雾散近中午放晴最稳","直接打 Uber 或 Lyft 去，桥边停车极少又难，假日周末一位难求，别自驾找车位","最经典机位是桥北马林侧的 Battery Spencer，免费不用预约，居高临下框整桥加城市天际线","桥上和高地风极大体感冷，防风外套帽子围巾全戴上，拿稳手机别被风刮跑","想步行上桥走一段要留足时间体力，只看和拍照二三十分钟到一小时即可"],"info":[["门票","免费，行人观景不收费，机动车过桥南向收费"],["建议时长","约 30 分钟至 1 小时，看拍照还是步行而定"],["最佳时段","周六上午雾散后近中午放晴时最易拍清楚"],["到达/交通","打车前往，经典机位 Battery Spencer 在马林一侧，导航设点"]]},"Warming Hut":{"intro":"Warming Hut 是金门大桥脚下一处温馨的小据点，坐落在 Crissy Field 海滨绿地最西端、靠近 Fort Point 的位置，是国家公园管理处下属的一间小咖啡馆兼书店礼品屋。它本身不是什么宏大景点，妙在地理位置和那份恰到好处的暖意：这里几乎就在金门大桥的正下方一侧，推门进去是热咖啡、热可可、简单的三明治和点心，还卖些环保主题的书籍、明信片和有设计感的小纪念品，买杯热饮捧在手里，出门沿着海湾步道往大桥方向走一走，头顶就是那座橙红巨桥的钢索和桥身，脚下是拍着礁石的海浪，视角和氛围都很特别。它的名字直译就是取暖小屋，放在 6 月旧金山的雾季语境里再贴切不过：金门大桥这一带是全城最冷、海风最猛的地方，清晨和上午又常常湿冷起雾，这时候有这么一个能进去暖手、喝口热的的小店，简直是雪中送炭。放进你们第二天上午的动线刚刚好：在 Battery Spencer 或南岸拍完金门大桥后，过来这边买杯热饮，沿着 Crissy Field 的海边步道散散步、从桥脚的角度再看几眼大桥和海湾，把上午的金门大桥这一段从容收尾，然后再前往金门公园里的加州科学馆吃午饭。Crissy Field 这片绿地本身也很舒服，本地人遛狗、跑步、放风筝，草坪连着沙滩，能远眺对岸和恶魔岛，适合慢慢走一段。实用提示：这里同样风大体感冷，热饮和外套都用得上；停车位有限，建议延续打车的安排或就近停；小店和步道二三十分钟到四十分钟足矣，重点是那种桥下海边喝热饮散步的惬意，不必久留；营业时间一般是白天，具体以现场为准。把它当成金门大桥的温柔续集：看够了宏大的桥，再用一杯热可可和一段海边漫步，把这段记忆焐热。","traps":["金门大桥脚下风大体感冷，正好进来买杯热饮暖手，外套别脱","紧接金门大桥拍照后过来，沿 Crissy Field 海边步道从桥脚再看几眼大桥，从容收尾","小店加散步二三十分钟到四十分钟足够，重点是惬意不必久留","停车位有限，延续打车安排或就近停，别为找车位耗时间","营业一般是白天，具体以现场为准，去之前可留意时间别扑空"],"info":[["门票","免费，咖啡饮品和纪念品另付费"],["建议时长","约 30 至 40 分钟，含海边步道"],["最佳时段","周六上午看完金门大桥后顺势前来"],["到达/交通","Crissy Field 西端近 Fort Point，建议打车或就近停车"]]},"加州科学馆":{"intro":"加州科学馆 California Academy of Sciences 是金门公园里一座四合一的超级自然博物馆，把雨林、水族馆、天文馆和活体植物屋顶集于一栋绿色建筑之中，是全世界少有的同时拥有这四样的自然科学中心，室内一整套逛下来内容极其丰富，无论大人小孩都能玩上大半天。核心看点首先是那座四层楼高的玻璃球形雨林穹顶，走进去湿热扑面，蝴蝶在身边飞、鸟在头顶叫，沿螺旋坡道一路向上穿过亚马逊、马达加斯加等不同生态层；穹顶之下连着水族馆，有色彩斑斓的珊瑚礁缸、会发光的水母、企鹅、还能伸手触摸的潮间带触摸池；另一侧是天文馆 Morrison Planetarium，在巨大的半球幕下躺着看一场关于宇宙的沉浸影片，是很多人最难忘的一项；此外还有经典的非洲厅标本、白化短吻鳄、地震模拟屋等等。建筑顶上那片波浪起伏、种满本地植物的活体绿色屋顶也很有名，体现了它的环保设计理念。把它放进你们第二天的中段非常聪明：6 月旧金山雾季，中午前后若海边湿冷起雾，正好钻进这座室内场馆避寒，而且馆内就有餐厅可以解决午饭，不用为吃饭折返，一站把午间时光安排得满满当当又舒舒服服。逛法上建议进门先看好天文馆的场次时间，因为它要排队定时入场，先把这一项的时间卡住，再穿插去逛雨林和水族馆，避免错过。门票不便宜，约四十九到五十五美元一位，暑期和假日周末是旺季价会更贵，务必以官网 calacademy.org 为准，提前网上购票还能选时段、避开现场排队。开放时间一般是周一到周六上午九点半到下午五点，最后入场约四点，周日时间可能不同，你们周六来正合适。其他提示：馆内冷气足而外头雾天也凉，薄外套穿着；赶上假日周末人多，雨林穹顶和天文馆都可能排队，有点耐心、错峰逛；带小孩的话触摸池和企鹅区一定别错过。把它当成第二天充实的室内核心，看完雨林海洋星空，再带着满足出门去逛唱片行。","traps":["进门先查天文馆场次时间并尽早占位，它定时入场要排队，别逛到最后才发现错过","门票约 49 到 55 美元，暑期假日旺季更贵，提前在 calacademy.org 网购选时段、避现场排队","午饭直接在馆内餐厅解决，不用折返，把雾天的中午全安排在室内","馆内冷气足、雾天也凉，薄外套穿着；假日周末雨林和天文馆排队，错峰逛","带小孩别错过触摸池和企鹅区，周六开放约 9:30 到 17:00 末次入场约 16:00"],"info":[["门票","约 49 至 55 美元一位，旺季更贵，以 calacademy.org 为准"],["建议时长","约 2.5 至 3 小时，含午饭"],["最佳时段","周六中午，雾天避寒兼解决午饭"],["到达/交通","金门公园内，de Young 美术馆正对面，打车或公交前往"]]},"Amoeba Music":{"intro":"Amoeba Music 是 Haight Street 上一家巨型独立唱片行，常被乐迷称作世界上最大的独立唱片店之一，门面就开在传奇的 Haight-Ashbury 嬉皮街区里，免费进，是音乐爱好者来旧金山几乎必逛的一站。一推门进去，豁然开朗的大空间里一排排货架望不到头，黑胶唱片、CD、卡带、DVD、蓝光、音乐周边和海报应有尽有，从摇滚、爵士、嘻哈、电子到古典、世界音乐、原声带分门别类，新品和二手混陈，尤其二手黑胶区是淘宝的乐园，运气好能挖到绝版好货或便宜到几美元的宝贝。这里不只是卖货，更像一座音乐的活博物馆和社区据点：墙上贴满演出海报和签名，常有乐队来店里办小型现场演出和签售，店员个个是行家，随便聊两句就能给你推荐；那种在实体店里一张张翻唱片、读封套、戴上试听耳机的体验，是流媒体时代越来越稀罕的乐趣。把它放进你们第二天下午很顺：从金门公园的加州科学馆出来，Haight 街就在公园东边不远，过来逛唱片行，顺便就把 Haight-Ashbury 这片上世纪六十年代嬉皮文化发源地的老街区一起逛了。这一带街上满是复古二手服装店、个性小店、涂鸦和街头气息，曾是 1967 年爱之夏和迷幻摇滚的中心，Grateful Dead 等乐队都在附近住过，如今依旧保留着不羁随性的氛围，边走边看很有味道。逛法上，不爱唱片的也能进去感受那个氛围、买张海报或明信片当纪念；爱音乐的则可以多留点时间慢慢淘，但别一头扎进去忘了时间，毕竟下午还有彩绘女士和多洛雷斯公园要赶。实用提示：买黑胶要扛回家注意行李，这趟是坐火车回，别买太重太多；二手区淘货凭眼缘和运气，看清碟面成色；店里和街区都比较随性，顾好随身物品即可；6 月午后这边相对没那么冷，但风衣还是带着。把它当成第二天下午轻松又有腔调的一站，在一墙墙唱片和嬉皮街景里，感受旧金山的另一种文化底色。","traps":["不爱唱片也能进去感受氛围、买张海报明信片当纪念，免费进不亏","爱淘的别一头扎进去忘了时间，下午还有彩绘女士和多洛雷斯公园要赶","买黑胶要扛着且这趟坐火车回，别买太重太多，二手碟看清碟面成色","顺便逛 Haight-Ashbury 嬉皮老街区，复古二手店和涂鸦街景很有味道","街区随性顾好随身物品，6 月午后这边没那么冷但风衣带着"],"info":[["门票","免费进店"],["建议时长","约 45 分钟至 1 小时，含逛 Haight 街区"],["最佳时段","周六下午，接加州科学馆之后"],["到达/交通","Haight St 1855 号，金门公园东侧不远，打车或步行"]]},"彩绘女士 Painted Ladies":{"intro":"彩绘女士 Painted Ladies 是旧金山最上镜的免费拍照点之一，指的是 Alamo Square 公园东侧那一排紧挨着的维多利亚式与爱德华式排屋，六七栋外墙漆成柔和的彩色、屋檐窗框描着精致线脚，一字排开，像一排穿着粉彩裙装的淑女，这也是彩绘女士这个名字的由来。它们之所以家喻户晓，很大程度因为是美剧 Full House 全家福片头里那排房子的取景地，无数人专程为这个画面而来。真正让这个点封神的是构图：从西边斜坡上的 Alamo Square 公园草坪望过去，前景是这排古典彩色排屋，而它们身后正好框着旧金山现代都市的摩天天际线，一新一旧、一矮一高同框，把这座城市的历史与现在浓缩在一个画面里，被称为旧金山最经典的明信片视角。放进你们第二天下午很顺路：从 Haight 街的 Amoeba 出来往东不远就是 Alamo Square，过来在公园草坪上找好角度拍这排房子加天际线，顺便在公园里坐坐。这座公园本身就在一个小山丘上，绿草如茵，本地人遛狗、野餐、晒太阳，登高还能眺望四周街区，氛围悠闲。逛法很简单：重点是走到公园西侧偏高的草坡上，从那里取彩绘女士加远处天际线的经典构图，光线上午后到黄昏前都不错，天气好时蓝天彩屋格外清爽。拍照加在公园歇脚，二三十分钟足矣。实用提示：这是热门打卡点，常有游客和拍照的人，想要干净画面要稍微等空档或换角度；那排房子都是私人住宅，只能在公园和人行道这侧远观拍照，别去敲门或闯入院子；公园是斜坡草地，坐下野餐很舒服但要注意别弄脏衣物；6 月午后到傍晚海风又会转凉，外套备着。把它当成第二天下午一个轻松愉快的拍照停顿，在草坡上对着那排彩色房子和城市天际线按下快门，旧金山的经典一景就收进相机了。","traps":["走到公园西侧偏高的草坡上取景，才能拍到彩绘女士加远处天际线的经典构图","热门打卡点人多，想要干净画面稍等空档或换角度，有点耐心","那排房子是私人住宅，只能在公园和人行道远观拍照，别闯院子敲门","公园斜坡草地坐着野餐舒服，但注意别弄脏衣物，6 月午后转凉外套备着","从 Amoeba 出来往东不远即到，拍照加歇脚二三十分钟足够"],"info":[["门票","免费，公园开放"],["建议时长","约 20 至 30 分钟"],["最佳时段","周六午后到黄昏前，光线和天色俱佳"],["到达/交通","Alamo Square 公园东侧，Amoeba 步行或短打车可达"]]},"多洛雷斯公园":{"intro":"多洛雷斯公园 Dolores Park 是旧金山 Mission 区一片极受欢迎的网红草坪公园，坐落在一面朝东的缓坡上，被本地人称为全城最好的晒太阳和野餐去处，尤其一到周末天气好的午后到傍晚，整片草坡上密密麻麻坐满了人，铺着野餐垫、带着零食饮料、晒太阳聊天弹琴，气氛松弛又热烈，是感受旧金山本地生活方式最生动的一个窗口。它的地理优势得天独厚：公园在 Mission 这一侧地势较高的坡上，从草坪望出去，前景是棕榈树和起伏的绿坡，远处正对着旧金山的城市天际线，黄昏时分夕阳把高楼染成金色，坡上的人群剪影、城市轮廓和暖色的天空叠在一起，是非常治愈的旧金山黄昏画面。而且这里所在的 Mission 区是全城最少雾、最暖和、最常晒得到太阳的区域之一，即便别处灰冷起雾，这边往往还是阳光明媚，所以特别适合放在傍晚来收尾。把它安排在你们第二天傍晚的压轴很对路：逛完彩绘女士后来到 Mission，在 Dolores Park 的草坡上找块地坐下，看本地人野餐的热闹、等一场城市天际线的黄昏，把忙碌的第二天慢下来、软着陆，然后就近在 Mission 一带吃晚饭。玩法很简单，就是入乡随俗：买点饮料零食，在草坡上挑个朝向城市天际线的位置坐下，慢慢消磨这段黄昏时光，看人、看城、看夕阳；公园里常有遛狗的、玩飞盘的、卖小吃的，氛围很市井。实用提示：周末傍晚人非常多，想要好位置稍微早点来；公园基本是开放草坡，带张垫子坐着更舒服，自备的零食饮料随手买；离开时把垃圾带走，做个体面的游客；虽说 Mission 暖，但日落后还是会转凉，外套带着；这一带入夜后某些路段人杂，顾好随身物品、结伴走。Mission 同时是全城有名的美食一条街，墨西哥卷饼、面包房、各国小馆云集，正好接着吃晚餐。把这一站当成第二天温柔的句号：坐在草坡上，看着旧金山的天际线一点点亮起灯，这座城市最惬意的一面就在眼前。","traps":["周末傍晚人非常多，想要朝向城市天际线的好位置稍微早点来占","带张野餐垫坐着更舒服，零食饮料随手在 Mission 买，离开把垃圾带走","Mission 是全城最暖最少雾的区，但日落后仍转凉，外套带着","入夜后这一带某些路段人杂，顾好随身物品、结伴走","坐看黄昏天际线软着陆后，就近在 Mission 美食街吃晚餐，衔接顺畅"],"info":[["门票","免费，公园开放"],["建议时长","约 45 分钟至 1 小时，看黄昏"],["最佳时段","周六傍晚到日落，本地人野餐最热闹、天际线染金"],["到达/交通","Mission 区，彩绘女士后前往，近 Mission 美食街"]]},"Mission 晚餐":{"intro":"Mission 晚餐指的是你们第二天压轴在 Mission 区吃的这顿饭，而 Mission 本身就是旧金山公认的美食心脏和性价比之王。这片以拉丁裔社区为根基的街区，街上满是色彩斑斓的壁画、独立小店和各国餐馆，既有地道便宜的墨西哥小馆，也有米其林认可的名店和文艺面包房，论好吃又划算，这里完胜渔人码头和 Union Square 那些游客向餐厅，所以把第二天的晚餐放在 Mission 是非常明智的安排。具体吃什么，几家招牌可以挑：想吃地道墨西哥味，首推 La Taqueria，在 Mission St 2889 号，招牌是它的 Super Burrito，特别之处是不加米饭、全是满满的肉和豆与配料，曾被评为全美最佳卷饼之一，得过米其林必比登推荐，人均大约十五到十八美元，现金优先、常排队但值得；想吃面包甜点，Tartine Bakery 在 Guerrero St 600 号，乡村酸面包和可颂是招牌，下午四点出炉的面包尤其抢手，人均大约八到十五美元；此外 Mission 还有无数 taqueria、披萨、冰淇淋和各国小馆可以随兴挑。放进你们第二天的收尾刚刚好：在 Dolores Park 看完黄昏，就近走进 Mission 街区找一家坐下，用一顿热乎又地道的晚餐给一整天的金门大桥、科学馆、唱片行和彩绘女士画上句号，吃得饱足又不心疼钱包。逛吃 Mission 本身也是体验，边走边看壁画和街头气息，饿了拐进哪家都不太会踩雷。实用提示：像 La Taqueria 这类人气店现金优先、可能排队，假日周末更甚，要么早点去、要么错峰，排队也是这边的常态心里有数；想省心也可以提前看好一家、用地图导航直接去；两个人可以一人一份招牌再分享，别点太多；Mission 暖和但入夜转凉，外套带着，某些路段入夜人杂，顾好随身物品、结伴走。把这顿当成全程性价比最高的一餐：在旧金山最有烟火气的街区里，吃一份地道卷饼或热腾腾的当地美食，实在又满足。","traps":["首推 La Taqueria 的无米 Super Burrito，米其林必比登推荐，人均约 15 到 18 美元，现金优先","La Taqueria 等人气店常排队、假日周末更甚，早点去或错峰，排队是常态","想吃面包甜点去 Tartine，下午 4 点出炉的面包最抢手，人均约 8 到 15 美元","两人一人一份招牌再分享即可，别点太多；比码头和 Union Square 划算太多","Mission 入夜转凉外套带着，某些路段人杂顾好随身物品、结伴走"],"info":[["人均","约 15 至 20 美元，墨西哥小馆为主"],["招牌","La Taqueria 无米 Super Burrito、Tartine 酸面包可颂"],["是否订位","小馆多不订位、现金优先、排队常见，想省心提前选好一家"],["营业","约午间至晚间，以各店为准"]]},"Emeryville/Oakland 上车":{"intro":"这一站是你们第三天返程的起点，也是最需要提前搞清楚的环节，因为旧金山市区其实没有火车站，海岸星光号 Coast Starlight 这趟长途列车并不从旧金山市中心发车，而是在湾区对岸的两个站之一上车：Emeryville 站 EMY 或 Oakland Jack London Square 站 OKJ，具体是哪个、几点发车，完全以你们手上那张车票印的为准，务必按票走、别想当然坐错站。好在 Amtrak 为旧金山旅客提供免费的接驳大巴 Thruway Bus，从旧金山市中心的 Salesforce Transit Center 把你们送到上车的火车站，这趟接驳是和火车票绑定的，看清票上接驳大巴的发车地点和时间，关键一条是要提前到达 Salesforce Transit Center，建议比大巴发车时间早到约三十分钟，留出找站台、上车和缓冲的余地，假日周末和早高峰路上更要留足时间。从酒店去 Salesforce Transit Center 打车或用公交都方便，这个中心本身是个现代化的大型交通枢纽，里面有候车区、洗手间和简单餐饮，可以提前买点路上吃的。流程上理清楚就不慌：第三天上午从酒店退房、带好全部行李，提前赶到 Salesforce Transit Center，按票坐上 Amtrak 接驳大巴，大巴会跨过海湾大桥把你们送到 EMY 或 OKJ，在那里再凭同一张票换乘海岸星光号正式登车南下。两个上车站环境都比较简单朴素，不是大型车站，Emeryville 站小而安静，Jack London Square 站则在奥克兰一处临水的休闲区附近，周边有些餐饮，但你们时间是卡着火车走的，以顺利赶上车为第一要务，别在站点多逗留。实用提示：长途火车那天最怕赶时间出意外，务必预留充裕缓冲，行李提前收好、证件车票放在手边好拿；Amtrak 接驳大巴和火车都按票上的时间走，错过不等人；上车前在 Salesforce Transit Center 或站点附近备好零食、三明治和水，因为火车上餐车又贵又一般，自备最划算；湾区上午也可能阴凉，外套穿着。把这一段当成一次需要按部就班执行的交通衔接：看清票、早到、按票换乘，顺顺利利把人和行李送上那趟看海的火车，后面就是一路向南的风景了。","traps":["旧金山市区没火车站，务必按车票印的站 EMY 或 OKJ 走，别想当然坐错站","Amtrak 免费接驳大巴从 Salesforce Transit Center 发车，比发车时间早到约 30 分钟","第三天上午退房带齐全部行李，证件车票放手边好拿，接驳大巴和火车错过不等人","上车前在 Salesforce Transit Center 备好零食三明治和水，车上餐车又贵又一般","湾区上午阴凉外套穿着，假日周末路上多留时间，别卡点出门"],"info":[["上车站","EMY 或 OKJ，以车票为准"],["接驳","Amtrak 免费 Thruway Bus 从 Salesforce Transit Center 送至上车站"],["到达建议","比大巴发车早到约 30 分钟，留足缓冲"],["自备","零食、三明治、水，车上餐车贵且一般"]]},"海岸星光号 · 坐右侧":{"intro":"海岸星光号 Coast Starlight 是 Amtrak 旗下最著名的长途观光列车之一，常年被评为全美最美的火车线路，你们这趟就是搭它从湾区一路向南回洛杉矶，与其说是赶路，不如说是一段贴着加州海岸线展开的风景旅程，把返程本身变成了行程的高潮。最核心的一条经验是务必坐在火车的右侧、也就是靠西的一边，因为从湾区南下时，辽阔的太平洋始终在列车的右手边，最精华的海岸段里火车几乎是贴着海崖和沙滩开的，坐右侧才能把无遮挡的大海尽收眼底，坐左侧就只能看内陆山丘了。这条线最美的一段大致在下午，约从下午三点四十到傍晚七点二十之间，经过中部 San Luis Obispo 到 Santa Barbara 一带，这里铁轨直接铺在太平洋边的悬崖与海滩上，公路都未必到得了，只有火车能这样贴海慢行，夕阳西下时金光洒满海面、海浪拍岸、偶尔还能看见冲浪者和海岸礁石，是全程最不容错过的精华，这段时间一定守在窗边或观景车厢里。说到观景车厢 Sightseer Lounge，这是海岸星光号的一大亮点：整节车厢两侧和顶部都是大幅弧形玻璃窗，座椅朝向窗外，视野开阔，看海的最佳位置就在这里，精华海岸段到来前可以提前过去占个好位子。车上还有餐车 Dining Car 和咖啡简餐，但要提醒餐车价格偏贵、味道一般，所以强烈建议自备零食、三明治和水上车，边吃边看海，又省钱又自在。全程从湾区到洛杉矶 Union Station 大约十一小时，通常上午从湾区发车、傍晚约九点抵达洛杉矶，具体以你们车票为准。还有一条非常重要的提醒：长途火车经常晚点一到三小时是常态，所以到了洛杉矶之后回尔湾别把时间卡得太紧，要留足缓冲。到洛杉矶 Union Station 后，你们需要换乘 Pacific Surfliner 或 Metrolink 通勤线继续南下到 Irvine 尔湾站，车程约五十分钟，先看清你们的车票里是否已经含了这段接驳，如果没含就现场或提前买一张 Surfliner 的票；Union Station 是个宏伟漂亮的老车站，换乘时留意站内指示牌找对站台。其他实用提示：车上空调可能偏凉，外套和一条薄毯或大围巾能让长途坐得更舒服；提前给手机充满电、带好充电宝，看海拍照很费电；座位虽宽敞，长途久坐也记得起来走动走动、去观景车厢换换风景；把最美的下午海岸段留在心里、守在右侧窗边，这趟回程就值回票价了。一句话，坐对位置、备好干粮、守住下午那段贴海风光，海岸星光号会用一整条加州海岸线为你们的旧金山之行收尾。","traps":["务必坐火车右侧靠西，南下太平洋在右手边，坐左侧只能看内陆山丘","最美海岸段约下午 3 点 40 到傍晚 7 点 20，经 San Luis Obispo 到 Santa Barbara，守在窗边别错过","观景车厢 Sightseer Lounge 大玻璃窗看海最佳，精华段前提前去占位","自备零食三明治和水，车上餐车又贵又一般，边吃边看海最划算","长途火车常晚点 1 到 3 小时，到洛杉矶回尔湾别卡太紧；先确认车票是否含 Surfliner 或 Metrolink 到 Irvine 的接驳，没含就买 Surfliner"],"info":[["坐哪侧","务必右侧靠西，太平洋在右手边"],["最美时段","约下午 3:40 至傍晚 7:20，San Luis Obispo 至 Santa Barbara 贴海段"],["全程时长","湾区到洛杉矶约 11 小时，约上午发车傍晚约 9 点到，以车票为准"],["到 LA 后","Union Station 换 Pacific Surfliner 或 Metrolink 到 Irvine 约 50 分钟，确认车票是否已含"],["自备","零食三明治水、充电宝、薄外套，车上空调凉"]]},"洛杉矶换乘":{"intro":"洛杉矶换乘是你们这趟旅程的最后一环，指的是海岸星光号抵达洛杉矶 Union Station 之后，再换乘通勤火车继续南下回到尔湾 Irvine 的衔接过程。先说目的地车站本身：洛杉矶联合车站 Los Angeles Union Station 是美国西部最大、也最漂亮的火车站之一，1939 年建成，融合了西班牙殖民复兴和装饰艺术风格，高敞的候车大厅、皮质长椅、彩绘地砖和棕榈庭院都极具年代感和气派，即便只是路过换乘，也值得抬头看看这座老车站的美。换乘的逻辑很清楚：海岸星光号通常傍晚约九点抵达 Union Station，你们要在这里转乘 Pacific Surfliner 或 Metrolink 通勤线继续到 Irvine 尔湾站，车程约五十分钟。最关键的两件事，一是提前确认你们手上的车票里是否已经包含了从洛杉矶到 Irvine 这一段接驳，如果车票已含就直接按票换乘，如果没含，就需要在洛杉矶现场或提前在 Amtrak 官网买一张 Pacific Surfliner 到 Irvine 的票，Surfliner 班次相对多一些；二是务必留足缓冲时间，因为海岸星光号这类长途火车晚点一到三小时是常态，万一火车晚点导致错过原定的接驳班次，要有心理准备改乘下一班，所以千万别把回尔湾的时间卡死，更别在当晚安排紧接着的其他要紧事。在 Union Station 内换乘时，跟着站内的指示牌走，留意 Departures 出发屏幕上 Pacific Surfliner 或 Metrolink 往南去 Irvine 或 Oceanside 方向班次的发车时间和站台号，找对站台候车；车站很大，预留点找路和走动的时间，扛着行李别太赶。实用提示：到洛杉矶时已是晚上，旅途一整天会累，下车后先喝口水、确认好下一班车的时间和站台再从容前往，别慌；车站内有洗手间、便利店和简餐，可以补给一下；如果实在错过末班接驳或时间太晚不便，也可以从 Union Station 直接打车或叫网约车回尔湾，但车程较远费用不低，作为兜底方案心里有个数；尔湾 Irvine 站下车后再衔接回家的最后一程。把这一站当成需要保持清醒和耐心的收尾交通：确认车票、看准班次站台、留足缓冲、累也别慌，顺利换上南下的通勤车，这趟旧金山往返就圆满到家了。","traps":["提前确认车票是否已含洛杉矶到 Irvine 这段，没含就买 Pacific Surfliner 到 Irvine 的票","海岸星光号常晚点 1 到 3 小时，别把回尔湾时间卡死，做好改乘下一班的准备","在 Union Station 看 Departures 屏幕找往南去 Irvine 或 Oceanside 方向班次的发车时间和站台","到 LA 已是晚上又累，下车先确认下一班车时间站台再从容走，车站大别太赶","万一错过末班接驳或太晚，可从 Union Station 打车回尔湾兜底，但车程远费用不低"],"info":[["换乘地点","Los Angeles Union Station"],["换乘什么","Pacific Surfliner 或 Metrolink 到 Irvine，约 50 分钟"],["关键确认","车票是否已含这段接驳，没含就买 Surfliner"],["缓冲","火车常晚点 1 到 3 小时，时间别卡死，备好改乘下一班"]]}},"yos":{"上山 · Three Rivers 进谷":{"intro":"七月四日长周末的清晨，从尔湾出发沿 5 号、99 号公路北上，再转 198 号公路一路向东，约四个多小时车程后，山谷门户小镇 Three Rivers 在卡威厄河（Kaweah River）的陪伴下渐渐展开。这是你们进山前最后一处有稳定手机信号、加油站、超市和咖啡馆的地方，务必在此把油加满、把零食饮水和冰块备齐，因为一旦驶过 Ash Mountain 入口站，山里几乎没有信号、也没有便利的补给。买好门票后真正的爬升才开始：将军公路（Generals Highway）从门户海拔一路盘旋上到约六千四百英尺的巨树森林（Giant Forest），全程约十六英里、几十个发夹弯，正常约需四十五分钟到一小时；但 2026 年这段路仍有暴风损毁后的单车道交通管制和临时等候，遇上节日车流，实际时间可能更久。建议把握七月四日周末的黄金法则：上午九点前或下午三点后到达核心区，避开最堵的时段。沿途气温会从门户的三十五度以上随海拔骤降到山上的二十多度，体感非常明显，记得备一件薄外套。把这段上山路本身当作风景，绿荫渐浓、空气渐凉，便是与红杉相遇前最好的序章。","traps":["进山前在 Three Rivers 加满油、买齐饮水零食和冰块，山里几乎无手机信号、补给点稀少且价格偏高。","将军公路 2026 年仍有暴风损毁的单车道管制和临时等候，请预留缓冲时间，不要把行程排得太满。","七月四日周末极度拥挤，务必上午九点前或下午三点后通过入口和到达巨树森林，正午时段最堵。","门票每车 35 美元可用 7 天，若全年多次访问国家公园可考虑 80 美元年票，入口站可现场购买。","这段是约 16 英里、几十个发夹弯的连续盘山路，易晕车者提前服药，下山多用低挡控制车速。"],"info":[["门票/费用","每车约 35 美元（7 天有效），或年票约 80 美元"],["建议时长","尔湾到入口约 4.5 小时，入口到巨树森林约 45-60 分钟"],["最佳时段","上午 9 点前或下午 3 点后通过入口最顺畅"],["路况提醒","将军公路有单车道管制，建议预留缓冲时间"],["是否需订票","无需预约入园，门票现场或线上购买即可"]]},"General Sherman 谢尔曼将军树":{"intro":"谢尔曼将军树是这趟旅程当之无愧的主角，也是地球上按体积计算最大的单体生物。它高约八十三米、底部直径超过十一米，树龄估计约两千两百年，站在它脚下，你会忽然意识到自己面对的不只是一棵树，而是一段比许多人类文明都更漫长的时间，那种渺小与敬畏交织的感受很难用言语形容。从最近的停车场有一条铺装步道下行约半英里到达树前，沿途海拔约两千一百米，下去轻松、回程是持续上坡，加上高海拔空气稀薄，不少人会觉得比想象中喘，慢慢走、多停几次拍照看解说牌即可。七月四日周末这里是全园最拥挤的点之一，主停车场往往一早就满；强烈建议把车停在巨树森林博物馆，改乘免费的园内接驳车（Sequoia Shuttle，2026 年 5 月 21 日至 9 月 7 日每天 8 点到 18 点运行、无需预约、招手即停）到谢尔曼树站，彻底省去绕场抢车位的焦虑。清晨或傍晚阳光斜射进树林、光柱穿过树冠时最美，游客也相对稀少。树前那块标示牌前几乎永远排着拍照的队，情侣不妨彼此帮对方拍一张以整棵巨树为背景的全身照，把人放进画面当比例尺，才拍得出它真正惊人的体量。山上昼暖夜凉、昼夜温差大，记得带件薄外套防风保暖。","traps":["主停车场七月四日周末很早就满，建议停在巨树森林博物馆换乘免费接驳车前往，免去抢车位。","回程是约半英里的持续上坡且海拔较高，体力不佳者放慢节奏、量力而行，备足饮水。","清晨或傍晚游客最少、光线最好，正午人潮汹涌且停车几乎无望。","想拍出大树体量需把人放进画面当比例尺，热门标牌前要排队，错峰拍摄更从容。","园内几乎无手机信号，接驳车班次和集合点请提前看好，约好与同伴的会合地点。"],"info":[["门票/费用","含在入园门票内，免费接驳车无需另付"],["建议时长","约 1-1.5 小时（含步行往返与拍照）"],["最佳时段","上午 9 点前或傍晚，光线佳且人少"],["到达/交通","建议停巨树森林博物馆，乘免费接驳车至 Sherman 站"],["步道","下行约 0.5 英里到树前，回程持续上坡"]]},"Congress Trail 国会步道":{"intro":"如果说谢尔曼将军树是单点的震撼，那么国会步道就是把这份震撼延展成一场静谧的散步。这是一条从谢尔曼树出发、全程铺装的约二至三英里环线，难度平缓，却把巨树森林里最壮观、最密集的一片红杉群尽收眼底，几乎每走几步就有一棵足以让你停下仰望的庞然大树。沿途会经过以美国政治体制命名的著名树木：成排矗立、宛如列队议员的 House Group 与 Senate Group，以及独立挺拔的 President Tree（按体积位列全球第三大树）和 McKinley Tree，名字背后藏着一段段命名的趣味典故。走在这条路上，喧嚣会随着人群在谢尔曼树附近散去而逐渐安静下来，越往里走越能听见风穿过树冠的声音、闻到红杉树皮被阳光晒暖后特有的清甜香气，脚下松针柔软。海拔约两千一百米，路面平整好走，是高海拔环境下相对轻松的一段徒步，特别适合情侣慢慢并肩走完，边走边读沿途解说牌，了解红杉如何靠厚达数十厘米的树皮和极高含水量抵御山火、又如何依赖林火高温让球果爆裂、繁衍后代的奇妙生态。七月四日周末，越深入步道人越少，是避开核心区人潮、安静独享巨树的绝佳选择。请务必把食物饮料放回车上或步道口的防熊箱，不要在步道上留下任何食物气味，林间也几乎没有手机信号，出发前记得与同伴约好集合点和时间。","traps":["环线约 2-3 英里，多数人只走前半段，越往深处人越少、体验越宁静，建议走完整圈。","海拔约 2100 米，虽路面平缓仍可能气短，控制节奏并随身带水。","起点与谢尔曼树共用区域，停车困难，优先博物馆换乘接驳车前来。","任何食物须存放在车内或步道口的防熊箱，绝不可在林间留下食物或带着零食边走边吃。","林中几乎无信号，出发前下载离线地图、与同伴约定会合地点与时间。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 1.5-2.5 小时（环线全程）"],["最佳时段","上午较凉爽、人少，午后人潮增多"],["到达/交通","从 Sherman 树步道延伸，接驳车可达起点"],["难度","平缓铺装环线，约 2-3 英里"]]},"Big Trees Trail 大树环道":{"intro":"大树环道是巨树森林里最温柔、最适合慢下来的一条步道，约一点二英里的环线绕着一片名为 Round Meadow 的绿色草甸展开，全程平坦、且大部分为架空的木栈道，连推婴儿车或行动稍有不便的人都能轻松走完一圈。它最迷人的地方，在于把两种截然不同却彼此依存的景致并置在你眼前：一边是环立四周的巨大红杉，粗壮的红褐色树干在草甸边缘排成一圈，仿佛沉默的守护者；另一边是开阔湿润的高山草甸，夏季各色野花点缀其间，清晨常有鹿群低头吃草，水汽在斜射的晨光里轻轻浮动，安静得只剩鸟鸣与风声。沿途一块块解说牌细致讲述红杉与草甸、与地下水、与林火之间相互依存的生态故事，是了解这片古老森林如何运转的绝佳一课，短短一圈知识量却很丰富。海拔约两千零五十米，环线短而平缓，很适合作为抵达当天的热身、或一整天密集行程里穿插的一段轻松散步，让双脚和心情都缓一缓。步道起点有独立的小停车场，但车位极少，七月四日周末同样很快就满，建议清晨前来，或乘免费接驳车在博物馆附近下车步行过来。清晨光线柔和、动物活跃、游客也最少，是拍草甸与巨杉同框的最佳时刻。同样请把所有食物锁进防熊箱，不要在木栈道上饮食，以免引来野生动物。","traps":["专属小停车场车位极少，七月四日周末很快满，清晨来或乘接驳车至博物馆步行前往。","清晨草甸常有鹿出没、水汽朦胧最上镜，正午光线硬、动物也少。","栈道虽平坦，草甸边土壤湿软，请勿踏入草甸或踩踏植被，留在步道上。","食物饮料留在车内防熊箱，不要在栈道上进食，避免吸引野生动物。","海拔两千米左右，清晨偏凉，建议带件薄外套，做好防晒。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 45 分钟-1 小时"],["最佳时段","清晨，光线柔和、动物活跃、人少"],["到达/交通","近巨树森林博物馆，有小停车场或步行可达"],["难度","约 1.2 英里平坦环线，多为木栈道，轮椅婴儿车友好"]]},"Giant Forest Museum 巨树博物馆":{"intro":"巨树森林博物馆是整个巨树森林区当之无愧的中枢，无论从交通还是知识层面，都值得你们把它作为探索核心区的起点。这座由著名建筑师 Gilbert Stanley Underwood 设计的历史石木建筑本身就饱含故事，馆内通过实物、横切年轮、立体模型与图文展板，系统讲解巨杉的生命周期、惊人尺寸、对林火的奇妙依赖，以及一个多世纪以来人类保护这片森林的历史，二三十分钟逛下来，再去看谢尔曼树、走国会步道，会平添许多理解的层次，看树也看得更有门道。更现实也更关键的是，这里是免费园内接驳车（Sequoia Shuttle）的核心换乘枢纽，2026 年夏季 5 月 21 日至 9 月 7 日每天 8 点到 18 点运行、无需预约，从这里可换乘前往谢尔曼树、莫罗岩、Lodgepole 等多个方向。七月四日周末最明智的做法，正是一早把车停在博物馆这一带的停车场，之后全天彻底靠接驳车在各景点间轻松穿梭，告别在每个热门点绕圈抢车位的折磨。馆外就是著名的 Sentinel Tree 哨兵树，地面上还用一排标记标出了它若放倒后的惊人长度，是直观感受巨杉庞大体量的绝佳地方。馆内设有洗手间和饮水点，出发探索前后都很适合在此稍作整顿、补给。也请记得，这里和全园一样基本没有手机信号，重要联络请提前安排。","traps":["把这里当作停车与换乘接驳车的核心枢纽，一早停好车，全天靠免费接驳车游各景点。","停车场节日同样会满，越早到越好；午后到达常一位难求。","馆内参观约需 20-30 分钟，建议先看展览再去看大树，理解更深。","馆外哨兵树与地面标尺是感受巨杉体量的免费亮点，别错过。","利用此处洗手间和饮水补给，离开后核心区设施有限且无信号。"],"info":[["门票/费用","免费参观，含在入园门票内"],["建议时长","约 30-45 分钟（含展览与馆外哨兵树）"],["最佳时段","一早抵达停车换乘最佳"],["到达/交通","免费接驳车核心换乘枢纽，5 月 21 日-9 月 7 日 8-18 点运行"],["设施","有洗手间、饮水、停车场，基本无手机信号"]]},"Moro Rock 莫罗岩":{"intro":"莫罗岩是巨树森林区最具标志性、最令人难忘的眺望点，一块巨大的花岗岩穹丘从茫茫森林中拔地而起，顶端海拔约两千零五十米，远看就像一座灰白色的天然瞭望塔。登顶之路是一段嵌在岩壁上、顺着裂隙修筑的石阶，约四百级台阶、上行约三百多英尺垂直落差，沿途多数路段有护栏，但部分较窄、紧临悬崖，恐高者需量力而行、扶稳慢走。登上岩顶的回报极其丰厚：脚下是层层叠叠、连绵起伏的内华达山脉大峡墙（Great Western Divide），晴天可一路望向幽深的峡谷与远方的座座高峰，云海翻涌、夕照流金，在此格外震撼动人，是全园公认的看日落胜地之一。正因如此，傍晚这里常人满为患、停车一位难求，强烈建议七月四日周末乘免费园内接驳车前来（莫罗岩正是接驳线路上的一站），或干脆趁清晨人少时从容登顶。这段石阶虽不算长却相当费力，加上高海拔氧气稀薄，登顶会明显气喘，请穿防滑鞋、带足饮水、放慢节奏一步步爬。岩面在午后阳光下非常晒、几乎全无遮荫，务必做好防晒、戴好帽子；若午后出现雷雨或大风，裸露的岩顶毫无遮蔽且易遭雷击，应立即下撤，切勿在高处岩面逗留拍照。顶上山风很大，情侣拍照留念时务必看护好手机、帽子等随身物品，更要时刻注意脚下与护栏外的安全。","traps":["傍晚看日落人最多、停车几乎无望，建议乘免费接驳车前来或清晨登顶避开人潮。","约 400 级临崖石阶且海拔高，恐高或体力不佳者量力而行，穿防滑鞋慢慢爬。","岩面暴露无遮荫，午后强晒，务必防晒戴帽、备足饮水。","遇雷雨大风立即下撤，裸露岩顶无遮蔽极危险，切勿逗留。","顶上风大，看护好手机帽子等随身物，拍照注意脚下与护栏外安全。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 1-1.5 小时（含登顶往返）"],["最佳时段","清晨人少，或傍晚看日落（但极拥挤）"],["到达/交通","免费接驳车设站，强烈建议乘车前往"],["难度","约 400 级临崖石阶，垂直上升约 300 多英尺"]]},"Tunnel Log + Crescent Meadow":{"intro":"这一段把两个经典的巨树森林体验串在一起，适合作为核心区一天的收尾。Tunnel Log 是一棵在 1937 年倒下的巨杉，人们在其横卧的巨大树干上凿出一个约八英尺高的隧道，至今车辆仍可缓缓穿行而过——把车开过这棵躺着的红杉，是来到巨树森林几乎人人都要打卡的趣味一幕，旁边也设有绕行道供较高车辆通过，停车拍照时注意往来车流，礼让后车。沿着 Crescent Meadow Road 继续往里，就到了被博物学家约翰·缪尔（John Muir）盛赞为内华达山脉明珠的新月草甸（Crescent Meadow）。这是一片被巨杉环抱的开阔高山草甸，夏季野花盛开、绿意盎然，清晨与黄昏常有鹿群和各种鸟类出没，环绕草甸有约一点六英里的平缓环线步道，走一圈约一小时，宁静而疗愈。需要特别注意的是，Crescent Meadow Road 路窄、停车位有限，七月四日周末常实施交通管制，免费园内接驳车也覆盖此区域，建议尽量乘接驳车前来。傍晚的草甸光线金黄、暑气渐退，是结束一天最惬意的散步。务必把食物锁进防熊箱，这一带正是黑熊常出没的区域，切勿在车内或草甸边留下任何食物。","traps":["Crescent Meadow Road 路窄车位少，节日常有交通管制，建议乘免费接驳车前往。","穿越 Tunnel Log 拍照时注意往来车辆、礼让后车，较高车辆走旁边绕行道。","新月草甸是黑熊高频出没区，食物务必锁进防熊箱，绝不在车内或户外留食物。","傍晚草甸光线最美、动物活跃，但天黑前要规划好返程，山路夜间难行。","请勿踏入草甸踩踏植被，沿步道行走，与野生动物保持安全距离。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 1.5-2 小时（含穿隧道、草甸环线散步）"],["最佳时段","傍晚，光线金黄、暑气退、动物多"],["到达/交通","Crescent Meadow Road 常管制，建议乘免费接驳车"],["安全","黑熊高频区，严格防熊箱存放食物"]]},"Tokopah Falls 托卡帕瀑布":{"intro":"托卡帕瀑布是巨树森林一带最值得一走的半日徒步，尤其在初夏融雪期，瀑布水量充沛、气势磅礴，约一千两百英尺的水流顺着花岗岩壁层层跌落，是公园里落差最大的瀑布之一。步道从 Lodgepole 营地出发，沿着清澈的卡威厄河玛波切支流（Marble Fork）逆流而上，单程约一点七英里、往返约三点四英里，海拔爬升平缓（约六百英尺），一路有河水相伴、林荫与开阔交替，尽头豁然开朗，仰望对面峡谷壁上倾泻而下的瀑布与高耸的 Watchtower 岩壁，十分震撼。七月初这里通常仍有不错的水量，是这趟夏季行程里难得的亲水景致。建议清晨出发，趁凉爽走完，正午时分 Lodgepole 一带停车会很紧张，且日晒渐强。沿途部分河岸岩石湿滑、水流湍急且冰冷，卡威厄河的水流极其危险，每年都有溺水事故，务必在远处观赏，切勿下水或在湿滑石上攀爬戏水，看护好同行者尤其不要靠近激流。这一带是黑熊活动区，Lodgepole 停车场和步道口都设有防熊箱，离车前请把所有食物和有气味的物品锁好。林中信号微弱，记得带足饮水、防晒和一件薄外套。","traps":["卡威厄河水流湍急冰冷、岸石湿滑，每年都有溺水事故，只远观勿下水勿在湿石戏水。","Lodgepole 停车场正午很紧张，建议清晨出发、趁凉爽往返。","往返约 3.4 英里，备足饮水防晒，部分河段开阔无遮荫。","黑熊活动区，离车前把食物有味物品锁进 Lodgepole 的防熊箱。","初夏水量大景色佳，但也意味着河水更急更危险，看护好同伴尤其孩子远离水边。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 2.5-3.5 小时（往返含观瀑）"],["最佳时段","清晨出发，凉爽且停车从容"],["到达/交通","从 Lodgepole 营地起步，免费接驳车可至 Lodgepole"],["难度","往返约 3.4 英里，爬升约 600 英尺，平缓"]]},"Crystal Cave 水晶洞":{"intro":"水晶洞是 Sequoia 一处藏在地下的惊喜，一座由大理石构成的喀斯特溶洞，洞内布满经数十万年岁月雕琢的钟乳石、石笋、石幔与晶莹的方解石结晶，凉爽幽静，与地面上高耸的红杉世界形成奇妙反差。洞穴只能跟随导览团进入，2026 年开放期约为 5 月 22 日至 11 月 1 日，最经典的是约四五十分钟的 Family Crystal Cave Tour。最关键的一点：门票只能提前在 sequoiaparksconservancy.org/crystal-cave 线上购买，洞口和园内均不售票，且每年都非常抢手、2025 年整季售罄，七月四日周末更是一票难求，请务必提早数周锁定时段。即便订到票也别掉以轻心：从将军公路到洞口要再开一段约六七英里、狭窄多弯的 Crystal Cave Road（大型房车禁行），自驾约需二三十分钟，且必须预留时间从停车场步行约半英里、下行约两百英尺的陡坡到洞口，回程则是上坡，请按票面集合时间提前充裕出发，迟到无法退改。洞内常年约九度、阴凉湿滑，务必穿长袖外套和防滑鞋。洞内不可触碰任何岩石结构，跟紧讲解员、注意湿滑地面。这一带和全园一样几乎没有手机信号，导航请提前下载离线。","traps":["门票只能提前在 sequoiaparksconservancy.org/crystal-cave 线上购买，现场不售票且常售罄，提早数周订。","从将军公路到洞口要再开约 6-7 英里狭窄弯路（房车禁行），自驾约 20-30 分钟，预留时间。","停车场到洞口需步行约半英里、下行约 200 英尺陡坡，回程上坡，按集合时间提前充裕出发。","洞内常年约 9 度、阴凉湿滑，务必穿长袖外套和防滑鞋。","洞内禁止触碰岩石结构，跟紧讲解员，迟到无法退改，全程几乎无手机信号。"],"info":[["门票/费用","导览团另购，约 25-40 美元/人，须线上预订"],["建议时长","导览约 45-60 分钟，含来回车程与步行约半天"],["最佳时段","按所订团次时间，建议订上午场避开午后车流"],["是否需订票","必须提前在官网订票，现场不售、常售罄"],["开放期","约 2026 年 5 月 22 日-11 月 1 日"]]},"General Grant 格兰特将军树":{"intro":"格兰特将军树坐落于国王峡谷国家公园（Kings Canyon）的 Grant Grove 区域，是按体积计算全球第二大的巨杉，也被尊称为美国的国家圣诞树，每年圣诞都有纪念仪式，更被指定为国家纪念地以缅怀阵亡将士，意义非凡。它高约八十一米、底部直径约十二米，比谢尔曼树更显粗壮敦实，气场十足。环绕它的是一条约一点三公里的平缓铺装环线（General Grant Tree Trail），轻松好走、轮椅婴儿车友好，沿途除了格兰特树，还能看到中空可入内的 Fallen Monarch 倒木（早年曾被用作住所、酒馆甚至马厩）和 Gamlin Cabin 等历史遗迹，是一条信息量丰富的散步路线。需要特别说明的是，2026 年国王峡谷深处的 Cedar Grove 峡谷景观公路和 Mineral King 均封闭，因此这趟国王峡谷之行的重点就落在 Grant Grove 一带，而非深谷。从巨树森林开车到这里沿将军公路约一小时。七月四日周末同样建议清晨或下午三点后前来，停车场虽较谢尔曼树宽裕，节日午间仍可能拥挤。海拔约两千米，清晨偏凉，带件薄外套；食物记得锁进防熊箱。","traps":["2026 年 Cedar Grove 深谷公路与 Mineral King 封闭，国王峡谷行程聚焦 Grant Grove，勿白跑深谷。","从巨树森林开车约 1 小时，七月四日周末建议清晨或下午 3 点后到，午间停车仍可能紧张。","别只看格兰特树，环线上的 Fallen Monarch 倒木与历史小屋同样精彩，走完整圈。","海拔约 2000 米，清晨凉、午后晒，带薄外套并做好防晒。","食物锁进防熊箱，步道沿线勿留食物，注意与野生动物保持距离。"],"info":[["门票/费用","含在入园门票内（同一张票通用两园）"],["建议时长","约 1-1.5 小时（含环线散步）"],["最佳时段","上午 9 点前或下午 3 点后"],["到达/交通","从巨树森林沿将军公路约 1 小时车程"],["难度","约 1.3 公里平缓铺装环线，轮椅婴儿车友好"]]},"Panoramic Point 全景点":{"intro":"全景点是 Grant Grove 区域最棒的眺望台，也是许多人心中国王峡谷一带最被低估、最值得专程上去的风景。从 Grant Grove Village 出发，沿一段约二点三英里、狭窄陡峭且弯多的支线小路缓缓上行（大型房车与拖挂车辆禁行），抵达山顶停车场后再步行一小段约四分之一英里的上坡铺装步道，便登上海拔约两千三百米的观景平台。眼前豁然开朗：内华达山脉高耸的大峡墙（Great Western Divide）在天际线上连绵展开，层层雪峰、幽深峡谷与无尽森林尽收眼底，晴朗时视野极为辽阔深远，仿佛能一眼望穿整片山脉；平台上的解说牌还逐一标注了各座主要山峰的名字与海拔，可以对照着慢慢辨认，很有成就感。这里尤其适合看日落，夕阳把远处的雪山与岩峰染成一片金红，暮色由谷底缓缓漫上来，浪漫而壮丽，是情侣为一天压轴收尾的绝佳去处；不过通往这里的支线小路狭窄、会车不易，傍晚光线渐暗后下山更要格外小心，务必放慢车速、提前开灯。相比熙攘的核心区，这里游客明显更少、更清静，但也意味着手机信号全无、设施有限，出发前请备好充足饮水、薄外套和离线导航地图。海拔较高、傍晚气温下降很快，留下来看日落记得多穿一件保暖衣物。山顶停车场车位不多，节日傍晚可能需要稍作等候，建议早点上去占位。","traps":["上行支线约 2.3 英里狭窄陡峭多弯，房车拖挂禁行，傍晚下山光线暗务必慢行。","停车场车位有限，节日傍晚看日落的人会聚集，可能需等位，建议早点上去。","海拔约 2300 米、傍晚降温快，看日落多带一件保暖外套。","信号全无、设施有限，提前备好饮水与离线导航地图。","停车后还需步行约四分之一英里上坡到观景台，穿好走的鞋。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 1-1.5 小时（含上下车程与步行）"],["最佳时段","傍晚看日落最佳，但需注意下山安全"],["到达/交通","从 Grant Grove Village 走约 2.3 英里支线，房车禁行"],["难度","停车后步行约 0.25 英里上坡铺装步道"]]},"Hume Lake 休姆湖":{"intro":"在卡威厄河激流处处、严禁戏水的这片山区里，休姆湖是难得可以安全亲水的一处清凉去处，也是这趟以红杉和登高为主的行程里最能让人彻底放松的一段。它是一座海拔约一千六百米、由一道历史悠久的混凝土拦河坝拦蓄形成的人工湖，四周被苍翠松林环抱，湖水碧蓝平静、清澈见底，夏日午后在此戏水、游泳、划皮划艇或独木舟，或只是坐在岸边铺块布野餐、晒太阳、看湖面发呆，都格外惬意自在。湖区有一处对外开放的沙滩泳区，夏季可下水消暑（请务必在划定区域内活动、量力评估自身水性，没有救生员看护时尤其谨慎，照看好同伴）；附近的 Hume Lake Christian Camps 营地设有小卖部、咖啡店和租船点，可以买到冰淇淋、零食、咖啡和简餐，补给比园内核心区方便不少，也有洗手间。从 Grant Grove 开车过来约半小时，部分路段为蜿蜒起伏的山路，开车留心会车。需要提醒的是，七月四日周末这里同样是热门去处，午后人多，停车场和沙滩都较拥挤，建议上午早点来占个好位置。山间日照强烈，务必做好防晒、备好换洗衣物和毛巾；傍晚气温下降明显，泳后要及时擦干、加衣保暖，以免着凉。湖区相对偏僻，手机信号同样微弱，离车前记得把食物锁进防熊箱，岸边野餐后务必收拾干净，不留下任何食物残渣，以免吸引黑熊等野生动物。","traps":["这是本区域唯一安全的戏水地，但仍要在划定泳区内、量力而行，无救生员时尤其谨慎。","七月四日周末午后人多，沙滩与停车都挤，建议上午早点来占位。","从 Grant Grove 约半小时山路，做好防晒、带换洗衣物和毛巾，泳后及时保暖。","湖区信号弱，附近基督教营地有小卖部咖啡可补给，比园内核心区方便。","离车锁好防熊箱，岸边野餐后收拾干净，不留食物残渣吸引动物。"],"info":[["门票/费用","含在入园门票内（湖区在国家森林范围，免费）"],["建议时长","约 2-3 小时（戏水、野餐、划船）"],["最佳时段","午后较暖适合戏水，但上午来更好停车"],["到达/交通","从 Grant Grove 开车约 30 分钟，部分为山路"],["安全","本区唯一安全戏水地，卡威厄河激流严禁下水"]]},"Crescent Meadow 晨间漫步":{"intro":"把最后一个完整的清晨留给新月草甸（Crescent Meadow），是为这趟红杉之旅画上句点的温柔方式。这片被约翰·缪尔誉为内华达山脉明珠的高山草甸，在清晨格外动人：薄雾还浮在草尖，第一缕阳光斜斜穿过环立的巨杉，鹿群低头吃草、鸟鸣此起彼伏，空气清冽带着松木与青草的香气，游客寥寥，整片草甸仿佛只为你们而存在。沿草甸有一条约一点六英里的平缓环线，走一圈约一小时，沿途经过 Tharp's Log（一段由倒下的巨杉中空树干改造而成的早期定居者小屋，可入内一探）等有趣节点，也可衔接通往 Log Meadow 的小径，把晨间散步走得更尽兴。返程当天清晨先来这里走一圈，既不费力又能把山里最静谧的一面收进记忆，再从容收拾下山。请注意 Crescent Meadow Road 路窄、停车有限，清晨前来反而最容易找到车位，免费园内接驳车通常较晚才开始运行，自驾早到更稳妥。这里是黑熊活跃区，离车前务必把所有食物锁进防熊箱，草甸边切勿饮食或留下食物气味。清晨偏凉，带件外套，沿步道行走、勿踏入草甸踩踏植被，与野生动物保持距离。","traps":["清晨薄雾与鹿群最美、人最少，但 Crescent Meadow Road 路窄车位有限，越早来越好停车。","免费接驳车通常较晚开行，清晨自驾早到更稳妥，注意窄路会车。","黑熊活跃区，离车前把所有食物锁进防熊箱，草甸边勿饮食。","清晨气温低，带件外套，露水使木栈道与岩石湿滑，注意脚下。","沿步道行走、勿踏入草甸，与鹿等野生动物保持安全距离，勿投喂。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 1-1.5 小时（环线晨间散步）"],["最佳时段","清晨，薄雾、晨光与动物，人最少"],["到达/交通","Crescent Meadow Road 窄，清晨自驾早到好停车"],["难度","约 1.6 英里平缓环线，可连 Tharp's Log"]]},"Hospital Rock 医院岩岩画":{"intro":"下山途中，在海拔约八百米的低处门户地带，有一处不该匆匆错过的人文停留——医院岩（Hospital Rock）。这里曾是波塔威希（Potwisha）等原住民部落世代的聚居地，巨大的岩壁上至今保留着他们留下的红色岩画（一组象形符号），紧邻的岩石平台上还凿有一组组深深的研磨臼坑（mortar holes），那是当年原住民用石杵捣磨橡子等食物留下的痕迹，无声诉说着这片土地在巨杉成为世界旅游名胜之前、长达数千年的真实生活图景，厚重而动人。这处遗址就在将军公路边，紧邻停车场，几乎无需步行即可抵达，配有详细解说牌讲述部落的历史变迁与那个略带传奇色彩的地名由来，停留约二三十分钟即可看完，是下山路上调节节奏、为自然之旅补充一份人文厚度的好去处。需要特别注意的是，这里已属低海拔门户地带，七月正午气温常高达三十五度以上、酷热难当，强烈建议趁清晨下山时顺路停留，正午则尽量避免长时间在毫无遮荫的烈日下逗留。岩画是极其脆弱、不可再生的文化遗产，请只在原地远观、绝对不可触摸、描摹或拓印，更不能攀爬、刻画。遗址附近就是卡威厄河，水流湍急冰冷、岸石湿滑、极其危险，切勿被潺潺河景吸引而下到水边戏水。这里已靠近门户，手机信号开始逐渐恢复，可在此重新联络外界、查看并规划下山返程的实时路况。","traps":["属低海拔门户地带，七月正午常 35 度以上酷热，建议清晨下山顺路停留，避开正午烈日。","岩画是脆弱文化遗产，只远观勿触摸描摹，更不可攀爬刻画。","紧邻卡威厄河，水流湍急冰冷极危险，勿下到水边戏水。","遗址就在路边停车场旁，几乎无需步行，停留约 20-30 分钟即可。","此处接近门户、信号开始恢复，可在此联络外界、规划返程路况。"],"info":[["门票/费用","含在入园门票内"],["建议时长","约 20-30 分钟"],["最佳时段","清晨下山顺路停，避开正午酷热"],["到达/交通","将军公路边，紧邻停车场，几乎无需步行"],["安全","低海拔酷热，邻卡威厄河激流勿近水"]]},"返程尔湾":{"intro":"结束三天的红杉之旅，是时候踏上返回尔湾的路了。从巨树森林一路下山，沿将军公路盘旋而下回到门户小镇 Three Rivers，再接 198 号公路、转 99 号与 5 号公路南下，全程约四个多小时车程。下山这段同样有暴风损毁后的单车道管制风险，加上七月四日长周末的返程车流，建议趁清晨或上午尽早出发，既能避开山区拥堵，也能赶在加州中部内陆午后最热、最易疲劳驾驶的时段之前多赶些路。出发前在 Three Rivers 做最后一次补给和加油是明智的：一旦驶离门户进入炎热的中央谷地，沿途以高速服务区为主。下山的连续发夹弯请多用低挡控制车速、避免长时间踩刹车导致过热，恢复手机信号后可重新查看实时路况、规划绕行。长途驾驶务必规律休息，可在 Visalia 一带停靠吃顿正餐、加满油、伸展一下再继续。三天里你们见过了地球上最大的生命、登上了俯瞰群峰的岩巅、在清凉的湖边戏过水，把这些画面收好，平安把彼此带回家，就是这趟旅程最圆满的结尾。","traps":["下山仍有单车道管制风险，加上节日返程车流，建议清晨或上午尽早出发。","离开门户进入中央谷地后午后酷热易疲劳，趁早多赶路，规律停车休息。","出发前在 Three Rivers 做最后补给加油，之后沿途以高速服务区为主。","下山连续发夹弯多用低挡控速，避免长时间踩刹车导致刹车过热。","恢复信号后查实时路况，可在 Visalia 一带停靠正餐、加油、伸展再续行。"],"info":[["建议时长","巨树森林回尔湾约 4.5 小时车程"],["最佳时段","清晨或上午尽早出发，避开返程高峰与午后高温"],["路况提醒","下山有单车道管制，多用低挡控速"],["补给","离园前在 Three Rivers 加油补给，途中可在 Visalia 休整"],["路线","将军公路下行接 198 号、转 99 号与 5 号南下"]]}}};
const FX={"sf":{"food":[{"n":"Crab House at Pier 39","area":"渔人码头 Pier 39（第一天晚餐已定）","price":"人均约 $50–70","dishes":["蒜香烤全蟹 Whole Roasted Crab","海鲜大拼盘","蛤蜊浓汤"],"intro":"Pier 39 上的老牌海鲜馆，招牌是用秘制蒜香酱烤的整只珍宝蟹，香味十足。周五晚很满，记得提前订位；坐在海景位收尾第一天最对味。"},{"n":"The Buena Vista Cafe","area":"渔人码头 / Hyde St 缆车终点旁（行程内）","price":"人均约 $15–25","dishes":["爱尔兰咖啡 Irish Coffee","美式早午餐"],"intro":"1952 年把爱尔兰咖啡引进美国的传奇酒吧，现打奶油、排排杯。雾季傍晚下了缆车来一杯暖身刚刚好，气氛热闹有年代感。"},{"n":"Boudin Bakery（旗舰店）","area":"渔人码头 Fisherman's Wharf","price":"人均约 $15–22","dishes":["酸面包蛤蜊浓汤碗 Clam Chowder Bread Bowl","酸种面包","海龟造型面包"],"intro":"旧金山酸面包的活招牌，1849 年至今的老酵种。经典吃法是把蛤蜊浓汤盛进挖空的面包碗里，渔人码头必尝的一口，二楼可俯看烤面包流水线。"},{"n":"In-N-Out Burger","area":"渔人码头旁 333 Jefferson St","price":"人均约 $10–13","dishes":["Double-Double","Animal Style 薯条","奶昔"],"intro":"加州人的国民快餐，新鲜现做、价格实在。逛完渔人码头不想吃贵价旅游餐时的稳妥之选，记得点隐藏菜单 Animal Style。"},{"n":"Good Mong Kok Bakery 旺角餐包","area":"唐人街 1039 Stockton St（行程经过）","price":"人均约 $5–10","dishes":["虾饺","烧卖","叉烧包","蛋挞"],"intro":"唐人街人气最高的点心外卖小店，常年排队、出餐快、现金优先。几块钱一份的港式点心又热又实在，逛龙门时买几样边走边吃最划算。"},{"n":"Z & Y 张记（z&y Restaurant）","area":"唐人街 655 Jackson St","price":"人均约 $25–35","dishes":["陈麻婆豆腐","辣子鸡","水煮鱼","钵钵鸡"],"intro":"唐人街知名川菜馆，麻辣地道、连奥巴马都来吃过。想在唐人街坐下来吃顿有锅气的正餐、又怕踩旅游雷区，这家是稳妥的选择，建议提前订位。"},{"n":"R&G Lounge 岭南小馆","area":"唐人街 631 Kearny St","price":"人均约 $30–45","dishes":["椒盐焗蟹 Salt and Pepper Crab","蜜汁叉烧","清蒸海鲜"],"intro":"唐人街老字号粤菜馆，招牌椒盐焗蟹几乎桌桌必点。想吃地道广式海鲜、口味稳定的一家，适合一家人坐下来好好吃顿正餐。"},{"n":"La Taqueria","area":"Mission 区 2889 Mission St（第二天晚餐附近）","price":"人均约 $15–18","dishes":["Super Burrito（无米）","Carnitas 卷饼","Tacos"],"intro":"米其林必比登推荐的 Mission 卷饼名店，特色是不加米饭、料足汁香。现金优先、常排队，是体验旧金山 Mission 风味卷饼的代表，收尾第二天很合适。"},{"n":"Tartine Bakery","area":"Mission 区 600 Guerrero St","price":"人均约 $8–18","dishes":["乡村酸种面包","可颂 Croissant","Morning Bun","甜点挞"],"intro":"旧金山烘焙界的标杆名店，下午刚出炉的乡村面包要排队。可颂和甜点也极有口碑，适合当 Mission 一带的早餐或下午咖啡配点心。"},{"n":"Bi-Rite Creamery","area":"Mission 区 / 多洛雷斯公园旁 3692 18th St","price":"人均约 $6–10","dishes":["Salted Caroline 海盐焦糖冰淇淋","Honey Lavender 蜂蜜薰衣草 function loadWeather(t){

  const fill=d=>{try{
    const c=d.current,[ce,ct]=WMO(c.weather_code),f=Math.round(c.temperature_2m),cc=Math.round((f-32)/1.8);
    live.innerHTML='<span class="now">'+ce+'</span><div style="flex:1"><div class="tnow">'+f+'°F <small style="font-size:12px;color:var(--muted);font-weight:600">/ '+cc+'°C</small></div><div class="wmeta">'+ct+' · '+esc(t.name)+' 实时</div></div>';
    const dy=d.daily;if(dy&&dy.time){let fr='<div class="wxf">';for(let i=0;i<dy.time.length;i++){const de=WMO(dy.weather_code[i])[0],hi=Math.round(dy.temperature_2m_max[i]),lo2=Math.round(dy.temperature_2m_min[i]),wd=['周日','周一','周二','周三','周四','周五','周六'][new Date(dy.time[i]+'T00:00:00').getDay()];fr+='<div class="d"><div class="wd">'+(i===0?'今天':wd)+'</div><div class="we">'+de+'</div><div class="wt">'+hi+'°<small>/'+lo2+'°</small></div></div>';}fr+='</div>';live.insertAdjacentHTML('afterend',fr);}
  }catch(e){}};
  if(WXCACHE[t.id]&&WXCACHE[t.id].daily){fill(WXCACHE[t.id]);return;}
  fetch(url).then(r=>r.json()).then(d=>{WXCACHE[t.id]=d;fill(d);}).catch(()=>{live.innerHTML='<span class="now">🌦️</span><div><div class="tnow" style="font-size:14px">实时天气暂时加载不出</div><div class="wmeta">看下方季节预期</div></div>';});
}

}
function downloadICS(t){
  const d=t.start.replace(/-/g,'');const end=new Date(new Date(t.start+'T00:00:00').getTime()+t.days*864e5);const ed=end.getFullYear()+String(end.getMonth()+1).padStart(2,'0')+String(end.getDate()).padStart(2,'0');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ourtrip//cn','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:'+t.id+'@ourtrip','DTSTAMP:'+d+'T000000Z','DTSTART;VALUE=DATE:'+d,'DTEND;VALUE=DATE:'+ed,'SUMMARY:'+t.emoji+' '+t.name+' 出发','DESCRIPTION:行程 '+SITE+'#/t/'+t.id,'BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY','DESCRIPTION:一周后出发 '+t.name,'END:VALARM','BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:明天出发 '+t.name,'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download=t.id+'-'+t.name+'.ics';document.body.appendChild(a);a.click();a.remove();
}
function renderDay(tid,di){
  const t=TRIPS.find(x=>x.id===tid);if(!t||!t.itinerary)return renderHome();
  const d=t.itinerary[di];if(!d)return renderTrip(tid);
  setTabs('');bar.querySelector('h1').textContent=t.name;barsub.textContent='';showBack(true);
  const geo=GEO[t.id],pts=geo&&geo.days&&geo.days[di];
  const legs=LEGS[t.id]&&LEGS[t.id][di];
  const dmeals=((FX[t.id]&&FX[t.id].meals)||[]).filter(m=>m.di===di);
  const co=COORD[t.id]||{};
  let h=`<div class="wrap fade"><div class="dhero"><div style="font-size:12px;color:var(--muted);font-weight:700">${t.emoji} ${esc(t.name)}</div><div class="dtitle" style="font-size:22px">${esc(d.n)}</div><div style="color:var(--muted);font-size:13px">${esc(d.d)}</div></div>`;
  if(pts)h+=`<div class="lmap" id="map_${t.id}_${di}"></div>`;
  if(d.route)h+=`<a class="navlink" href="${d.route}" target="_blank" rel="noopener">📍 在 Google 地图打开整条路线 ↗</a>`;
  h+=`<button class="etabtn" id="etabtn">📍 用当前位置算各段实时耗时</button>`;
  let tl='<div class="tl">';
  d.items.forEach((it,ii)=>{const hd=DETAIL[t.id]&&DETAIL[t.id][it[1]];const leg=legs&&legs[ii];const c=co[it[1]];
    tl+=`<div class="it"><div class="tm">${esc(it[0])}</div><div class="rail"><div class="dot"></div><div class="ln"></div></div><div class="ct">${leg?`<div class="legtag">${esc(leg)}</div>`:''}<div class="h">${hd?`<a data-go="#/s/${t.id}/${di}/${ii}">${esc(it[1])} <span class="more">详情 ›</span></a>`:esc(it[1])}</div>${it[2]?`<div class="n">${esc(it[2])}</div>`:''}${c?`<div class="navrow"><a class="navm" href="https://www.google.com/maps/dir/?api=1&destination=${c[0]},${c[1]}" target="_blank" rel="noopener">🧭 导航</a><span class="eta" id="eta_${di}_${ii}"></span></div>`:''}</div></div>`;
    dmeals.filter(m=>m.after===ii).forEach(m=>{const fl=(FX[t.id]&&FX[t.id].food)||[];const pl=(m.picks||[]).map(p=>{const fi=fl.findIndex(x=>x.n===p);return fi>=0?`<a class="pick" data-go="#/r/${t.id}/${fi}">${esc(p)} ›</a>`:esc(p);}).join('、');tl+=`<div class="it meal"><div class="tm">${esc(m.t||'')}</div><div class="rail"><div class="dot"></div><div class="ln"></div></div><div class="ct"><div class="h">🍴 ${esc(m.k||'用餐')}<span class="opt">可选</span></div><div class="n">${esc(m.near||'')}${m.picks&&m.picks.length?'　附近：'+pl:''}</div></div></div>`;});
  });
  tl+='</div>';h+=tl;
  h+=`<div class="docbtn" data-go="#/t/${t.id}">← 返回 ${esc(t.name)} 行程</div>`;
  h+='</div>';view.innerHTML=h;bindGo();initDayExtras(t,di);
}
function initDayExtras(t,di){
  const geo=GEO[t.id],pts=geo&&geo.days&&geo.days[di],el=document.getElementById('map_'+t.id+'_'+di);
  if(pts&&el&&window.L){try{const m=L.map(el,{scrollWheelZoom:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(m);const ll=pts.map(p=>[p[0],p[1]]);pts.forEach((p,k)=>L.marker([p[0],p[1]],{icon:L.divIcon({className:'',html:'<div class="lnum">'+(k+1)+'</div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(m).bindPopup((k+1)+'. '+p[2]));if(ll.length>1){L.polyline(ll,{color:'#0e7490',weight:3,opacity:.85}).addTo(m);m.fitBounds(ll,{padding:[30,30]});}else{m.setView(ll[0],13);}setTimeout(()=>m.invalidateSize(),80);}catch(e){}}
  const btn=document.getElementById('etabtn');if(btn)btn.onclick=()=>computeETAs(t,di,btn);
}
function computeETAs(t,di,btn){
  if(!navigator.geolocation){btn.textContent='此设备不支持定位';return;}
  const co=COORD[t.id]||{},items=t.itinerary[di].items;
  const list=items.map((it,ii)=>({ii,c:co[it[1]]})).filter(x=>x.c);
  if(!list.length)return;
  btn.textContent='定位中…';btn.disabled=true;
  navigator.geolocation.getCurrentPosition(function(pos){
    const la=pos.coords.latitude,lo=pos.coords.longitude;
    const coords=[lo+','+la].concat(list.map(x=>x.c[1]+','+x.c[0])).join(';');
    fetch('https://router.project-osrm.org/table/v1/driving/'+coords+'?sources=0&annotations=duration,distance').then(r=>r.json()).then(function(dat){
      const dur=dat.durations&&dat.durations[0],dis=dat.distances&&dat.distances[0];
      list.forEach(function(x,k){const el=document.getElementById('eta_'+di+'_'+x.ii);if(!el)return;const sec=dur&&dur[k+1],met=dis&&dis[k+1];if(sec==null){el.textContent='';return;}const drive=Math.round(sec/60);let line='🚗 '+drive+'分';if(met!=null&&drive<=40){const walk=Math.round(met/80),tran=Math.round(drive*1.5)+6;line='🚶 '+walk+'分 · '+line+' · 🚌 '+tran+'分';}el.innerHTML='　'+line;});
      btn.textContent='✅ 已按当前位置估算（驾车实时路网 · 步行/公交为估算，准确以导航为准）';btn.disabled=false;
    }).catch(function(){btn.textContent='⚠️ 算不出来，点上面的导航按钮看实时';btn.disabled=false;});
  },function(){btn.textContent='⚠️ 未取得定位，点导航按钮也能从当前位置出发';btn.disabled=false;},{enableHighAccuracy:false,timeout:8000,maximumAge:60000});
}
function renderResto(tid,idx){
  const t=TRIPS.find(x=>x.id===tid),f=FX[tid]&&FX[tid].food&&FX[tid].food[idx];
  if(!t||!f)return renderHome();
  setTabs('');bar.querySelector('h1').textContent=t.name;barsub.textContent='';showBack(true);
  const q=encodeURIComponent((f.n+' '+(f.area||'')+' '+t.name).replace(/（[^）]*）/g,' '));
  let h='<div class="wrap fade"><div class="dhero">';
  h+=`<div style="font-size:12px;color:var(--muted);font-weight:700">${t.emoji} ${esc(t.name)} · 餐厅</div>`;
  h+=`<div class="dtitle" style="font-size:22px">${esc(f.n)}</div>`;
  if(f.area)h+=`<div style="color:var(--muted);font-size:13px">${esc(f.area)}</div>`;
  if(f.price)h+=`<div class="chips" style="margin-top:10px"><span class="chip">💰 <b>${esc(f.price)}</b></span></div>`;
  h+='</div>';
  if(f.intro)h+=`<div class="block"><div class="prose">${esc(f.intro)}</div></div>`;
  if(f.dishes&&f.dishes.length)h+='<div class="block"><h3>🍴 推荐菜</h3><div class="fdish" style="padding:2px">'+f.dishes.map(d=>`<span>${esc(d)}</span>`).join('')+'</div></div>';
  h+=`<a class="docbtn" href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">📍 在 Google 地图上找这家</a>`;
  h+=`<div class="docbtn" data-go="#/t/${t.id}">← 返回 ${esc(t.name)} 行程</div>`;
  h+='</div>';view.innerHTML=h;bindGo();
}
function renderOverview(){
  setTabs('#/');bar.querySelector('h1').textContent='排期 & 季节';barsub.textContent='';showBack(true);
  let h='<div class="wrap fade"><div class="dhero"><div style="font-size:28px">🗺️</div><div class="dtitle">排期 & 季节逻辑</div></div>';
  h+=`<div class="note" style="margin-top:8px">${esc(OVERVIEW.principle)}</div>`;
  h+=`<a class="docbtn" href="${OVERVIEW.doc}" target="_blank" rel="noopener" style="margin-top:12px">📄 打开完整总览（Google 文档）</a>`;
  h+='<div class="block"><h3>🌦️ 为什么排在那个月</h3><div class="gcard">'+OVERVIEW.season.map(s=>`<div class="gli"><b>${esc(s[0])}</b><br>${esc(s[1])}</div>`).join('')+'</div></div>';
  h+='<div class="block"><h3>⏰ 预订时间线</h3><div class="gcard">'+OVERVIEW.booking.map(s=>`<div class="gli"><b>${esc(s[0])}</b><br>${esc(s[1])}</div>`).join('')+'</div></div>';
  h+='<div class="block"><h3>🚗 怎么去（自驾 vs 飞）</h3><div class="gcard">'+OVERVIEW.drive.map(s=>`<div class="mini"><span class="k">${esc(s[0])}</span><span class="v">${esc(s[1])}</span></div>`).join('')+'</div></div>';
  h+='<div class="foot">完整排期与季节解释见上方总览文档</div></div>';
  view.innerHTML=h;bindGo();
}
function renderGuide(){
  setTabs('#/guide');bar.querySelector('h1').textContent='通用攻略';barsub.textContent='';showBack(false);
  let h='<div class="wrap fade"><div class="dhero"><div style="font-size:28px">🧭</div><div class="dtitle">通用攻略</div><div style="color:var(--muted);font-size:13px;margin-top:2px">订机票 / 订房 / 租车 / 年票 / 打包 / 避坑 —— 所有行程通用</div></div>';
  h+=`<a class="docbtn" href="${GUIDE.doc}" target="_blank" rel="noopener" style="margin-top:12px">📄 打开完整通用攻略（Google 文档）</a>`;
  GUIDE.sections.forEach(sec=>{h+=`<div class="block"><h3>${sec.t}</h3><div class="gcard">`+sec.items.map(x=>`<div class="gli">${gi(x)}</div>`).join('')+'</div></div>';});
  const p=prog(PACK);
  h+=`<div class="block"><h3>🧳 通用打包清单 <span style="color:var(--muted);font-weight:600;font-size:13px">${p.done}/${p.total}</span></h3><div class="card" style="padding:4px 15px">`+chkHTML(PACK)+'</div></div>';
  h+='<div class="foot">勾选会记住（存在这台设备上）· 更细节看完整文档</div></div>';
  view.innerHTML=h;bindChk(renderGuide);
}
function renderLists(){
  setTabs('#/lists');bar.querySelector('h1').textContent='出发前清单';barsub.textContent='';showBack(false);
  let h='<div class="wrap fade">';
  const groups=[PACK,...[...TRIPS].sort((a,b)=>a.start.localeCompare(b.start)).filter(t=>t.checklist)];
  groups.forEach(o=>{const p=prog(o);
    h+=`<div class="lgrp"><div class="lh">${o.emoji} ${o.name} <span style="color:var(--muted);font-weight:600">${p.done}/${p.total}</span></div><div class="card" style="padding:4px 15px">`+chkHTML(o)+'</div></div>';});
  h+='<div class="foot">勾选会记住（存在这台设备上）</div></div>';view.innerHTML=h;bindChk(renderLists);
}
function fmt(s){const[y,m,d]=s.split('-');const w=['周日','周一','周二','周三','周四','周五','周六'][new Date(s+'T00:00:00').getDay()];return (+m)+'/'+(+d)+' '+w;}
function showBack(on){const ex=bar.querySelector('.back');if(on&&!ex){const b=document.createElement('button');b.className='back';b.innerHTML='‹ 返回';b.onclick=()=>history.length>1?history.back():location.hash='#/';bar.insertBefore(b,bar.firstChild);}if(!on&&ex)ex.remove();}
function setTabs(hash){document.querySelectorAll('.tabbar a').forEach(a=>a.classList.toggle('on',a.dataset.go===hash));}
document.querySelectorAll('.tabbar a').forEach(a=>a.onclick=()=>{const g=a.dataset.go;if(g==='__docs__')window.open(FOLDER,'_blank');else location.hash=g;});
function route(){const h=location.hash||'#/';
  if(curHash!==null)SCROLL[curHash]=window.scrollY;
  if(h.startsWith('#/s/')){const p=h.slice(4).split('/');renderStop(p[0],+p[1],+p[2]);}
  else if(h.startsWith('#/r/')){const p=h.slice(4).split('/');renderResto(p[0],+p[1]);}
  else if(h.startsWith('#/d/')){const p=h.slice(4).split('/');renderDay(p[0],+p[1]);}
  else if(h.startsWith('#/t/'))renderTrip(h.slice(4));
  else if(h==='#/guide')renderGuide();else if(h==='#/overview')renderOverview();else if(h==='#/lists')renderLists();else renderHome();
  const isDetail=h.startsWith('#/s/')||h.startsWith('#/r/');const y=isDetail?0:(SCROLL[h]||0);curHash=h;requestAnimationFrame(function(){requestAnimationFrame(function(){window.scrollTo(0,y);});});}
window.addEventListener('hashchange',route);route();
