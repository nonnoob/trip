<style>
:root{
  --bg:#f4f5f3; --card:#ffffff; --ink:#1b1c1a; --muted:#6c6e69; --line:#e7e8e4;
  --accent:#0e7490; --accent-ink:#0e7490; --accent-soft:#e6f6fa;
  --ok-i:#15803d; --ok-b:#dcfce7; --plan-i:#b45309; --plan-b:#fdf0d9; --idea-i:#5b5f66; --idea-b:#edeeec;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 6px 18px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#16181a; --card:#212427; --ink:#eef0ee; --muted:#9aa0a0; --line:#31363a;
    --accent:#22b8d6; --accent-ink:#7fe0f2; --accent-soft:#10343d;
    --ok-i:#86efac; --ok-b:#14361f; --plan-i:#f2c879; --plan-b:#3a2c12; --idea-i:#b8bcbf; --idea-b:#2a2f33; --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.35);}
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:78px}
.appbar{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px}
.appbar h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
.appbar .sub{font-size:12px;color:var(--muted);margin-left:auto}
.back{border:none;background:none;color:var(--accent-ink);font-size:15px;display:flex;align-items:center;gap:4px;padding:0;cursor:pointer;font-weight:600}
.wrap{padding:14px 16px 8px}
.greet{font-size:12.5px;color:var(--muted);margin:0 4px 10px}
.hero{background:linear-gradient(135deg,var(--accent),#0b5c73);color:#fff;border-radius:20px;padding:18px 18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer}
.hero .lab{font-size:12px;opacity:.86;letter-spacing:.4px}
.hero .nm{font-size:19px;font-weight:700;margin:2px 0 8px}
.hero .big{font-size:34px;font-weight:800;line-height:1;letter-spacing:.5px}
.hero .big small{font-size:14px;font-weight:600;opacity:.85;margin-left:6px}
.hero .meta{font-size:13px;opacity:.9;margin-top:10px}
.hero .go{margin-top:14px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600}
.hero .glow{position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.12)}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 2px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px 6px 11px;text-align:center;cursor:pointer}
.tile .ic2{font-size:21px;line-height:1}
.tile .tl{font-size:12px;font-weight:700;margin-top:6px}
.tile .ts{font-size:10px;color:var(--muted);margin-top:1px}
.sec{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin:20px 4px 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.trip{display:flex;align-items:center;gap:13px;padding:14px 15px;cursor:pointer;border-bottom:1px solid var(--line)}
.trip:last-child{border-bottom:none}
.trip .ic{width:46px;height:46px;border-radius:13px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto}
.trip .tx{flex:1;min-width:0}
.trip .t1{font-size:15.5px;font-weight:700;line-height:1.25}
.trip .t2{font-size:12.5px;color:var(--muted);margin-top:1px}
.trip .ch{color:var(--muted);font-size:20px;flex:0 0 auto}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
.p-ok{background:var(--ok-b);color:var(--ok-i)} .p-plan{background:var(--plan-b);color:var(--plan-i)} .p-idea{background:var(--idea-b);color:var(--idea-i)}
.prog{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:7px}
.prog>i{display:block;height:100%;background:var(--accent);border-radius:99px}
.dhero{padding:4px 4px 0}
.dtitle{font-size:23px;font-weight:800;margin:2px 0 4px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;color:var(--ink);box-shadow:var(--shadow)}
.chip b{font-weight:700}
.cd{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:13px;padding:10px 14px;margin:12px 0 2px}
.cd .cdn{font-size:17px;font-weight:800;color:var(--accent-ink)}
.icsbtn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}
.docbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:10px 0 2px;background:var(--accent-soft);color:var(--accent-ink);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:13px;padding:12px;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer}
.block{margin:18px 0}
.block h3{font-size:15px;margin:0 0 9px;display:flex;align-items:center;gap:7px;font-weight:700}
.note{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:0 13px 13px 0;padding:11px 14px;font-size:13.5px;color:var(--ink);box-shadow:var(--shadow)}
.wx{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:11px 14px}
.wx .now{font-size:30px;line-height:1;flex:0 0 auto}
.wx .tnow{font-size:20px;font-weight:800}
.wx .wmeta{font-size:12px;color:var(--muted)}
.wxf{display:flex;gap:6px;overflow-x:auto;margin-top:8px;padding-bottom:2px}
.wxf .d{flex:0 0 auto;width:52px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:7px 3px;box-shadow:var(--shadow)}
.wxf .d .wd{font-size:10.5px;color:var(--muted)} .wxf .d .we{font-size:17px;margin:2px 0} .wxf .d .wt{font-size:11px;font-weight:700} .wxf .d .wt small{color:var(--muted);font-weight:400}
.day{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:14px 15px;margin-bottom:13px}
.day .dh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.day .dh .dn{font-size:15px;font-weight:800}
.day .dh .dd{font-size:12.5px;color:var(--muted)}
.lmap{height:180px;border-radius:13px;overflow:hidden;border:1px solid var(--line);margin:9px 0 7px;position:relative;z-index:0}
.navlink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--accent-ink);font-weight:700;text-decoration:none;margin:0 0 10px}
.lnum{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tl{position:relative;padding-left:4px}
.it{display:flex;gap:11px;padding-bottom:4px}
.it .tm{font-variant-numeric:tabular-nums;font-size:12px;color:var(--accent-ink);font-weight:700;width:42px;flex:0 0 auto;padding-top:2px}
.it .rail{position:relative;width:14px;flex:0 0 auto}
.it .rail .dot{position:absolute;left:3px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.it .rail .ln{position:absolute;left:6.5px;top:12px;bottom:-6px;width:2px;background:var(--line)}
.it:last-child .rail .ln{display:none}
.it .ct{flex:1;padding-bottom:14px}
.it .ct .h{font-size:14.5px;font-weight:700;line-height:1.3}
.it .ct .n{font-size:12.5px;color:var(--muted);margin-top:1px}
.chk{display:flex;align-items:flex-start;gap:11px;padding:10px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.chk:last-child{border-bottom:none}
.chk .box{width:21px;height:21px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:.15s;font-size:13px;color:#fff}
.chk.on .box{background:var(--accent);border-color:var(--accent)}
.chk .ctx{font-size:14px}
.chk.on .ctx{color:var(--muted);text-decoration:line-through}
.chk .ctx small{display:block;color:var(--muted);font-size:12px;text-decoration:none;margin-top:1px}

.food:last-child{border-bottom:none}
.food .fn{font-weight:600} .food .fd{color:var(--muted);font-size:12.5px;text-align:right}

.gli{padding:10px 1px;border-bottom:1px solid var(--line);font-size:13.5px;line-height:1.55}
.gli:last-child{border-bottom:none}
.gli b{font-weight:700}
.mini{display:flex;align-items:center;gap:10px;padding:9px 1px;border-bottom:1px solid var(--line);font-size:13.5px}
.mini:last-child{border-bottom:none}
.mini .k{font-weight:600;flex:0 0 auto}
.mini .v{margin-left:auto;color:var(--muted);text-align:right}
.tips li{font-size:13.5px;margin:5px 0;color:var(--ink)}
.tips{padding-left:18px;margin:6px 0}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tabbar a{flex:1;text-align:center;padding:9px 0 8px;color:var(--muted);text-decoration:none;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tabbar a .i{font-size:20px;line-height:1}
.tabbar a.on{color:var(--accent-ink);font-weight:700}
.foot{text-align:center;color:var(--muted);font-size:11.5px;padding:18px 20px 6px}
.lgrp{margin:6px 0 16px}
.lgrp .lh{font-size:13px;font-weight:800;margin:10px 4px 6px;display:flex;align-items:center;gap:7px}
.fade{animation:f .22s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.it.tap{cursor:pointer;border-radius:10px} .it.tap:active{background:var(--accent-soft)}
.more{color:var(--accent-ink);font-weight:700;font-size:12px;white-space:nowrap}
.legtag{display:inline-block;font-size:11px;color:var(--accent-ink);background:var(--accent-soft);border-radius:7px;padding:1px 8px;margin-bottom:4px}
.it.meal .dot{background:var(--plan-i);box-shadow:0 0 0 3px var(--plan-b)}
.it.meal .ct .h{font-size:13.5px;font-weight:700}
.opt{font-size:10px;color:var(--plan-i);background:var(--plan-b);border-radius:6px;padding:1px 6px;margin-left:5px;vertical-align:1px}
.fcard{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.fcard .fh{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.fcard .fn2{font-size:15px;font-weight:700}
.fcard .fp{font-size:12px;color:var(--accent-ink);font-weight:700;white-space:nowrap}
.fcard .fa{font-size:11.5px;color:var(--muted);margin-top:1px}
.fcard .fi{font-size:13px;line-height:1.6;margin:6px 0 8px}
.fdish{display:flex;flex-wrap:wrap;gap:6px}
.fdish span{font-size:11.5px;background:var(--accent-soft);color:var(--accent-ink);border-radius:999px;padding:2px 9px}
.prose{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;font-size:14.5px;line-height:1.85;color:var(--ink)}
.leaflet-container{font-family:inherit;background:var(--bg)}
</style>

const DETAIL={"sf":{"联合广场 Union Square":{"intro":"联合广场是旧金山市中心的心脏，一块被高楼、百货公司和老牌酒店围起来的开阔广场，中央立着一根纪念美西战争的胜利女神柱，棕榈树下永远有人坐着晒太阳、喂鸽子、听街头艺人弹唱。它的魅力不在于某个必看的景点，而在于它是整座城市的交通和购物枢纽：Macy's、Saks、Neiman Marcus 等大牌环伺，Powell 缆车总站就在广场西南角几步路外，往东南走几分钟就是你们这次的重头戏 SFMOMA，往西北穿过几条街便是唐人街龙门。对你们这趟行程来说，它的意义是一个完美的起点。周五中午到了旧金山、在 Union Square 一带的酒店放下行李后，先在附近随便吃个午饭垫垫肚子，然后就能从这里像扇形一样把第一天的行程铺开。广场本身逛十几分钟足矣，重点是利用它的地利。6 月的旧金山是雾季，中午时分这里通常已经放晴，阳光把白色的纪念柱照得发亮，但海风一来还是凉，所以外套别脱。周末又恰逢 Juneteenth 假日，市中心比平时更热闹，街头表演、临时摊位都会更多，氛围很市井也很有活力。提醒一句，这一带是游客密集区，扒手和兜售也多，背包往前背、手机别放后裤兜。广场地下还有停车场，但你们这趟主要靠步行加缆车，用不太上。把它当成一个定调子的地方：站在棕榈树下，看看四周的老建筑和缆车叮叮当当爬坡的样子，旧金山的感觉一下子就来了，然后元气满满地走向 SFMOMA。","traps":["中午到先在 Union Square 附近吃午饭垫肚子，但别在广场正对的旅游餐厅吃，价高三四成，往唐人街方向走几步更划算","这一带扒手多、兜售多，背包往前背、手机别放后裤兜，尤其人群聚集看街头表演时","广场本身十几分钟就够，别在这里耗太久，把时间留给步行几分钟就到的 SFMOMA","周末假日市中心更挤、停车更紧，这趟靠步行加缆车，别开车进来","想买大牌的话周边百货退税和折扣码可以提前查，但行程紧就别为购物耽误景点节奏"],"info":[["门票","免费开放，全天可逛"],["建议时长","约 15 至 30 分钟，主要作为起点和中转"],["最佳时段","周五中午到达后，放行李吃午饭即来，正好放晴"],["到达/交通","Powell 缆车总站旁，SFMOMA 步行约 5 分钟，多条 Muni 与 BART 在 Powell St 站"]]},"SFMOMA 现代艺术馆":{"intro":"SFMOMA 是这趟旧金山行程的重头戏，也是整个西海岸规模最大的现代与当代艺术博物馆，七层楼把二十世纪至今的艺术脉络铺得明明白白：你能看到 Calder 的活动雕塑在空中缓缓转动，Warhol 的波普丝网版画、Rothko 大块色域的沉静、Diebenkorn 的加州光线，还有草间弥生的圆点与镜屋，以及大量摄影和当代装置。建筑本身就值得一看，2016 年扩建后的白色波浪形外立面在阳光下像被海雾雕过，馆内最有名的是那面三层楼高、种了近两万株植物的垂直绿植墙，站在露台上喝杯咖啡看这面活的墙，是旧金山式的惬意。把它安排在周五下午是这趟行程最关键的一招，原因很实在：SFMOMA 周三闭馆，周五和周六都是下午五点关门，没有那种周四的夜场，所以中午到、酒店放完行李后第一时间来这里，预留约两小时从容看完，再赶在五点前出来往北去坐缆车，节奏刚刚好。逛法上建议别贪多，先拿一份楼层图，挑两三层自己真正感兴趣的重点看，比如七层的当代、四五层的战后与摄影，其余快速扫过，否则七层楼走下来腿会先投降。馆内有几处餐饮和咖啡，看累了可以歇脚，但你们午饭已在 Union Square 解决，这里点杯东西坐坐即可。6 月雾季的下午，室内恰好避开外头的灰冷海风，是个温暖又有内容的去处。门票约三十美元一位，十八岁及以下免费，具体以官网为准，旺季周末人会多，提前在 tickets.sfmoma.org 上买好时段票能省去排队。看现代艺术不必端着，挑你看得进去的停下来多待一会，看不懂的笑笑走过也无妨，这才是逛美术馆该有的轻松。","traps":["务必排在周五下午来，因为周三闭馆且周五周六都是 5 点关门，没有夜场，错过就只能挤周六","提前在 tickets.sfmoma.org 买好时段票，旺季周末现场排队买票费时间","七层楼别每层都细看，挑两三层重点逛，否则两小时根本不够还累腿","18 岁及以下免费，带证件可省票钱；成人票约 30 美元以官网为准","午饭在 Union Square 解决，馆内餐饮当歇脚喝咖啡用即可，不必在此正餐"],"info":[["门票","约 30 美元一位，18 岁及以下免费，以 tickets.sfmoma.org 为准"],["建议时长","约 2 小时，挑重点楼层"],["最佳时段","周五下午，赶 5 点关门前最从容"],["到达/交通","Union Square 步行约 5 分钟，151 Third St"]]},"唐人街龙门 Dragon Gate":{"intro":"旧金山唐人街是全美历史最悠久、也是北美最大的唐人街之一，而龙门 Dragon Gate 就是它气派的正门，立在 Grant Avenue 与 Bush Street 交叉口。这座绿瓦飞檐、石狮镇守的牌坊是 1970 年由台湾捐赠的，梁上写着孙中山的天下为公，过了这道门就算正式踏进唐人街了。从龙门往北沿着 Grant Ave 一路走，是最经典的逛法：街道两旁挂满红灯笼，药材铺飘着当归和陈皮的味道，纪念品店堆着丝绸睡衣、招财猫和功夫拖鞋，中餐馆、烧腊店、凉茶铺一家挨一家，空气里是叉烧和炸物的香气。这里不只是给游客看的布景，旁边的 Stockton Street 才是本地华人真正买菜、办年货的生活动脉，鱼摊菜摊人声鼎沸，烟火气十足，有兴趣可以拐过去感受一下。放进你们第一天的行程里，它正好是个顺路的过场：从 SFMOMA 出来往西北走，穿过龙门快逛一段 Grant Ave，拍拍牌坊和灯笼，顺手买点心垫垫，然后继续往北接回市中心去坐缆车。时间上别安排太久，半小时到四十分钟边走边逛拍照足够，因为后面缆车排队和渔人码头都要时间。如果嘴馋，唐人街的点心很值得带一份在路上吃：Good Mong Kok 在 Stockton St 1039 号，烧卖、叉烧包、蛋挞便宜又地道，基本是外带窗口、现金优先，排队也快；想坐下来喝茶吃点心也有不少老馆子。提醒一下，这一带街道窄、坡也多，人多的时候顾好随身物品；6 月傍晚这里背阴又起风，会比市中心更凉一些，外套穿着。逛唐人街的乐趣在于那种时空交错感：出了门是美式高楼，进了门是另一个世界，短短几条街就走完一段华人移民百年的故事。","traps":["半小时到四十分钟足够，别逛太久，后面缆车排队和渔人码头都要留时间","想吃点心去 Stockton St 的 Good Mong Kok 买外带，便宜地道、现金优先、排队快","纪念品店东西大同小异且偏贵，别冲动买，真想买货比三家","Grant Ave 是游客主街，想看真实华人生活拐去平行的 Stockton St 菜市场","街窄坡多人也多，顾好随身物品；傍晚背阴起风会更凉，外套穿着"],"info":[["门票","免费，街区随意逛"],["建议时长","约 30 至 40 分钟，边走边逛"],["最佳时段","周五下午从 SFMOMA 出来顺路，傍晚前快逛"],["到达/交通","龙门在 Grant Ave 与 Bush St 口，SFMOMA 步行约 10 分钟"]]},"Powell 缆车总站":{"intro":"旧金山的叮叮车 Cable Car 是全世界唯一仍在运营的人力抓缆爬坡缆车系统，从 1873 年用到今天，被列为国家历史地标，坐一趟不只是交通，更是活着的古董体验。Powell Street Turnaround 就在 Powell 与 Market 街口、Union Square 旁边，是 Powell-Hyde 和 Powell-Mason 两条线的南端总站，也是一个本身就值得看的景点：这里没有自动转盘，缆车到站后，工人要亲手把整辆车推上一个圆形木质转盘、合力转个方向再推回轨道，几个人喊着号子推车掉头的画面，围观的人总是里三层外三层。缆车没有发动机，全靠车底一个抓手钳住地下持续转动的钢缆带动，司机喊 grip 拉杆的就是抓缆，叮叮的铃声也是这么来的。放进你们第一天，从唐人街逛完往回走到这里，坐最经典的 Powell-Hyde 线往北，它会一路翻过几座陡坡、经过九曲花街的坡顶，最后下到 Hyde 街尽头的渔人码头一带，沿途从车窗探头看海湾和层叠房子的视角极好，站在车外踏板上手抓立柱、迎着风往下坡冲那一下，是旧金山最经典的画面。要有心理准备的是排队：周五下午这个总站排队往往要三十到六十分钟，假日周末更甚，所以要么趁早来排，要么错峰，实在不想等也可以走两个街区到沿线的中途站点上车，人会少很多但不保证有空位。车票现场单程约八美元，或者买 Muni 日票约十三点七五美元含缆车，用手机上的 MuniMobile App 提前买好最省事。坐缆车记得抓稳，过弯和上下坡晃得厉害，想拍那种探身车外的照片务必一手抓牢。这趟车把交通、观光和怀旧揉在一起，值得为它排一次队。","traps":["周五下午总站排队 30 到 60 分钟，假日周末更长，趁早来或错峰，实在赶时间走两个街区到中途站上车","提前用 MuniMobile App 买票，单程约 8 美元或 Muni 日票约 13.75 美元含缆车，免得现场买票又排一次","坐 Powell-Hyde 线而非 Powell-Mason，前者经九曲花街坡顶直下渔人码头，风景最经典","想拍探身车外的经典照，务必一手死死抓牢立柱，过弯上下坡晃得厉害","看工人手动推车掉头本身就是一景，排队时正好在转盘边看，别只顾刷手机"],"info":[["门票","单程约 8 美元，或 Muni 日票约 13.75 美元含缆车，用 MuniMobile App 购票"],["建议时长","排队加乘车约 40 至 80 分钟"],["最佳时段","周五下午尽量早排或错峰，避开队伍最长的时段"],["到达/交通","总站在 Powell St 与 Market St 口，唐人街步行约 10 分钟"]]},"九曲花街 Lombard St":{"intro":"九曲花街是旧金山最上镜的街道之一，官方名字叫 Lombard Street，但真正出名的只是 Russian Hill 上那短短一段：在原本陡得几乎无法直接行车的斜坡上，工程师用八个连续的急转弯把车道盘成一条之字形，弯道之间和两侧种满了花草，以绣球花为主，夏天还有玫瑰点缀，红砖铺的路面在花丛中蜿蜒而下，被称为世界上最弯曲的街道。6 月正是绣球盛开的时候，蓝紫和粉白的花球一团团把弯道夹在中间，配上背后的科伊特塔和海湾，画面饱满得像明信片。逛法很简单也很关键：坐 Powell-Hyde 缆车在 Hyde 与 Lombard 交叉口下车，这里正好是花街的坡顶，从上往下俯拍那条蜿蜒的弯道加远处海湾的经典构图最好看，所以重点是站在坡顶往下取景，而不是走到坡底仰拍。你们也可以沿着两侧的人行台阶慢慢走下去，边走边从不同角度拍花和弯道，走到底是 Leavenworth 街。这条街仍是住宅区，弯道里还真有车排队一辆辆慢慢开下来给游客让出了拍照的前景，但两旁都是民居，记得别踩进人家花圃、别大声喧哗。放进第一天的节奏里，它紧跟在缆车之后：下了 Powell-Hyde 线在坡顶拍够，再顺势往下走，正好离 The Buena Vista 和渔人码头不远，一路下坡接着走。提醒几点：坡很陡，穿好走路的鞋；这一带是热门点，人多，拍俯视图要稍微等没人入镜的空档；6 月傍晚起风又凉，花拍完别久留；另外这里没什么遮挡，放晴时阳光好，但雾一上来弯道也会显得灰扑扑，所以尽量趁天还亮、还没起雾时拍。花街不大，连拍带走二三十分钟就够，但那条盘旋的花径配上海湾，是旧金山最值得按快门的角落之一。","traps":["在 Hyde 与 Lombard 口的坡顶下缆车，从上往下俯拍弯道加海湾最经典，别跑到坡底仰拍","这是住宅区，别踩进民居花圃、别大声喧哗，弯道里有车在开注意安全","坡很陡，务必穿好走路的鞋，沿侧边台阶慢慢走下去边走边拍","热门点人多，拍干净的俯视图要等没人入镜的空档，有点耐心","趁天亮没起雾时拍，6 月傍晚雾一上来弯道会灰扑扑，拍完别久留，海风凉"],"info":[["门票","免费，街道开放"],["建议时长","约 20 至 30 分钟，拍照加步行下坡"],["最佳时段","周五傍晚下缆车后，趁天亮未起雾"],["到达/交通","Powell-Hyde 缆车在 Hyde 与 Lombard 口下，即坡顶"]]},"The Buena Vista":{"intro":"The Buena Vista 是旧金山一家有故事的老咖啡馆兼酒吧，就坐落在 Hyde 街缆车终点旁、面朝海湾的转角上，从 1916 年开到现在。它真正的传奇身份是把爱尔兰咖啡引进美国的地方：1952 年，店主和一位旅行作家合力，照着爱尔兰香农机场的配方反复试验，终于在这里调出了北美第一杯爱尔兰咖啡，从此风靡全国。所以来这儿，招牌就是一杯爱尔兰咖啡，做法很有看头：吧台师傅一字排开十几只耐热玻璃杯，先放方糖、冲入热咖啡和爱尔兰威士忌搅匀，再用勺背贴着杯口把现打的厚奶油轻轻浮在最上层，一整排同时操作行云流水，本身就是一场表演。喝的时候不搅拌，让温热微苦带酒香的咖啡穿过顶上那层冰凉绵密的奶油入口，层次刚刚好，6 月雾季傍晚海风一吹，捧着这么一杯下肚，从喉咙暖到胃里，是再贴切不过的体验。放进你们第一天的动线里，它简直是为这一刻准备的：从九曲花街顺坡走下来就到 Hyde 街缆车终点，旁边就是它，进去点杯爱尔兰咖啡歇歇脚、暖暖身，再继续往渔人码头走。店里是老派酒馆的样子，木色调、人声鼎沸，常常满座，尤其傍晚和周末更挤，可能要在吧台边站着等位，但流转挺快，等一会儿就有。这里不是讲究安静的咖啡馆，而是热闹亲切的老地方，和陌生人挤在吧台边碰杯聊天也是乐趣的一部分。提醒一下，爱尔兰咖啡含威士忌，点的话会查证件，不喝酒也有普通咖啡和简餐；一杯爱尔兰咖啡价格约十几美元，招牌就喝这个，别的可不必多点。把它当成第一天傍晚的一个温暖停顿，喝完这杯，带着暖意走向海边收尾。","traps":["招牌就点爱尔兰咖啡，看吧台师傅一排杯子同时打奶油本身就是表演，别点别的浪费","喝的时候别搅拌，让热咖啡穿过顶上冰凉奶油入口才是正确喝法","傍晚和周末常满座，可能要在吧台边站着等，但流转快等一会就有","含威士忌会查证件带好，不喝酒的有普通咖啡和简餐","就在 Hyde 街缆车终点旁，从九曲花街走下来顺路，喝完接着走去渔人码头"],"info":[["人均","一杯爱尔兰咖啡约 12 至 15 美元"],["招牌","爱尔兰咖啡，全美第一杯诞生于此"],["是否订位","不接受订位，直接到吧台等位，流转快"],["营业","约每日上午至深夜，以现场为准"]]},"机械博物馆":{"intro":"机械博物馆 Musée Mécanique 是渔人码头一带最有意思也最容易被错过的宝藏，藏在 Pier 45 的一间大库房里，免费入场，里面塞满了三百多台从十九世纪末到二十世纪中叶的投币式古董游艺机，是全世界最大的私人收藏之一。这里不是那种隔着玻璃看的博物馆，而是几乎每一台机器都还能投币玩：你揣一把 quarter 进去，就能让会跳舞的西部小人动起来、让算命机吐出一张命运卡片、玩老式弹珠台和拳力测试机、看微缩的游乐场和马戏团模型转起灯来，还有那台标志性的、笑得有点瘆人的胖女人 Laffing Sal，投币后会发出魔性的大笑。从最古老的手摇活动西洋镜，到二十世纪中期的机械臂抓物、早期街机，一台台亲手玩下来，像穿越了一整部投币娱乐史，大人重温童年、小孩玩得不亦乐乎，真正老少咸宜。它的另一个好处是开到晚上八点，而且是室内，所以特别适合 6 月雾季傍晚海风又起的时候来避寒消磨一会儿。放进你们第一天的尾段刚刚好：从 The Buena Vista 喝完爱尔兰咖啡往码头走，先拐进这里玩一圈，再出来去看 Pier 39 的海狮、然后吃晚饭，室内室外冷暖交替，节奏很舒服。实用提示：虽然免费进门，但玩机器要投币，记得提前备好一些 quarter，门口和附近一般有换币机，但高峰期可能要排；每台机器投币额从几个 quarter 到一两美元不等，玩个十来台也就几美元，花得很值；场地不大但东西密，逛玩半小时到四十分钟正合适。这里没有讲解、没有路线，就是随便逛、随手玩，带着一种旧时游乐场的市井欢乐，是这趟行程里轻松又有惊喜的一站。","traps":["免费进门但玩机器要投币，提前备好一把 quarter，门口换币机高峰期会排队","开到晚 8 点又是室内，正好当傍晚海风起时的避寒消磨点","场地不大东西密，逛玩半小时到四十分钟足够，别误以为要很久","紧跟 Buena Vista 之后、去看海狮之前拐进来，室内外冷暖交替节奏舒服","每台投币几个 quarter 到一两美元，玩十来台才几美元，放开玩很值"],"info":[["门票","免费入场，玩机器自备 quarter 投币"],["建议时长","约 30 至 40 分钟"],["最佳时段","周五傍晚海风起时，室内避寒，开到晚 8 点"],["到达/交通","Pier 45，从 Buena Vista 步行可达，渔人码头核心区"]]},"渔人码头 · Pier 39":{"intro":"渔人码头 Fisherman's Wharf 是旧金山最热闹的滨海游客区，而 Pier 39 是其中最核心的一座栈桥，从一片旧码头改造成了商店、餐厅、街头表演和海景观景台集于一体的木栈道乐园。它最招牌、也最免费的明星是 K-Dock 浮码头上的那群加州海狮：自 1989 年地震后，成百上千头海狮莫名其妙地占领了这里的浮台，从此赖着不走，一年四季都能免费看，它们挤成一团晒太阳、互相推搡争地盘、吼叫翻滚、扑通跳水，憨态可掬又吵闹得可爱，看上半小时都不腻，是孩子和大人都喜欢的免费秀。除了海狮，栈桥上还有双层旋转木马、街头杂耍艺人、海湾全景视野，天气好时能远眺金门大桥、海湾大桥和恶魔岛 Alcatraz 的轮廓。整片渔人码头沿岸都能散步，海风咸咸的，海鸥盘旋，叫卖声此起彼伏，虽然商业化、游客多，但那份热闹本身就是体验的一部分。放进你们第一天的收尾段：从机械博物馆出来沿码头走过来看海狮、逛逛栈桥、看看海景，正好接着在这儿吃晚饭收官，海边的夜色和灯火给第一天画个圆满句号。吃的方面，码头上著名的有 Boudin Bakery 的酸面包蛤蜊浓汤，把汤盛在挖空的圆面包里，是旧金山的招牌小吃，值得尝一份；不过要提醒，渔人码头一带的餐厅普遍偏贵、偏游客向，正经吃饭性价比不如 Mission 或唐人街，所以你们把第一天的正式晚餐订在了 Crab House 这种点对了，其余小吃点到为止即可。几点实用提示：这里是扒手和兜售活跃的区域，顾好随身物品，街头要钱的表演者拍照后可能伸手讨小费，心里有数；6 月傍晚海边格外冷且风大，外套帽子围巾全用得上；假日周末人尤其多，逛的时候随大流别赶。把它当成轻松的滨海漫步加免费动物秀，看够海狮、吹够海风，就去赴蟹宴。","traps":["看 K-Dock 海狮全程免费，别被附近收费观景或表演忽悠掏钱","码头餐厅普遍贵且游客向，正餐已订 Crab House 是对的，其余只点 Boudin 酸面包蛤蜊汤等小吃尝鲜","扒手和兜售活跃，顾好随身物品，街头表演拍照后可能讨小费，心里有数","6 月傍晚海边格外冷风大，外套帽子围巾全戴上","假日周末人极多，随大流慢慢逛别赶，看够海狮吹够风就去吃晚饭"],"info":[["门票","免费，看海狮和逛栈桥不收费"],["建议时长","约 45 分钟至 1 小时"],["最佳时段","周五傍晚，接机械博物馆后，看海狮加海景再吃晚饭"],["到达/交通","Pier 39，Powell-Hyde 缆车终点步行可达"]]},"Crab House 晚餐":{"intro":"Crab House at Pier 39 是你们第一天压轴的正式晚餐，一家开在渔人码头 Pier 39 二层、专做螃蟹的老牌海鲜餐厅，坐拥海湾景的位置，窗外就是停泊的渔船和远处的海湾大桥。它的招牌是那道整只蒜香烤蟹 whole roasted crab，用秘制的大量蒜蓉黄油裹住一整只邓杰内斯蟹 Dungeness crab 下烤箱，端上来时蒜香扑鼻、蟹壳焦香、肉质饱满多汁，配着蒜油和面包，是很多人专程为它而来的一道菜，点它基本不会错。除了招牌烤蟹，这里的蒜香大虾、蛤蜊、生蚝、海鲜意面和各式现捞海鲜也都不错，适合两个人点一只蟹加一两样配菜分着吃，边吃边看海。把它放在第一天傍晚的终点很合适：看完 Pier 39 的海狮、吹够海风，正好就近上楼坐下，用一顿热腾腾的蟹宴给奔波的第一天收尾，从机场到 SFMOMA 再到缆车一路下来，这顿饭吃得踏实又有仪式感。最关键的一条提醒：这家店周五晚上非常满，尤其碰上 Juneteenth 假日周末，务必提前订位，用 OpenTable 或直接打电话订，订一个靠窗能看海的位子更好；不订位的话现场等位可能很久，白白耗掉看海狮和散步的好时光。价格上，邓杰内斯蟹按时价算，一只整蟹加配菜两人吃下来人均大约五六十美元甚至更多，属于这趟的一次小奢侈，但来都来了、又是招牌，值得。几个小贴士：吃整蟹会弄脏手，店家会给围兜和工具，放开吃别拘谨；蟹是按只或按磅卖的，点单前问清份量和时价免得超预算；海鲜讲究新鲜，趁热吃口感最好。把这顿当成第一天的犒赏，蒜香烤蟹配海景夜色，旧金山的滨海风情就齐活了。","traps":["周五晚很满又逢假日周末，务必提前用 OpenTable 或电话订位，订靠窗看海的位子","招牌整只蒜香烤蟹必点，两人一只蟹加一两样配菜分着吃刚好","邓杰内斯蟹按时价或按磅卖，点单前问清份量和价格免得超预算","吃整蟹弄脏手很正常，店家给围兜和工具，放开吃别拘谨","就在 Pier 39 二层，看完海狮顺势上楼，别跑远，趁热吃海鲜口感最好"],"info":[["人均","约 50 至 70 美元，蟹按时价"],["招牌","整只蒜香烤蟹 whole roasted crab"],["是否订位","务必提前订，OpenTable 或电话，周五晚很满"],["营业","约每日午餐至晚间，以现场为准"]]},"金门大桥":{"intro":"金门大桥 Golden Gate Bridge 是旧金山乃至整个美国最具标志性的地标，一座横跨金门海峡、连接旧金山与北边马林郡的橙红色巨型悬索桥，1937 年建成时是世界上最长的悬索桥，那抹被称为国际橙的独特颜色，既在灰蓝的海天间醒目，又能在常年雾气里被看见。站在桥下或桥上，看那两座高耸的桥塔和钢索撑起近三公里的桥身，海风呼啸、海面渔船穿行，那种工程的壮美和自然的辽阔扑面而来，是亲眼看了才懂为什么它是无数电影和明信片的主角。拍它的经典机位有讲究：最出片的是桥北端马林一侧的 Battery Spencer，这是个废弃的海岸炮台高地，免费、不用预约，从这里居高临下能把整座桥连同身后的旧金山城市天际线一起框进画面，几乎是金门大桥最经典的构图；南岸这边则有 Welcome Center 游客中心、Fort Point 桥脚仰视点等多个角度。放进你们第二天上午很合适，但有一条必须提前有心理准备：6 月的清晨，海雾常常把整座桥吞掉，只露出红色桥塔尖在云海上若隐若现，虽然这种雾中金门别有一种仙气，但想拍清楚整桥，得等上午雾散、通常临近中午放晴时最稳，所以这一站别太早赶，看天气灵活安排。交通上强烈建议直接打 Uber 或 Lyft 去，因为桥边停车位极少又难找，假日周末更是一位难求，打车直接送到机位省心太多；去 Battery Spencer 要过桥到马林那侧，导航设好点位即可。其他提示：桥上和高地风极大、体感很冷，务必穿防风外套、戴帽子，围巾别让风刮跑；桥很长，若想步行上桥走一段感受一下，来回要留足时间和体力，光看和拍照则二三十分钟到一小时按兴趣定；海峡风大，拿稳手机和帽子。把这一站当成第二天的震撼开场，橙红巨桥配海雾city，旧金山最经典的一眼就在这里。","traps":["6 月清晨常起雾把桥吃掉，想拍清楚整桥别太早，等上午雾散近中午放晴最稳","直接打 Uber 或 Lyft 去，桥边停车极少又难，假日周末一位难求，别自驾找车位","最经典机位是桥北马林侧的 Battery Spencer，免费不用预约，居高临下框整桥加城市天际线","桥上和高地风极大体感冷，防风外套帽子围巾全戴上，拿稳手机别被风刮跑","想步行上桥走一段要留足时间体力，只看和拍照二三十分钟到一小时即可"],"info":[["门票","免费，行人观景不收费，机动车过桥南向收费"],["建议时长","约 30 分钟至 1 小时，看拍照还是步行而定"],["最佳时段","周六上午雾散后近中午放晴时最易拍清楚"],["到达/交通","打车前往，经典机位 Battery Spencer 在马林一侧，导航设点"]]},"Warming Hut":{"intro":"Warming Hut 是金门大桥脚下一处温馨的小据点，坐落在 Crissy Field 海滨绿地最西端、靠近 Fort Point 的位置，是国家公园管理处下属的一间小咖啡馆兼书店礼品屋。它本身不是什么宏大景点，妙在地理位置和那份恰到好处的暖意：这里几乎就在金门大桥的正下方一侧，推门进去是热咖啡、热可可、简单的三明治和点心，还卖些环保主题的书籍、明信片和有设计感的小纪念品，买杯热饮捧在手里，出门沿着海湾步道往大桥方向走一走，头顶就是那座橙红巨桥的钢索和桥身，脚下是拍着礁石的海浪，视角和氛围都很特别。它的名字直译就是取暖小屋，放在 6 月旧金山的雾季语境里再贴切不过：金门大桥这一带是全城最冷、海风最猛的地方，清晨和上午又常常湿冷起雾，这时候有这么一个能进去暖手、喝口热的的小店，简直是雪中送炭。放进你们第二天上午的动线刚刚好：在 Battery Spencer 或南岸拍完金门大桥后，过来这边买杯热饮，沿着 Crissy Field 的海边步道散散步、从桥脚的角度再看几眼大桥和海湾，把上午的金门大桥这一段从容收尾，然后再前往金门公园里的加州科学馆吃午饭。Crissy Field 这片绿地本身也很舒服，本地人遛狗、跑步、放风筝，草坪连着沙滩，能远眺对岸和恶魔岛，适合慢慢走一段。实用提示：这里同样风大体感冷，热饮和外套都用得上；停车位有限，建议延续打车的安排或就近停；小店和步道二三十分钟到四十分钟足矣，重点是那种桥下海边喝热饮散步的惬意，不必久留；营业时间一般是白天，具体以现场为准。把它当成金门大桥的温柔续集：看够了宏大的桥，再用一杯热可可和一段海边漫步，把这段记忆焐热。","traps":["金门大桥脚下风大体感冷，正好进来买杯热饮暖手，外套别脱","紧接金门大桥拍照后过来，沿 Crissy Field 海边步道从桥脚再看几眼大桥，从容收尾","小店加散步二三十分钟到四十分钟足够，重点是惬意不必久留","停车位有限，延续打车安排或就近停，别为找车位耗时间","营业一般是白天，具体以现场为准，去之前可留意时间别扑空"],"info":[["门票","免费，咖啡饮品和纪念品另付费"],["建议时长","约 30 至 40 分钟，含海边步道"],["最佳时段","周六上午看完金门大桥后顺势前来"],["到达/交通","Crissy Field 西端近 Fort Point，建议打车或就近停车"]]},"加州科学馆":{"intro":"加州科学馆 California Academy of Sciences 是金门公园里一座四合一的超级自然博物馆，把雨林、水族馆、天文馆和活体植物屋顶集于一栋绿色建筑之中，是全世界少有的同时拥有这四样的自然科学中心，室内一整套逛下来内容极其丰富，无论大人小孩都能玩上大半天。核心看点首先是那座四层楼高的玻璃球形雨林穹顶，走进去湿热扑面，蝴蝶在身边飞、鸟在头顶叫，沿螺旋坡道一路向上穿过亚马逊、马达加斯加等不同生态层；穹顶之下连着水族馆，有色彩斑斓的珊瑚礁缸、会发光的水母、企鹅、还能伸手触摸的潮间带触摸池；另一侧是天文馆 Morrison Planetarium，在巨大的半球幕下躺着看一场关于宇宙的沉浸影片，是很多人最难忘的一项；此外还有经典的非洲厅标本、白化短吻鳄、地震模拟屋等等。建筑顶上那片波浪起伏、种满本地植物的活体绿色屋顶也很有名，体现了它的环保设计理念。把它放进你们第二天的中段非常聪明：6 月旧金山雾季，中午前后若海边湿冷起雾，正好钻进这座室内场馆避寒，而且馆内就有餐厅可以解决午饭，不用为吃饭折返，一站把午间时光安排得满满当当又舒舒服服。逛法上建议进门先看好天文馆的场次时间，因为它要排队定时入场，先把这一项的时间卡住，再穿插去逛雨林和水族馆，避免错过。门票不便宜，约四十九到五十五美元一位，暑期和假日周末是旺季价会更贵，务必以官网 calacademy.org 为准，提前网上购票还能选时段、避开现场排队。开放时间一般是周一到周六上午九点半到下午五点，最后入场约四点，周日时间可能不同，你们周六来正合适。其他提示：馆内冷气足而外头雾天也凉，薄外套穿着；赶上假日周末人多，雨林穹顶和天文馆都可能排队，有点耐心、错峰逛；带小孩的话触摸池和企鹅区一定别错过。把它当成第二天充实的室内核心，看完雨林海洋星空，再带着满足出门去逛唱片行。","traps":["进门先查天文馆场次时间并尽早占位，它定时入场要排队，别逛到最后才发现错过","门票约 49 到 55 美元，暑期假日旺季更贵，提前在 calacademy.org 网购选时段、避现场排队","午饭直接在馆内餐厅解决，不用折返，把雾天的中午全安排在室内","馆内冷气足、雾天也凉，薄外套穿着；假日周末雨林和天文馆排队，错峰逛","带小孩别错过触摸池和企鹅区，周六开放约 9:30 到 17:00 末次入场约 16:00"],"info":[["门票","约 49 至 55 美元一位，旺季更贵，以 calacademy.org 为准"],["建议时长","约 2.5 至 3 小时，含午饭"],["最佳时段","周六中午，雾天避寒兼解决午饭"],["到达/交通","金门公园内，de Young 美术馆正对面，打车或公交前往"]]},"Amoeba Music":{"intro":"Amoeba Music 是 Haight Street 上一家巨型独立唱片行，常被乐迷称作世界上最大的独立唱片店之一，门面就开在传奇的 Haight-Ashbury 嬉皮街区里，免费进，是音乐爱好者来旧金山几乎必逛的一站。一推门进去，豁然开朗的大空间里一排排货架望不到头，黑胶唱片、CD、卡带、DVD、蓝光、音乐周边和海报应有尽有，从摇滚、爵士、嘻哈、电子到古典、世界音乐、原声带分门别类，新品和二手混陈，尤其二手黑胶区是淘宝的乐园，运气好能挖到绝版好货或便宜到几美元的宝贝。这里不只是卖货，更像一座音乐的活博物馆和社区据点：墙上贴满演出海报和签名，常有乐队来店里办小型现场演出和签售，店员个个是行家，随便聊两句就能给你推荐；那种在实体店里一张张翻唱片、读封套、戴上试听耳机的体验，是流媒体时代越来越稀罕的乐趣。把它放进你们第二天下午很顺：从金门公园的加州科学馆出来，Haight 街就在公园东边不远，过来逛唱片行，顺便就把 Haight-Ashbury 这片上世纪六十年代嬉皮文化发源地的老街区一起逛了。这一带街上满是复古二手服装店、个性小店、涂鸦和街头气息，曾是 1967 年爱之夏和迷幻摇滚的中心，Grateful Dead 等乐队都在附近住过，如今依旧保留着不羁随性的氛围，边走边看很有味道。逛法上，不爱唱片的也能进去感受那个氛围、买张海报或明信片当纪念；爱音乐的则可以多留点时间慢慢淘，但别一头扎进去忘了时间，毕竟下午还有彩绘女士和多洛雷斯公园要赶。实用提示：买黑胶要扛回家注意行李，这趟是坐火车回，别买太重太多；二手区淘货凭眼缘和运气，看清碟面成色；店里和街区都比较随性，顾好随身物品即可；6 月午后这边相对没那么冷，但风衣还是带着。把它当成第二天下午轻松又有腔调的一站，在一墙墙唱片和嬉皮街景里，感受旧金山的另一种文化底色。","traps":["不爱唱片也能进去感受氛围、买张海报明信片当纪念，免费进不亏","爱淘的别一头扎进去忘了时间，下午还有彩绘女士和多洛雷斯公园要赶","买黑胶要扛着且这趟坐火车回，别买太重太多，二手碟看清碟面成色","顺便逛 Haight-Ashbury 嬉皮老街区，复古二手店和涂鸦街景很有味道","街区随性顾好随身物品，6 月午后这边没那么冷但风衣带着"],"info":[["门票","免费进店"],["建议时长","约 45 分钟至 1 小时，含逛 Haight 街区"],["最佳时段","周六下午，接加州科学馆之后"],["到达/交通","Haight St 1855 号，金门公园东侧不远，打车或步行"]]},"彩绘女士 Painted Ladies":{"intro":"彩绘女士 Painted Ladies 是旧金山最上镜的免费拍照点之一，指的是 Alamo Square 公园东侧那一排紧挨着的维多利亚式与爱德华式排屋，六七栋外墙漆成柔和的彩色、屋檐窗框描着精致线脚，一字排开，像一排穿着粉彩裙装的淑女，这也是彩绘女士这个名字的由来。它们之所以家喻户晓，很大程度因为是美剧 Full House 全家福片头里那排房子的取景地，无数人专程为这个画面而来。真正让这个点封神的是构图：从西边斜坡上的 Alamo Square 公园草坪望过去，前景是这排古典彩色排屋，而它们身后正好框着旧金山现代都市的摩天天际线，一新一旧、一矮一高同框，把这座城市的历史与现在浓缩在一个画面里，被称为旧金山最经典的明信片视角。放进你们第二天下午很顺路：从 Haight 街的 Amoeba 出来往东不远就是 Alamo Square，过来在公园草坪上找好角度拍这排房子加天际线，顺便在公园里坐坐。这座公园本身就在一个小山丘上，绿草如茵，本地人遛狗、野餐、晒太阳，登高还能眺望四周街区，氛围悠闲。逛法很简单：重点是走到公园西侧偏高的草坡上，从那里取彩绘女士加远处天际线的经典构图，光线上午后到黄昏前都不错，天气好时蓝天彩屋格外清爽。拍照加在公园歇脚，二三十分钟足矣。实用提示：这是热门打卡点，常有游客和拍照的人，想要干净画面要稍微等空档或换角度；那排房子都是私人住宅，只能在公园和人行道这侧远观拍照，别去敲门或闯入院子；公园是斜坡草地，坐下野餐很舒服但要注意别弄脏衣物；6 月午后到傍晚海风又会转凉，外套备着。把它当成第二天下午一个轻松愉快的拍照停顿，在草坡上对着那排彩色房子和城市天际线按下快门，旧金山的经典一景就收进相机了。","traps":["走到公园西侧偏高的草坡上取景，才能拍到彩绘女士加远处天际线的经典构图","热门打卡点人多，想要干净画面稍等空档或换角度，有点耐心","那排房子是私人住宅，只能在公园和人行道远观拍照，别闯院子敲门","公园斜坡草地坐着野餐舒服，但注意别弄脏衣物，6 月午后转凉外套备着","从 Amoeba 出来往东不远即到，拍照加歇脚二三十分钟足够"],"info":[["门票","免费，公园开放"],["建议时长","约 20 至 30 分钟"],["最佳时段","周六午后到黄昏前，光线和天色俱佳"],["到达/交通","Alamo Square 公园东侧，Amoeba 步行或短打车可达"]]},"多洛雷斯公园":{"intro":"多洛雷斯公园 Dolores Park 是旧金山 Mission 区一片极受欢迎的网红草坪公园，坐落在一面朝东的缓坡上，被本地人称为全城最好的晒太阳和野餐去处，尤其一到周末天气好的午后到傍晚，整片草坡上密密麻麻坐满了人，铺着野餐垫、带着零食饮料、晒太阳聊天弹琴，气氛松弛又热烈，是感受旧金山本地生活方式最生动的一个窗口。它的地理优势得天独厚：公园在 Mission 这一侧地势较高的坡上，从草坪望出去，前景是棕榈树和起伏的绿坡，远处正对着旧金山的城市天际线，黄昏时分夕阳把高楼染成金色，坡上的人群剪影、城市轮廓和暖色的天空叠在一起，是非常治愈的旧金山黄昏画面。而且这里所在的 Mission 区是全城最少雾、最暖和、最常晒得到太阳的区域之一，即便别处灰冷起雾，这边往往还是阳光明媚，所以特别适合放在傍晚来收尾。把它安排在你们第二天傍晚的压轴很对路：逛完彩绘女士后来到 Mission，在 Dolores Park 的草坡上找块地坐下，看本地人野餐的热闹、等一场城市天际线的黄昏，把忙碌的第二天慢下来、软着陆，然后就近在 Mission 一带吃晚饭。玩法很简单，就是入乡随俗：买点饮料零食，在草坡上挑个朝向城市天际线的位置坐下，慢慢消磨这段黄昏时光，看人、看城、看夕阳；公园里常有遛狗的、玩飞盘的、卖小吃的，氛围很市井。实用提示：周末傍晚人非常多，想要好位置稍微早点来；公园基本是开放草坡，带张垫子坐着更舒服，自备的零食饮料随手买；离开时把垃圾带走，做个体面的游客；虽说 Mission 暖，但日落后还是会转凉，外套带着；这一带入夜后某些路段人杂，顾好随身物品、结伴走。Mission 同时是全城有名的美食一条街，墨西哥卷饼、面包房、各国小馆云集，正好接着吃晚餐。把这一站当成第二天温柔的句号：坐在草坡上，看着旧金山的天际线一点点亮起灯，这座城市最惬意的一面就在眼前。","traps":["周末傍晚人非常多，想要朝向城市天际线的好位置稍微早点来占","带张野餐垫坐着更舒服，零食饮料随手在 Mission 买，离开把垃圾带走","Mission 是全城最暖最少雾的区，但日落后仍转凉，外套带着","入夜后这一带某些路段人杂，顾好随身物品、结伴走","坐看黄昏天际线软着陆后，就近在 Mission 美食街吃晚餐，衔接顺畅"],"info":[["门票","免费，公园开放"],["建议时长","约 45 分钟至 1 小时，看黄昏"],["最佳时段","周六傍晚到日落，本地人野餐最热闹、天际线染金"],["到达/交通","Mission 区，彩绘女士后前往，近 Mission 美食街"]]},"Mission 晚餐":{"intro":"Mission 晚餐指的是你们第二天压轴在 Mission 区吃的这顿饭，而 Mission 本身就是旧金山公认的美食心脏和性价比之王。这片以拉丁裔社区为根基的街区，街上满是色彩斑斓的壁画、独立小店和各国餐馆，既有地道便宜的墨西哥小馆，也有米其林认可的名店和文艺面包房，论好吃又划算，这里完胜渔人码头和 Union Square 那些游客向餐厅，所以把第二天的晚餐放在 Mission 是非常明智的安排。具体吃什么，几家招牌可以挑：想吃地道墨西哥味，首推 La Taqueria，在 Mission St 2889 号，招牌是它的 Super Burrito，特别之处是不加米饭、全是满满的肉和豆与配料，曾被评为全美最佳卷饼之一，得过米其林必比登推荐，人均大约十五到十八美元，现金优先、常排队但值得；想吃面包甜点，Tartine Bakery 在 Guerrero St 600 号，乡村酸面包和可颂是招牌，下午四点出炉的面包尤其抢手，人均大约八到十五美元；此外 Mission 还有无数 taqueria、披萨、冰淇淋和各国小馆可以随兴挑。放进你们第二天的收尾刚刚好：在 Dolores Park 看完黄昏，就近走进 Mission 街区找一家坐下，用一顿热乎又地道的晚餐给一整天的金门大桥、科学馆、唱片行和彩绘女士画上句号，吃得饱足又不心疼钱包。逛吃 Mission 本身也是体验，边走边看壁画和街头气息，饿了拐进哪家都不太会踩雷。实用提示：像 La Taqueria 这类人气店现金优先、可能排队，假日周末更甚，要么早点去、要么错峰，排队也是这边的常态心里有数；想省心也可以提前看好一家、用地图导航直接去；两个人可以一人一份招牌再分享，别点太多；Mission 暖和但入夜转凉，外套带着，某些路段入夜人杂，顾好随身物品、结伴走。把这顿当成全程性价比最高的一餐：在旧金山最有烟火气的街区里，吃一份地道卷饼或热腾腾的当地美食，实在又满足。","traps":["首推 La Taqueria 的无米 Super Burrito，米其林必比登推荐，人均约 15 到 18 美元，现金优先","La Taqueria 等人气店常排队、假日周末更甚，早点去或错峰，排队是常态","想吃面包甜点去 Tartine，下午 4 点出炉的面包最抢手，人均约 8 到 15 美元","两人一人一份招牌再分享即可，别点太多；比码头和 Union Square 划算太多","Mission 入夜转凉外套带着，某些路段人杂顾好随身物品、结伴走"],"info":[["人均","约 15 至 20 美元，墨西哥小馆为主"],["招牌","La Taqueria 无米 Super Burrito、Tartine 酸面包可颂"],["是否订位","小馆多不订位、现金优先、排队常见，想省心提前选好一家"],["营业","约午间至晚间，以各店为准"]]},"Emeryville/Oakland 上车":{"intro":"这一站是你们第三天返程的起点，也是最需要提前搞清楚的环节，因为旧金山市区其实没有火车站，海岸星光号 Coast Starlight 这趟长途列车并不从旧金山市中心发车，而是在湾区对岸的两个站之一上车：Emeryville 站 EMY 或 Oakland Jack London Square 站 OKJ，具体是哪个、几点发车，完全以你们手上那张车票印的为准，务必按票走、别想当然坐错站。好在 Amtrak 为旧金山旅客提供免费的接驳大巴 Thruway Bus，从旧金山市中心的 Salesforce Transit Center 把你们送到上车的火车站，这趟接驳是和火车票绑定的，看清票上接驳大巴的发车地点和时间，关键一条是要提前到达 Salesforce Transit Center，建议比大巴发车时间早到约三十分钟，留出找站台、上车和缓冲的余地，假日周末和早高峰路上更要留足时间。从酒店去 Salesforce Transit Center 打车或用公交都方便，这个中心本身是个现代化的大型交通枢纽，里面有候车区、洗手间和简单餐饮，可以提前买点路上吃的。流程上理清楚就不慌：第三天上午从酒店退房、带好全部行李，提前赶到 Salesforce Transit Center，按票坐上 Amtrak 接驳大巴，大巴会跨过海湾大桥把你们送到 EMY 或 OKJ，在那里再凭同一张票换乘海岸星光号正式登车南下。两个上车站环境都比较简单朴素，不是大型车站，Emeryville 站小而安静，Jack London Square 站则在奥克兰一处临水的休闲区附近，周边有些餐饮，但你们时间是卡着火车走的，以顺利赶上车为第一要务，别在站点多逗留。实用提示：长途火车那天最怕赶时间出意外，务必预留充裕缓冲，行李提前收好、证件车票放在手边好拿；Amtrak 接驳大巴和火车都按票上的时间走，错过不等人；上车前在 Salesforce Transit Center 或站点附近备好零食、三明治和水，因为火车上餐车又贵又一般，自备最划算；湾区上午也可能阴凉，外套穿着。把这一段当成一次需要按部就班执行的交通衔接：看清票、早到、按票换乘，顺顺利利把人和行李送上那趟看海的火车，后面就是一路向南的风景了。","traps":["旧金山市区没火车站，务必按车票印的站 EMY 或 OKJ 走，别想当然坐错站","Amtrak 免费接驳大巴从 Salesforce Transit Center 发车，比发车时间早到约 30 分钟","第三天上午退房带齐全部行李，证件车票放手边好拿，接驳大巴和火车错过不等人","上车前在 Salesforce Transit Center 备好零食三明治和水，车上餐车又贵又一般","湾区上午阴凉外套穿着，假日周末路上多留时间，别卡点出门"],"info":[["上车站","EMY 或 OKJ，以车票为准"],["接驳","Amtrak 免费 Thruway Bus 从 Salesforce Transit Center 送至上车站"],["到达建议","比大巴发车早到约 30 分钟，留足缓冲"],["自备","零食、三明治、水，车上餐车贵且一般"]]},"海岸星光号 · 坐右侧":{"intro":"海岸星光号 Coast Starlight 是 Amtrak 旗下最著名的长途观光列车之一，常年被评为全美最美的火车线路，你们这趟就是搭它从湾区一路向南回洛杉矶，与其说是赶路，不如说是一段贴着加州海岸线展开的风景旅程，把返程本身变成了行程的高潮。最核心的一条经验是务必坐在火车的右侧、也就是靠西的一边，因为从湾区南下时，辽阔的太平洋始终在列车的右手边，最精华的海岸段里火车几乎是贴着海崖和沙滩开的，坐右侧才能把无遮挡的大海尽收眼底，坐左侧就只能看内陆山丘了。这条线最美的一段大致在下午，约从下午三点四十到傍晚七点二十之间，经过中部 San Luis Obispo 到 Santa Barbara 一带，这里铁轨直接铺在太平洋边的悬崖与海滩上，公路都未必到得了，只有火车能这样贴海慢行，夕阳西下时金光洒满海面、海浪拍岸、偶尔还能看见冲浪者和海岸礁石，是全程最不容错过的精华，这段时间一定守在窗边或观景车厢里。说到观景车厢 Sightseer Lounge，这是海岸星光号的一大亮点：整节车厢两侧和顶部都是大幅弧形玻璃窗，座椅朝向窗外，视野开阔，看海的最佳位置就在这里，精华海岸段到来前可以提前过去占个好位子。车上还有餐车 Dining Car 和咖啡简餐，但要提醒餐车价格偏贵、味道一般，所以强烈建议自备零食、三明治和水上车，边吃边看海，又省钱又自在。全程从湾区到洛杉矶 Union Station 大约十一小时，通常上午从湾区发车、傍晚约九点抵达洛杉矶，具体以你们车票为准。还有一条非常重要的提醒：长途火车经常晚点一到三小时是常态，所以到了洛杉矶之后回尔湾别把时间卡得太紧，要留足缓冲。到洛杉矶 Union Station 后，你们需要换乘 Pacific Surfliner 或 Metrolink 通勤线继续南下到 Irvine 尔湾站，车程约五十分钟，先看清你们的车票里是否已经含了这段接驳，如果没含就现场或提前买一张 Surfliner 的票；Union Station 是个宏伟漂亮的老车站，换乘时留意站内指示牌找对站台。其他实用提示：车上空调可能偏凉，外套和一条薄毯或大围巾能让长途坐得更舒服；提前给手机充满电、带好充电宝，看海拍照很费电；座位虽宽敞，长途久坐也记得起来走动走动、去观景车厢换换风景；把最美的下午海岸段留在心里、守在右侧窗边，这趟回程就值回票价了。一句话，坐对位置、备好干粮、守住下午那段贴海风光，海岸星光号会用一整条加州海岸线为你们的旧金山之行收尾。","traps":["务必坐火车右侧靠西，南下太平洋在右手边，坐左侧只能看内陆山丘","最美海岸段约下午 3 点 40 到傍晚 7 点 20，经 San Luis Obispo 到 Santa Barbara，守在窗边别错过","观景车厢 Sightseer Lounge 大玻璃窗看海最佳，精华段前提前去占位","自备零食三明治和水，车上餐车又贵又一般，边吃边看海最划算","长途火车常晚点 1 到 3 小时，到洛杉矶回尔湾别卡太紧；先确认车票是否含 Surfliner 或 Metrolink 到 Irvine 的接驳，没含就买 Surfliner"],"info":[["坐哪侧","务必右侧靠西，太平洋在右手边"],["最美时段","约下午 3:40 至傍晚 7:20，San Luis Obispo 至 Santa Barbara 贴海段"],["全程时长","湾区到洛杉矶约 11 小时，约上午发车傍晚约 9 点到，以车票为准"],["到 LA 后","Union Station 换 Pacific Surfliner 或 Metrolink 到 Irvine 约 50 分钟，确认车票是否已含"],["自备","零食三明治水、充电宝、薄外套，车上空调凉"]]},"洛杉矶换乘":{"intro":"洛杉矶换乘是你们这趟旅程的最后一环，指的是海岸星光号抵达洛杉矶 Union Station 之后，再换乘通勤火车继续南下回到尔湾 Irvine 的衔接过程。先说目的地车站本身：洛杉矶联合车站 Los Angeles Union Station 是美国西部最大、也最漂亮的火车站之一，1939 年建成，融合了西班牙殖民复兴和装饰艺术风格，高敞的候车大厅、皮质长椅、彩绘地砖和棕榈庭院都极具年代感和气派，即便只是路过换乘，也值得抬头看看这座老车站的美。换乘的逻辑很清楚：海岸星光号通常傍晚约九点抵达 Union Station，你们要在这里转乘 Pacific Surfliner 或 Metrolink 通勤线继续到 Irvine 尔湾站，车程约五十分钟。最关键的两件事，一是提前确认你们手上的车票里是否已经包含了从洛杉矶到 Irvine 这一段接驳，如果车票已含就直接按票换乘，如果没含，就需要在洛杉矶现场或提前在 Amtrak 官网买一张 Pacific Surfliner 到 Irvine 的票，Surfliner 班次相对多一些；二是务必留足缓冲时间，因为海岸星光号这类长途火车晚点一到三小时是常态，万一火车晚点导致错过原定的接驳班次，要有心理准备改乘下一班，所以千万别把回尔湾的时间卡死，更别在当晚安排紧接着的其他要紧事。在 Union Station 内换乘时，跟着站内的指示牌走，留意 Departures 出发屏幕上 Pacific Surfliner 或 Metrolink 往南去 Irvine 或 Oceanside 方向班次的发车时间和站台号，找对站台候车；车站很大，预留点找路和走动的时间，扛着行李别太赶。实用提示：到洛杉矶时已是晚上，旅途一整天会累，下车后先喝口水、确认好下一班车的时间和站台再从容前往，别慌；车站内有洗手间、便利店和简餐，可以补给一下；如果实在错过末班接驳或时间太晚不便，也可以从 Union Station 直接打车或叫网约车回尔湾，但车程较远费用不低，作为兜底方案心里有个数；尔湾 Irvine 站下车后再衔接回家的最后一程。把这一站当成需要保持清醒和耐心的收尾交通：确认车票、看准班次站台、留足缓冲、累也别慌，顺利换上南下的通勤车，这趟旧金山往返就圆满到家了。","traps":["提前确认车票是否已含洛杉矶到 Irvine 这段，没含就买 Pacific Surfliner 到 Irvine 的票","海岸星光号常晚点 1 到 3 小时，别把回尔湾时间卡死，做好改乘下一班的准备","在 Union Station 看 Departures 屏幕找往南去 Irvine 或 Oceanside 方向班次的发车时间和站台","到 LA 已是晚上又累，下车先确认下一班车时间站台再从容走，车站大别太赶","万一错过末班接驳或太晚，可从 Union Station 打车回尔湾兜底，但车程远费用不低"],"info":[["换乘地点","Los Angeles Union Station"],["换乘什么","Pacific Surfliner 或 Metrolink 到 Irvine，约 50 分钟"],["关键确认","车票是否已含这段接驳，没含就买 Surfliner"],["缓冲","火车常晚点 1 到 3 小时，时间别卡死，备好改乘下一班"]]}},"yos":{"尔湾出发":{"intro":"这一天的核心只有一句话：早。7月3日是独立日长周末的第一天，从尔湾到优胜美地南门约315英里，正常车程5.5到6小时，但7月4日周末是全年最堵的时段，I-5和CA-99沿线、尤其南门Wawona入口前会排起长龙，下午进谷往往要多耗一两个小时。建议清晨5点到6点之间就从尔湾出门，最迟别拖过6点半，争取上午就把大段高速跑完，赶在中午前后抵达南门，把抢车位、堵车这些变量都甩在身后。路线很直白：尔湾上I-5一路向北，转CA-99继续北上，途经贝克斯菲尔德、弗雷斯诺，再接CA-41北上直奔南门，过了Wawona隧道就是经典的Tunnel View，再往下盘就进了山谷。出发前一晚务必把油箱加满，因为园内没有加油站（只有Tioga西边Crane Flat一处且偏贵），CA-99沿线的弗雷斯诺是最后一段方便又便宜的加油带，进山前在Oakhurst再补一次最稳妥。同样关键的是补给：园内餐饮选择少、排队久，强烈建议在Oakhurst的Vons或Walmart把这几天的野餐、饮用水、零食、水果一次买齐，每人至少备足2升以上的水，盛夏山谷又干又热，水永远不嫌多。门票方面2026全年不需预约，只要在Recreation.gov上买好数字票，约35美元一辆车管7天，若一年内还打算去别的国家公园，80美元的年票更划算，出发前就买好截图存到手机，因为园内几乎没有信号。也正因为没信号，离线地图是这趟最重要的准备之一，把Google地图的优胜美地区域、各步道轨迹提前下载好，再随手存一份纸质园区图。最后别忘了出发前查一眼nps.gov的实时路况，盛夏7到9月偶有山火造成烟霾或临时封路，确认无碍再上路。把车装得井井有条、把吃喝水油备足、把票和地图都离线化，这一天就成功了大半，剩下的就是握紧方向盘，迎着清晨的车流往北开。","traps":["清晨5到6点出发，最迟别过6点半，独立日周末晚出发等于在高速和南门口白白多堵一两小时","进山前在弗雷斯诺或Oakhurst把油箱加满，园内无加油站，Crane Flat那处又贵又绕","门票提前在Recreation.gov买好并截图，园内无信号无法现场操作","离线地图和纸质园区图必备，进园后手机基本失联","每人备足2升以上饮用水加防晒，路上和山谷都晒得厉害"],"info":[["门票/费用","约35美元一辆车（7天），或80美元年票；Recreation.gov数字票"],["建议时长","纯车程约5.5到6小时，长周末算上堵车留出7到8小时"],["最佳时段","清晨5到6点出发，争取中午前到南门"],["到达/交通","I-5 N转CA-99 N经弗雷斯诺，再接CA-41 N到南门Wawona"]]},"南门进 · Mariposa Grove":{"intro":"进了南门，第一站就交给Mariposa Grove这片巨杉林，这是优胜美地最壮观的红杉聚落，500多棵巨型红杉里，那棵名叫灰熊巨人（Grizzly Giant）的老树估计已活了约2700年，树干粗到几个人手拉手都抱不过来，仰头望去，阳光被层层针叶筛成细碎的光斑落在林间小径上。盛夏来这里有个天然的好处：高大的红杉撑起浓密树荫，林子里比晒得发烫的山谷凉快得多，午后从南门进园先钻进这片绿荫，正好避开一天里最毒的日头。旺季林区不让私家车直接开进核心区，得把车停在南门附近的Mariposa Grove Welcome Plaza，再换乘免费班车（shuttle）进林子，班车夏季班次密、循环发车，跟着指示走就行。林子里步道平缓好走，从靠下的Big Trees Loop到能看到灰熊巨人和加州隧道树（California Tunnel Tree）的环线，强度都不大，慢慢逛、拍拍照、在巨树下乘个凉，停留两到三个小时刚刚好，体力好、时间够还能往上走到Grizzly Giant Loop甚至更高的观景点。这里没有惊险的攀爬，全是安安静静地与古树相处的氛围，适合刚开了大半天车、需要伸展放松的两个人，把脚步放慢，听听风穿过红杉冠层的声音。要留意的是7月4日长周末人多，班车和停车场都会排队，建议进园后先直奔这里别耽搁，越往午后人越密、班车越挤。林间步道虽在树荫下，紫外线仍不弱，帽子、防晒别省，水也要带够，因为林区里补给点有限。逛完巨杉林，时间通常正好往傍晚走，接着就可以顺势开去Tunnel View蹲守日落，把抵达日的第一天收得圆满。这片千年红杉是5月或淡季也能看、但盛夏树荫格外解暑的所在，作为踏入公园的第一眼，足够让人对接下来的几天充满期待。","traps":["旺季私家车不能进核心区，把车停Welcome Plaza换乘免费班车进林","独立日周末班车和停车场都排队，进园后尽早直奔这里别拖到午后","树荫下也要防晒戴帽，林区补给点少、水带够","步道平缓但有上坡选项，按体力选环线，别勉强走到最高点","傍晚逛完正好接Tunnel View看日落，规划好衔接时间"],"info":[["门票/费用","含在公园门票内，班车免费"],["建议时长","约2到3小时"],["最佳时段","午后进园避山谷酷热，林中树荫凉爽"],["到达/交通","南门旁Welcome Plaza停车，换乘免费shuttle进林"]]},"Tunnel View":{"intro":"Tunnel View几乎是优胜美地的封面照本照，从CA-41穿过Wawona隧道驶出的那一刻，整座山谷毫无预兆地在眼前铺开：左边是垂直拔地三千英尺的El Capitan巨壁，右前方Bridalveil Fall像一条白练挂在崖壁上，正中远处则是标志性的Half Dome圆顶剪影，三大主角同框，构图天成，不分季节都震撼。这个观景台不用徒步，开车直达，路边就是停车场，下车几步就到栏杆前，是全园门槛最低、回报却极高的机位。它最美的时刻在日出和日落：清晨第一缕光给El Capitan镶上金边，傍晚夕阳把整片岩壁和Half Dome染成暖橙到玫瑰金，光线一分钟一个样，值得提早到、慢慢等。把它放在抵达日（7月3日）逛完Mariposa Grove后的傍晚最顺，正好赶上日落的金光，也为第一天画上句点；7月初这一带日落大约在晚上8点20分前后，建议提前40分钟到一小时到，既能占到好位置，也能看着光线一点点变暖。盛夏这里游客极多，本就不大的停车场常常午后就满，傍晚更是一位难求，实在停不下就找路肩合规处快停快拍，但别为了停车把车横在路上挡了车流。站在栏杆前，建议先用肉眼把这片山谷的尺度记在心里，再举起相机，广角能收全景，长焦能把Half Dome单独拉近，若赶上薄云或雨后，山谷里飘起的雾气会让画面更有层次。傍晚山谷虽不像高山区那么凉，但日落后温度会往下走，看完日落天色转暗，盘山进谷的路弯多光线暗，开车要格外当心，慢一点、亮起车灯。Tunnel View不需要你付出多少体力，却几乎一定会成为这趟旅程印象最深的一帧，无论来过几次，每次从隧道里钻出来豁然开朗的瞬间，都还是会让人忍不住惊叹一声。","traps":["停车场不大且午后常满，傍晚尤其挤，停不下就路肩合规处快停快拍别挡道","日出日落金光最美，7月初日落约晚8点20分，提前40分到1小时占位","看完日落天黑后盘山进谷弯多光暗，放慢车速、开好车灯","广角收全景、长焦拉近Half Dome，雨后有雾画面更佳","放在抵达日傍晚最顺，衔接Mariposa Grove后正好赶日落"],"info":[["门票/费用","含在公园门票内"],["建议时长","约30分钟到1小时"],["最佳时段","日出或日落；7月初日落约晚8点20分"],["到达/交通","CA-41过Wawona隧道即到，路边停车场，开车直达"]]},"入住":{"intro":"抵达日的傍晚以入住收尾，住哪儿很大程度决定了这三天的节奏，主要分园内和门户小镇两类，各有取舍。园内住宿（travelyosemite.com）最大的好处是省去每天进出园门排队的时间，早上能更从容地抢瀑布和车位，选择有看瀑布的Yosemite Valley Lodge、平价帐篷屋Curry Village、历史悠久气派十足的The Ahwahnee，高山区夏季限定的Tuolumne Meadows Lodge或White Wolf若当季运营也可考虑；缺点是7月4日长周末极度抢手、多半早已订满且价偏高，对策是即便显示满房也每隔一两天回去刷一次，常有人取消放出候补。门户小镇是园内订不到时的Plan B，但周末同样会满、要尽早下手：Oakhurst在南门CA-41沿线、连锁酒店多（Fairfield、Hampton约每晚160到220美元），从尔湾经CA-41北上时顺路，也方便采买补给；El Portal离山谷最近，河边的Yosemite View Lodge约每晚180到250美元；Groveland在CA-120西侧、靠近Tioga西入口，第三天上高山区会更方便；Mariposa性价比高，约每晚140到180美元。无论住哪，熊箱存食规定都要牢记：园内有黑熊、夏季更活跃，违规存食最高罚约5000美元，凡是有气味的东西——食物、饮料、空瓶、防晒、香皂、垃圾——白天放在车外都必须存进停车场或营地的熊箱，白天可暂存车内但要收进后备厢、车窗外看不见，夜间车里绝不能留任何食物；若住在门户镇，食物在园外旅馆室内正常处理即可，无需熊箱。门户镇信号普遍很差，记得提前把预订确认和离线地图都存好。抵达日的傍晚通常是这样的画面：看完Tunnel View的日落，带着一身被夕阳烘暖的惬意开到住处办入住，把车上有气味的东西按规定收好或存进熊箱，简单吃点在Oakhurst采买的东西或到附近小馆解决晚饭，洗去一天车程的疲惫，再把第二天清晨走Mist Trail的衣物、水、防滑鞋、防水袋提前备在门口，定好五点多的闹钟，早早休息——因为明天要赶在7点前出门抢瀑布，今晚睡好就是最好的准备。","traps":["园内住宿7月4日周末多已订满，满房也每隔1到2天回刷候补、常有取消放出","门户镇周末同样会满，尽早订；Oakhurst顺路又便于采买，El Portal离山谷最近","园内停车，凡有气味之物白天须存熊箱，夜间车内绝不留食物，违规最高罚约5000美元","门户镇信号差，预订确认和离线地图务必提前存好","入住当晚就把次日清晨Mist Trail的装备备在门口、定好五点多闹钟"],"info":[["费用区间","园内约1400到2200美元/全程，门户镇约900到1500美元；周末偏高"],["园内选择","Valley Lodge、Curry Village、The Ahwahnee；高山区Tuolumne Lodge夏季限定"],["门户镇选择","Oakhurst约160到220、El Portal约180到250、Mariposa约140到180美元/晚"],["存食规定","园内须用熊箱，夜间车内不留食物；门户镇室内处理即可"]]},"Mist Trail（趁早）":{"intro":"Mist Trail是优胜美地公认最棒的一条徒步线，名字里的Mist（水雾）名副其实——沿Merced河逆流而上，一路被Vernal Fall和Nevada Fall掀起的水雾扑面而来，盛夏走在湿凉的水汽里，本身就是一种解暑的享受。它最大的优点是7月初水量依旧充沛：这条线的汇水流域大，即便到了瀑布普遍减小的7月，Vernal和Nevada依然奔流不息，溅起的水雾足以把人打湿，是全园湿身感最强、回报最直接的步道。走法上，先到Vernal Fall顶往返约3英里、爬升约1000英尺，台阶多且常年被水雾打湿、湿滑陡峭，是体力和专注力的考验；若意犹未尽，可续走到Nevada Fall，全程约5.4英里、爬升更多，需要更好的脚力。强烈建议在早上7点前就从山谷出发上山，这是这条线的灵魂所在：一来盛夏正午的山谷又干又热，台阶路毫无遮荫，越晚越晒越难熬；二来这是全园最热门的步道，独立日周末更是人潮汹涌，停车场7到8点就满，早出发既避热又避人，还能在水雾里独享一段相对清静的清晨。把它安排在7月4日当天的上午最合适，趁早出门抢车位、趁凉爽爬瀑布，午后再撤回山谷去Merced河滩泡水避暑，一动一静、一上一下，正好把最热的中午躲过去。装备上，防滑徒步鞋几乎是必需，台阶湿滑普通运动鞋容易打滑；手机最好套防水袋，再带一件一次性雨披或速干外套，过水雾段时能挡一挡；水每人至少1到2升，能量补给随身带。沿途信号基本没有，务必提前下载离线地图。返程下台阶时膝盖压力大、石面又滑，宁可慢一点、扶好栏杆，别在湿滑的台阶上逞快。走完这一趟，被水雾打湿又被山风吹干，看着脚下奔涌的瀑布和远处的山谷，会真切体会到为什么大家都说，没走Mist Trail就不算真正来过优胜美地。","traps":["早上7点前从山谷出发，停车场7到8点就满，晚了既没车位又顶着烈日爬无遮荫的台阶","台阶常年被水雾打湿、湿滑陡峭，穿防滑徒步鞋，下山扶栏慢行别逞快","手机套防水袋、带一次性雨披或速干外套，过水雾段会被打湿","7月初水量仍充沛、湿身感强，量力而行，Vernal顶往返约3英里、Nevada约5.4英里","沿途无信号，提前下载离线地图；每人带足1到2升水和补给"],"info":[["门票/费用","含在公园门票内"],["建议时长","到Vernal顶约2到3小时，续走Nevada约4到6小时"],["最佳时段","早上7点前出发，避热避人潮"],["到达/交通","山谷Happy Isles附近起步，停车早满，建议早到或坐Valley Shuttle"]]},"Merced 河滩泡水":{"intro":"如果说清晨的Mist Trail是这趟旅程里最酣畅的一动，那么午后在Merced河滩泡水就是最惬意的一静，也是7月限定的爽点。当山谷气温飙到30到34度、晒得人发昏时，Merced河那些水流平缓的河滩——比如Sentinel Beach、Cathedral Beach等——就成了天然的消暑泳池，清凉的雪山融水从指间淌过，躺在浅滩或套个泳圈漂在水面，抬头是El Capitan和山谷峭壁，这正是本地人盛夏最爱的玩法。这里不需要门票、不需要徒步，开车或坐Valley Shuttle到河滩附近，铺开野餐垫就能就地享受半个下午。最舒服的安排是把它接在上午Mist Trail之后：早上趁凉爬完瀑布，正午最热时来河边泡水降温、顺便把在Oakhurst采买的三明治、水果、饮料摊开来一场河滩野餐，吃饱了下水凉快、晒会儿太阳再下水，慵懒地把一天里最毒的日头泡过去。带泳衣是标配，速干毛巾、水鞋也别忘——河床多是大小不一的石头，光脚容易硌脚或打滑，水鞋能让你在河里走得更稳更舒服。安全上要有数：Merced河看着平缓，但部分河段暗流和水下落差不可小觑，融雪水更是冰凉，下水请选明显平缓、水浅、有人玩的河滩，别往湍急处或瀑布上下游靠近，不会游泳或带小孩务必格外当心，量力而行、不逞强。防晒在水边尤其要紧，水面反光会让人晒得更狠，防晒霜要补、宽檐帽和墨镜戴上，泡水间隙找棵树乘个凉。野餐时记得熊箱规定：食物要在伸手可及的范围内看管好，离开时一切有气味的东西都要收走或存进熊箱，别给黑熊可乘之机。河滩信号同样很弱，把要拍的、要发的攒着回门户镇再处理。在哗哗水声和山风里漂一个下午，等暑气稍退，再起身去Glacier Point看日落，正是7月优胜美地最舒服的一天该有的节奏。","traps":["选明显平缓水浅、有人玩的河滩下水，避开湍急处和瀑布上下游，融雪水冰凉、暗流不可小觑","穿水鞋下水，河床多碎石易硌脚打滑；带泳衣和速干毛巾","水边反光晒得更狠，勤补防晒、戴宽檐帽墨镜，间隙到树荫乘凉","野餐食物要伸手可及看管好，离开收走或存熊箱，别招来黑熊","正午最热时来泡水最爽，接在上午Mist Trail之后、傍晚再去Glacier Point"],"info":[["门票/费用","含在公园门票内，免费"],["建议时长","约2到3小时，泡一个慵懒的下午"],["最佳时段","正午到午后最热时段，下水最解暑"],["到达/交通","Sentinel Beach、Cathedral Beach等，开车或坐Valley Shuttle到河滩附近"]]},"Glacier Point":{"intro":"Glacier Point是优胜美地俯瞰视角的天花板，海拔约7214英尺，难得的是开车就能直达，不用徒步。站上观景台，整座优胜美地山谷在脚下徐徐展开，正对面的Half Dome近得仿佛触手可及，远处Vernal和Nevada两道瀑布像银线垂挂，山谷、峭壁、瀑布、远山一览无余，是全园最豪华的全景之一。它2026已经开放（每年约5月初开放），这意味着这趟7月的行程能稳稳把它收进来。这里最该看的是日落：当夕阳西斜，Half Dome的花岗岩壁会被染成暖橙再转玫瑰红，整个山谷的光影层层变化，是全园最震撼的视角之一，许多人专程为这一刻而来。把它安排在7月4日泡完Merced河滩之后的傍晚最顺：白天的酷热已被河水泡退，傍晚开车盘山而上，海拔高、山上明显比山谷凉，吹着凉风等一场日落，再惬意不过。需要提醒的是山上没有饮用水供应，但有厕所，记得自带足量的水；7月初日落大约在晚上8点20分前后，建议提前一小时上山，一来从山谷开上来盘山路要时间，二来日落热门时段停车位紧张，早到才好从容占位。山上日落后气温会明显下降，务必带一件抓绒或轻外套，看完日落往往天已擦黑，下山的盘山路弯多、光线暗，开车要慢、车灯开足，注意对向来车。带上相机，长焦能把染红的Half Dome单独拉近，广角能收下整片燃烧的山谷；若时间和体力允许，附近还有通往Sentinel Dome或Taft Point的短途步道，能换个角度看落日，但要算好返程在天黑透前安全下撤。这里不需要你流多少汗，却能把一天的精华浓缩在最后这一抹金红里——清晨在瀑布水雾里湿身、正午在Merced河里泡水、傍晚在Glacier Point看Half Dome染红，正是7月优胜美地一天该有的完美收束。","traps":["山上无饮用水，自带足量水；有厕所","7月初日落约晚8点20分，提前1小时上山，盘山路费时且日落时车位紧张","山上日落后明显转凉，带抓绒或轻外套","看完日落天黑，下山盘山路弯多光暗，慢行、开足车灯、留意对向车","接在午后Merced泡水之后的傍晚最顺，长焦拍染红的Half Dome"],"info":[["门票/费用","含在公园门票内"],["建议时长","约1.5到2小时（含等日落）"],["最佳时段","傍晚日落；7月初约晚8点20分"],["到达/交通","Glacier Point Road开车直达，2026已开放，山谷盘山上来约1小时"]]},"Tioga Road 上高山":{"intro":"Tioga Road（CA-120）是横穿优胜美地东西的高山公路，也是这趟7月行程里最该专门留一天的避暑精华。它海拔高、沿途风景与山谷截然不同，气温比闷热的山谷凉一大截，正好用来躲开盛夏的酷热和人潮。这条路2026已全开（每年通常5月中旬前后视积雪开放），这意味着7月来能完整地把高山区玩透——这是5月或更早根本来不了、唯有夏天才有的福利。开上Tioga Road，景色一段段变换：花岗岩穹丘、高山针叶林、开阔草甸和碧蓝湖泊次第出现，沿途有Olmsted Point这样的观景点，能远眺Half Dome的背面和被冰川打磨得圆润光滑的巨石阵，随手一停都是大片。需要明确的是，去高山区（Tuolumne一带）得自己开车上Tioga Road，山谷的免费shuttle并不到这里，夏季虽有YARTS公交班次可选，但自驾最灵活、最能随走随停。把它安排在7月5日、也就是行程里可能最热的那天最聪明：当山谷热得待不住，索性整天往高处跑，沿途在Tenaya Lake戏水、在Tuolumne Meadows草甸漫步，把避暑和观光一举两得。出发前务必把油加满，园内没有加油站，只有Tioga西边Crane Flat一处且偏贵，跑这条长线最好满油上路。高山区紫外线很强，海拔高更要防晒，帽子、墨镜、防晒霜备齐；但早晚和阴处又偏凉，记得带一件轻外套随时加减。这条路全程几乎没有信号，离线地图必不可少，行车里程长、加油点稀少，规划好时间别让自己在前不着村后不着店时油表见底。盛夏的高山公路是优胜美地的另一副面孔——没有山谷的燥热与拥挤，取而代之的是清冽的空气、湛蓝的湖水和辽阔的草甸，开着车在云杉与花岗岩之间穿行，时不时停下来深吸一口凉爽的山风，这一天会成为整趟旅程里最放松、最辽阔的记忆。","traps":["上山前务必加满油，园内仅Crane Flat一处加油且贵，长线最怕半路油表见底","全程几乎无信号，离线地图必备，规划好里程和时间","高山紫外线强、海拔高要防晒，早晚阴处又凉，带轻外套随时加减","高山区山谷shuttle不到，需自驾上Tioga Road，夏季也有YARTS可选","把它放在行程最热那天整天上高山避暑，沿途Olmsted Point等观景点别错过"],"info":[["门票/费用","含在公园门票内"],["建议时长","建议专门安排一整天"],["最佳时段","行程里最热的一天上山避暑，白天游玩、傍晚返程"],["到达/交通","自驾CA-120/Tioga Road，2026已全开；园内仅Crane Flat加油"]]},"Tenaya Lake 戏水":{"intro":"Tenaya Lake是Tioga Road沿线最上镜的一颗高山明珠，一汪碧蓝的湖水静静卧在花岗岩穹丘和针叶林的环抱里，海拔高、水色清透，公路就从湖边经过，开车随到随停，是上高山区这一天里最值得停下脚步的地方。盛夏来这里有双重的好：一是海拔高、天气凉爽，躲开了山谷的酷热；二是湖水虽是雪山融水、偏凉，但在夏天泡一泡格外清爽痛快，岸边还有大片浅滩和沙地，可以下水戏水、可以沿岸散步、也可以铺开垫子来一场湖畔野餐。把它安排在7月5日上Tioga Road的途中最顺，从山谷一路开上来，先在湖边停下舒展一下，下水凉快凉快，再继续往Tuolumne Meadows去，动静结合，节奏正好。湖水清澈见底却也实实在在地冰凉，下水前先用脚试试水温，循序渐进别猛地扎进去，选岸边平缓水浅、看得见底的区域戏水最稳妥，不会游泳或体力一般就在浅滩泡泡、玩玩水即可，别贸然往湖心游。高山的太阳毒，加上水面和浅色沙岸的反光，晒伤来得比想象中快，防晒霜要厚涂勤补、宽檐帽和墨镜戴好，泡水间隙到岸边树荫下歇歇。带上泳衣、速干毛巾和水鞋，湖底和岸边多是石块和粗砂，水鞋能护脚防滑、走得更自在。这里和山谷一样几乎没有信号，把美景拍够，等回到有信号处再分享。同样别忘高山区蚊子多，尤其清晨傍晚和草木茂盛处，驱蚊液随身带、上湖区前先喷一层。坐在凉爽的湖边，看阳光在碧蓝水面上碎成万点金光，远处穹丘倒映水中，把脚伸进沁凉的湖水里，盛夏的燥热瞬间被涤荡一空——这正是7月优胜美地高山区独有、也最让人留恋的清凉时刻。","traps":["湖水是雪山融水、很凉，下水前先试水温、循序渐进，选浅滩平缓处别游往湖心","高山日照强、水面和沙岸反光，防晒厚涂勤补，戴宽檐帽墨镜，间隙到树荫歇","穿水鞋下水，湖底岸边多石块粗砂，护脚又防滑","高山区蚊子多，驱蚊液随身、上湖区前先喷一层","几乎无信号，安排在上Tioga途中、去Tuolumne之前停留最顺"],"info":[["门票/费用","含在公园门票内，免费"],["建议时长","约1到2小时"],["最佳时段","上高山区这天的白天，午间泡水最清爽"],["到达/交通","Tioga Road/CA-120湖边经过，开车随到随停"]]},"Tuolumne Meadows":{"intro":"Tuolumne Meadows是Tioga Road高山区的核心，一片开阔辽远的亚高山草甸铺展在海拔约8600英尺的高处，Tuolumne河蜿蜒穿过，四周环绕着圆润的花岗岩穹丘，是Sierra高山风光最经典的画面之一。这里的氛围和闷热拥挤的山谷完全两样：空气清冽，天高云阔，草甸上点缀着夏日野花，凉爽得让人想深呼吸，是盛夏7月避暑的首选目的地。把它作为7月5日上高山区这一天的压轴最合适——上午在Tenaya Lake戏过水，午后来这片草甸走走逛逛，傍晚再启程返回山谷或门户镇。这里的步道大多轻松平缓，很适合刚泡完湖、想悠闲走走的两个人：可以爬一小段登上Lembert Dome，居高俯瞰整片草甸和蜿蜒的河流；也可以沿平路散步到Soda Springs，那里有天然冒泡的含气泉水，是一段轻松有趣的短途；若只想纯粹放空，找一片河边草地坐下来，看河水静静流淌、看光影在穹丘上移动，也是极好的享受。需要留意的是高山草甸7月蚊子相当多，尤其在水边、草木茂盛处和清晨傍晚时分，驱蚊液一定要带、提前喷好，长袖薄衣也能挡一挡。海拔高、紫外线强，防晒和帽子别省；昼夜温差大，傍晚草甸会转凉，备一件轻外套随时加。这一带和整条Tioga Road一样几乎没有手机信号，离线地图务必备好，也意味着这里格外清静，正好把屏幕收起来，专心和这片高山草甸相处。返程要算好时间，从Tuolumne沿Tioga Road开回山谷路程不近、盘山弯多，最好在天黑前把大段山路开完，注意行车安全。作为整趟行程的高山收尾，Tuolumne Meadows给的是一种辽阔而宁静的满足——没有山谷的喧嚣与燥热，只有凉风、草甸、清流与远山，让人在离开优胜美地前，把这份高处的清凉与开阔，稳稳地记在心里。","traps":["高山草甸7月蚊子很多，水边和清晨傍晚尤甚，驱蚊液提前喷好、穿长袖薄衣","海拔约8600英尺、紫外线强，防晒戴帽；傍晚转凉带轻外套","步道平缓，Lembert Dome有小段爬升、Soda Springs为平路短途，按体力选","几乎无信号，离线地图必备，正好收起手机专心看景","返程沿Tioga盘山回山谷路远弯多，算好时间在天黑前开完大段山路"],"info":[["门票/费用","含在公园门票内"],["建议时长","约2到3小时"],["最佳时段","上高山区这天的午后到傍晚，凉爽避暑"],["到达/交通","自驾Tioga Road/CA-120，山谷shuttle不到"]]}}};

  if(geo&&geo.days&&window.L){t.itinerary.forEach((d,di)=>{const pts=geo.days[di];const el=document.getElementById('map_'+t.id+'_'+di);if(!pts||!el)return;
    try{const m=L.map(el,{scrollWheelZoom:false});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(m);
      const ll=pts.map(p=>[p[0],p[1]]);
      pts.forEach((p,k)=>L.marker([p[0],p[1]],{icon:L.divIcon({className:'',html:'<div class="lnum">'+(k+1)+'</div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(m).bindPopup((k+1)+'. '+p[2]));
      if(ll.length>1){L.polyline(ll,{color:'#0e7490',weight:3,opacity:.85}).addTo(m);m.fitBounds(ll,{padding:[30,30]});}else{m.setView(ll[0],14);}
      setTimeout(()=>m.invalidateSize(),80);
    }catch(e){}});}
  loadWeather(t);
  const ib=document.getElementById('icsbtn');if(ib)ib.onclick=()=>downloadICS(t);
}
function loadWeather(t){
  const g=GEO[t.id],live=document.getElementById('wxlive');if(!g||!live)return;
  const [la,lo]=g.coord;
  const url='https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=auto&forecast_days=7';
  const fill=d=>{try{
    const c=d.current,[ce,ct]=WMO(c.weather_code),f=Math.round(c.temperature_2m),cc=Math.round((f-32)/1.8);
    live.innerHTML='<span class="now">'+ce+'</span><div style="flex:1"><div class="tnow">'+f+'°F <small style="font-size:12px;color:var(--muted);font-weight:600">/ '+cc+'°C</small></div><div class="wmeta">'+ct+' · '+esc(t.name)+' 实时</div></div>';
    const dy=d.daily;if(dy&&dy.time){let fr='<div class="wxf">';for(let i=0;i<dy.time.length;i++){const de=WMO(dy.weather_code[i])[0],hi=Math.round(dy.temperature_2m_max[i]),lo2=Math.round(dy.temperature_2m_min[i]),wd=['周日','周一','周二','周三','周四','周五','周六'][new Date(dy.time[i]+'T00:00:00').getDay()];fr+='<div class="d"><div class="wd">'+(i===0?'今天':wd)+'</div><div class="we">'+de+'</div><div class="wt">'+hi+'°<small>/'+lo2+'°</small></div></div>';}fr+='</div>';live.insertAdjacentHTML('afterend',fr);}
  }catch(e){}};
  if(WXCACHE[t.id]&&WXCACHE[t.id].daily){fill(WXCACHE[t.id]);return;}
  fetch(url).then(r=>r.json()).then(d=>{WXCACHE[t.id]=d;fill(d);}).catch(()=>{live.innerHTML='<span class="now">🌦️</span><div><div class="tnow" style="font-size:14px">实时天气暂时加载不出</div><div class="wmeta">看下方季节预期</div></div>';});
}
function heroWeather(t){
  const g=GEO[t.id],el=document.getElementById('herowx');if(!g||!el)return;
  const put=d=>{try{const c=d.current,[e]=WMO(c.weather_code),f=Math.round(c.temperature_2m);el.textContent=' · '+e+' '+f+'°F';}catch(_){}};
  if(WXCACHE[t.id]){put(WXCACHE[t.id]);return;}
  const [la,lo]=g.coord;
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+la+'&longitude='+lo+'&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=auto').then(r=>r.json()).then(put).catch(()=>{});
}
function downloadICS(t){
  const d=t.start.replace(/-/g,'');const end=new Date(new Date(t.start+'T00:00:00').getTime()+t.days*864e5);const ed=end.getFullYear()+String(end.getMonth()+1).padStart(2,'0')+String(end.getDate()).padStart(2,'0');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ourtrip//cn','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:'+t.id+'@ourtrip','DTSTAMP:'+d+'T000000Z','DTSTART;VALUE=DATE:'+d,'DTEND;VALUE=DATE:'+ed,'SUMMARY:'+t.emoji+' '+t.name+' 出发','DESCRIPTION:行程 '+SITE+'#/t/'+t.id,'BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY','DESCRIPTION:一周后出发 '+t.name,'END:VALARM','BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:明天出发 '+t.name,'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download=t.id+'-'+t.name+'.ics';document.body.appendChild(a);a.click();a.remove();
}
function renderOverview(){
  setTabs('#/');bar.querySelector('h1').textContent='排期 & 季节';barsub.textContent='';showBack(true);
  let h='<div class="wrap fade"><div class="dhero"><div style="font-size:28px">🗺️</div><div class="dtitle">排期 & 季节逻辑</div></div>';
  h+=`<div class="note" style="margin-top:8px">${esc(OVERVIEW.principle)}</div>`;
  h+=`<a class="docbtn" href="${OVERVIEW.doc}" target="_blank" rel="noopener" style="margin-top:12px">📄 打开完整总览（Google 文档）</a>`;
  h+='<div class="block"><h3>🌦️ 为什么排在那个月</h3><div class="gcard">'+OVERVIEW.season.map(s=>`<div class="gli"><b>${esc(s[0])}</b><br>${esc(s[1])}</div>`).join('')+'</div></div>';
  h+='<div class="block"><h3>⏰ 预订时间线</h3><div class="gcard">'+OVERVIEW.booking.map(s=>`<div class="gli"><b>${esc(s[0])}</b><br>${esc(s[1])}</div>`).join('')+'</div></div>';
  h+='<div class="block"><h3>🚗 怎么去（自驾 vs 飞）</h3><div class="gcard">'+OVERVIEW.drive.map(s=>`<div class="mini"><span class="k">${esc(s[0])}</span><span class="v">${esc(s[1])}</span></div>`).join('')+'</div></div>';
  h+='<div class="foot">完整排期与季节解释见上方总览文档</div></div>';
  view.innerHTML=h;bindGo();
}
function renderGuide(){
  setTabs('#/guide');bar.querySelector('h1').textContent='通用攻略';barsub.textContent='';showBack(false);
  let h='<div class="wrap fade"><div class="dhero"><div style="font-size:28px">🧭</div><div class="dtitle">通用攻略</div><div style="color:var(--muted);font-size:13px;margin-top:2px">订机票 / 订房 / 租车 / 年票 / 打包 / 避坑 —— 所有行程通用</div></div>';
  h+=`<a class="docbtn" href="${GUIDE.doc}" target="_blank" rel="noopener" style="margin-top:12px">📄 打开完整通用攻略（Google 文档）</a>`;
  GUIDE.sections.forEach(sec=>{h+=`<div class="block"><h3>${sec.t}</h3><div class="gcard">`+sec.items.map(x=>`<div class="gli">${gi(x)}</div>`).join('')+'</div></div>';});
  const p=prog(PACK);
  h+=`<div class="block"><h3>🧳 通用打包清单 <span style="color:var(--muted);font-weight:600;font-size:13px">${p.done}/${p.total}</span></h3><div class="card" style="padding:4px 15px">`+chkHTML(PACK)+'</div></div>';
  h+='<div class="foot">勾选会记住（存在这台设备上）· 更细节看完整文档</div></div>';
  view.innerHTML=h;bindChk(renderGuide);
}
function renderLists(){
  setTabs('#/lists');bar.querySelector('h1').textContent='出发前清单';barsub.textContent='';showBack(false);
  let h='<div class="wrap fade">';
  const groups=[PACK,...[...TRIPS].sort((a,b)=>a.start.localeCompare(b.start)).filter(t=>t.checklist)];
  groups.forEach(o=>{const p=prog(o);
    h+=`<div class="lgrp"><div class="lh">${o.emoji} ${o.name} <span style="color:var(--muted);font-weight:600">${p.done}/${p.total}</span></div><div class="card" style="padding:4px 15px">`+chkHTML(o)+'</div></div>';});
  h+='<div class="foot">勾选会记住（存在这台设备上）</div></div>';view.innerHTML=h;bindChk(renderLists);
}
function fmt(s){const[y,m,d]=s.split('-');const w=['周日','周一','周二','周三','周四','周五','周六'][new Date(s+'T00:00:00').getDay()];return (+m)+'/'+(+d)+' '+w;}
function showBack(on){const ex=bar.querySelector('.back');if(on&&!ex){const b=document.createElement('button');b.className='back';b.innerHTML='‹ 返回';b.onclick=()=>history.length>1?history.back():location.hash='#/';bar.insertBefore(b,bar.firstChild);}if(!on&&ex)ex.remove();}
function setTabs(hash){document.querySelectorAll('.tabbar a').forEach(a=>a.classList.toggle('on',a.dataset.go===hash));}
document.querySelectorAll('.tabbar a').forEach(a=>a.onclick=()=>{const g=a.dataset.go;if(g==='__docs__')window.open(FOLDER,'_blank');else location.hash=g;});
function route(){const h=location.hash||'#/';if(h.startsWith('#/s/')){const p=h.slice(4).split('/');renderStop(p[0],+p[1],+p[2]);}else if(h.startsWith('#/t/'))renderTrip(h.slice(4));else if(h==='#/guide')renderGuide();else if(h==='#/overview')renderOverview();else if(h==='#/lists')renderLists();else renderHome();window.scrollTo(0,0);}
window.addEventListener('hashchange',route);route();
try{const mf={name:'我们的旅行',short_name:'我们的旅行',start_url:'.',display:'standalone',background_color:'#f4f5f3',theme_color:'#0e7490',icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#0e7490"/><text x="50%" y="54%" font-size="300" text-anchor="middle" dominant-baseline="middle">🧳</text></svg>'),sizes:'512x512',type:'image/svg+xml'}]};const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));document.head.appendChild(l);}catch(e){}
</script>
