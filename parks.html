<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1f2a">
<title>美国国家公园打卡图鉴</title>
<style>
:root{--bg:#0b1f2a;--bg2:#0e2a38;--card:#13313f;--ink:#eaf2f0;--muted:#8fb3b0;--gold:#e7c06a;--gold2:#caa24a;--foil:#9fb0b8;--line:#23495a;--ok:#5ec88a;--warn:#f0a35e;--bad:#ef6f6f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#11364a 0%,var(--bg) 60%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
body{min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 8px)}
a{color:var(--gold)}
.wrap{max-width:760px;margin:0 auto;padding:14px}
header.bar{display:flex;align-items:center;gap:10px;padding:10px 14px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(11,31,42,.96),rgba(11,31,42,.7));backdrop-filter:blur(8px)}
.back{font-size:14px;color:var(--muted);text-decoration:none;font-weight:700}
.htitle{font-weight:800;font-size:16px;letter-spacing:.5px}
.htitle small{display:block;font-weight:600;font-size:11px;color:var(--muted);letter-spacing:2px}
.spacer{flex:1}
.iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer}
.iconbtn.gold{border-color:var(--gold2);color:var(--gold)}
/* progress */
.prog{margin:6px 14px 2px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px}
.prow{display:flex;align-items:baseline;gap:8px}
.big{font-size:30px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums}
.of{font-size:14px;color:var(--muted);font-weight:700}
.tier{margin-left:auto;font-size:12px;font-weight:800;color:var(--ink);background:linear-gradient(180deg,var(--gold),var(--gold2));padding:4px 10px;border-radius:999px;color:#3a2a07}
.track{height:9px;background:#0c2531;border-radius:999px;margin-top:10px;overflow:hidden;border:1px solid var(--line)}
.fill{height:100%;width:0;background:linear-gradient(90deg,#5ec88a,#e7c06a);border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.sub{display:flex;gap:10px;flex-wrap:wrap;margin-top:9px;font-size:11px;color:var(--muted)}
.sub b{color:var(--ink)}
/* map */
.mapwrap{position:relative;margin:10px 14px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0d2734,#0b202c);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
svg#map{display:block;width:100%;height:auto;touch-action:manipulation}
.state{fill:#15333f;stroke:#27516240;stroke-width:.6;transition:fill .3s}
.dot-hit{cursor:pointer}
.foil{transition:opacity .5s,transform .5s}
.glow{filter:drop-shadow(0 0 5px rgba(231,192,106,.8))}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:8px 10px 12px;font-size:11px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:-1px}
.maperr{padding:18px;text-align:center;color:var(--muted);font-size:13px}
/* list fallback / region chips */
.regions{margin:4px 14px 0;display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.regions::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;white-space:nowrap}
.chip b{color:var(--gold)}
.chip.on{border-color:var(--gold2);color:var(--ink)}
/* sheet / detail */
.scrim{position:fixed;inset:0;background:rgba(3,12,17,.6);backdrop-filter:blur(3px);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:760px;margin:0 auto;background:linear-gradient(180deg,#16384a,#102a37);border:1px solid var(--line);border-bottom:0;border-radius:20px 20px 0 0;padding:16px 16px calc(18px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .32s cubic-bezier(.2,.8,.2,1);max-height:88dvh;overflow:auto}
.sheet.show{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:99px;background:#2b5566;margin:0 auto 12px}
.pk-top{display:flex;align-items:center;gap:10px}
.pk-emoji{font-size:30px}
.pk-h1{font-size:20px;font-weight:900;line-height:1.15}
.pk-en{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.4px}
.pill{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px;margin:2px 4px 0 0}
.pill.state{background:#0d2531;border:1px solid var(--line);color:var(--muted)}
.pill.yr{background:#0d2531;border:1px solid var(--line);color:var(--muted)}
.pill.done{background:rgba(94,200,138,.16);border:1px solid #2f6f4d;color:var(--ok)}
.pill.tamper{background:rgba(239,111,111,.16);border:1px solid #6f2f2f;color:var(--bad)}
.intro{margin:12px 0 4px;font-size:14px;line-height:1.65;color:#dbe9e6}
.hl{margin-top:8px;font-size:13px;color:var(--muted)}
.hl b{color:var(--gold)}
.stampbox{margin-top:16px}
.holdbtn{position:relative;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:900;color:#3a2a07;background:linear-gradient(180deg,var(--gold),var(--gold2));cursor:pointer;overflow:hidden;letter-spacing:1px;user-select:none;touch-action:none}
.holdbtn .lab{position:relative;z-index:2}
.holdbtn .prog2{position:absolute;inset:0;background:rgba(255,255,255,.35);width:0;z-index:1}
.holdbtn.danger{background:linear-gradient(180deg,#2a4350,#1d3340);color:var(--ink);border:1px solid var(--line)}
.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
.note-in{width:100%;margin-top:10px;background:#0d2531;border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px;font-size:14px;font-family:inherit}
.stamp-anim{position:fixed;z-index:60;left:50%;top:42%;transform:translate(-50%,-50%) scale(2.6) rotate(-16deg);opacity:0;pointer-events:none;font-weight:900;color:#e9533b;border:4px solid #e9533b;border-radius:12px;padding:8px 16px;font-size:26px;letter-spacing:2px;text-transform:uppercase;mix-blend-mode:screen}
.stamp-anim.go{animation:stamp .9s ease forwards}
@keyframes stamp{0%{opacity:0;transform:translate(-50%,-50%) scale(2.6) rotate(-16deg)}18%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-16deg)}72%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05) rotate(-16deg)}}
/* modal (passphrase/share/help) */
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(3,12,17,.66);backdrop-filter:blur(3px)}
.modal.show{display:flex}
.mcard{width:100%;max-width:440px;background:linear-gradient(180deg,#16384a,#102a37);border:1px solid var(--line);border-radius:18px;padding:18px}
.mcard h3{margin:0 0 6px;font-size:17px}
.mcard p{margin:6px 0;font-size:13px;color:var(--muted);line-height:1.6}
.inp{width:100%;margin-top:10px;background:#0d2531;border:1px solid var(--line);border-radius:11px;color:var(--ink);padding:12px;font-size:15px;font-family:inherit}
.mbtns{display:flex;gap:10px;margin-top:14px}
.mbtns button{flex:1;border-radius:11px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink)}
.mbtns .pri{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#3a2a07;border:none}
.share-out{width:100%;margin-top:10px;background:#0d2531;border:1px solid var(--line);border-radius:11px;color:var(--muted);padding:10px;font-size:11px;word-break:break-all;max-height:120px;overflow:auto}
.fp{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--gold);letter-spacing:1px}
.banner{margin:8px 14px 0;border-radius:12px;padding:10px 12px;font-size:12.5px;font-weight:700;display:none}
.banner.show{display:block}
.banner.ro{background:rgba(231,192,106,.12);border:1px solid var(--gold2);color:var(--gold)}
.banner.tamper{background:rgba(239,111,111,.12);border:1px solid #6f2f2f;color:var(--bad)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#0d2531;border:1px solid var(--line);color:var(--ink);padding:11px 16px;border-radius:12px;font-size:13px;font-weight:700;z-index:70;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{ text-align:center;color:#4f7480;font-size:11px;margin:18px 0 6px}
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="index.html">‹ 旅行</a>
  <div class="htitle">国家公园图鉴<small>U.S. NATIONAL PARKS</small></div>
  <div class="spacer"></div>
  <button class="iconbtn" id="btnShare">分享</button>
  <button class="iconbtn gold" id="btnLock">🔒</button>
</header>

<div id="banner" class="banner"></div>

<div class="prog">
  <div class="prow"><span class="big" id="cnt">0</span><span class="of">/ 63 座</span><span class="tier" id="tier">未启程</span></div>
  <div class="track"><div class="fill" id="fill"></div></div>
  <div class="sub"><span>已点亮 <b id="pct">0%</b></span><span>已走过的州 <b id="states">0</b></span><span id="latest"></span></div>
</div>

<div class="regions" id="regions"></div>

<div class="mapwrap">
  <div id="mapHost"></div>
  <div class="legend">
    <span><i style="background:var(--foil)"></i>未打卡（可刮开）</span>
    <span><i style="background:var(--gold)"></i>已打卡</span>
    <span><i style="background:var(--bad)"></i>签名异常</span>
  </div>
</div>

<div class="foot" id="foot"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<div class="modal" id="modal"><div class="mcard" id="mcard"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson-client/3.1.0/topojson-client.min.js"></script>
<script>
/* ===== 63 US National Parks ===== */
const PARKS=[
{id:'acadia',en:'Acadia',zh:'阿卡迪亚',st:'缅因 ME',yr:1919,lat:44.35,lng:-68.21,rg:'东北',em:'🌊',hl:'花岗岩海岸 + 凯迪拉克山日出',intro:'美国东海岸第一缕日出之地，花岗岩海岸、卵石滩与卡迪拉克山交织，秋色尤其惊艳。'},
{id:'arches',en:'Arches',zh:'拱门',st:'犹他 UT',yr:1971,lat:38.68,lng:-109.57,rg:'西南',em:'🪨',hl:'2000+ 天然石拱·精致拱门',intro:'地球上天然石拱最密集的地方，标志性的精致拱门（Delicate Arch）是犹他州的象征。'},
{id:'badlands',en:'Badlands',zh:'荒地',st:'南达科他 SD',yr:1978,lat:43.85,lng:-102.34,rg:'大平原',em:'⛰️',hl:'层叠土林 + 化石草原',intro:'层层叠叠的尖峰与峡谷如外星地貌，黄昏时分色彩斑斓，草原上常见野牛与大角羊。'},
{id:'bigbend',en:'Big Bend',zh:'大弯',st:'德州 TX',yr:1944,lat:29.25,lng:-103.25,rg:'西南',em:'🏜️',hl:'格兰德河峡谷 + 极暗星空',intro:'沿着格兰德河的大转弯，奇瓦瓦沙漠、奇索斯山与峡谷并存，是全美最佳观星地之一。'},
{id:'biscayne',en:'Biscayne',zh:'比斯坎',st:'佛州 FL',yr:1980,lat:25.49,lng:-80.21,rg:'东南',em:'🐠',hl:'95% 是水·珊瑚礁浮潜',intro:'95% 的面积都在水下，红树林、珊瑚礁和沉船遗迹，是浮潜与划船的天堂。'},
{id:'blackcanyon',en:'Black Canyon of the Gunnison',zh:'甘尼森黑峡谷',st:'科罗拉多 CO',yr:1999,lat:38.57,lng:-107.72,rg:'落基山',em:'🌑',hl:'狭深陡峭·阳光难入',intro:'峡谷又深又窄，部分谷底每天只有几十分钟阳光，垂直峭壁令人眩晕。'},
{id:'bryce',en:'Bryce Canyon',zh:'布莱斯峡谷',st:'犹他 UT',yr:1928,lat:37.57,lng:-112.18,rg:'西南',em:'🧡',hl:'红色岩柱林·日出圆剧场',intro:'成千上万根橙红色岩柱（hoodoo）组成天然圆剧场，日出时如燃烧的火焰。'},
{id:'canyonlands',en:'Canyonlands',zh:'峡谷地',st:'犹他 UT',yr:1964,lat:38.20,lng:-109.93,rg:'西南',em:'🏞️',hl:'科罗拉多河切出的迷宫',intro:'科罗拉多河与绿河切出的辽阔峡谷迷宫，天空之岛观景台一览苍茫大地。'},
{id:'capitolreef',en:'Capitol Reef',zh:'国会礁',st:'犹他 UT',yr:1971,lat:38.37,lng:-111.26,rg:'西南',em:'🍑',hl:'水褶皱 + 老果园',intro:'百英里长的地壳褶皱（Waterpocket Fold），还有先民留下的果园，可自摘水果。'},
{id:'carlsbad',en:'Carlsbad Caverns',zh:'卡尔斯巴德洞窟',st:'新墨西哥 NM',yr:1930,lat:32.17,lng:-104.44,rg:'西南',em:'🦇',hl:'巨型地下溶洞 + 蝙蝠群飞',intro:'深入地下的巨型石灰岩溶洞，夏夜数十万只蝙蝠倾巢而出的场面震撼。'},
{id:'channelislands',en:'Channel Islands',zh:'海峡群岛',st:'加州 CA',yr:1980,lat:34.01,lng:-119.42,rg:'加州',em:'🦭',hl:'加州的加拉帕戈斯',intro:'被称作"北美的加拉帕戈斯"，只能坐船前往，海蚀洞划皮划艇、看海狮成群。'},
{id:'congaree',en:'Congaree',zh:'康加里',st:'南卡 SC',yr:2003,lat:33.79,lng:-80.78,rg:'东南',em:'🌳',hl:'全美最高阔叶林·萤火虫',intro:'北美最大的古老原始硬木泛滥林，参天巨树间架着木栈道，初夏有同步闪烁的萤火虫。'},
{id:'craterlake',en:'Crater Lake',zh:'火山口湖',st:'俄勒冈 OR',yr:1902,lat:42.94,lng:-122.10,rg:'西北',em:'💙',hl:'全美最深湖·极致蓝',intro:'火山喷发后塌陷形成的全美最深湖泊，湖水蓝得不可思议，环湖公路风景绝佳。'},
{id:'cuyahoga',en:'Cuyahoga Valley',zh:'凯霍加谷',st:'俄亥俄 OH',yr:2000,lat:41.26,lng:-81.57,rg:'中西部',em:'🚂',hl:'瀑布 + 复古观光火车',intro:'城市边缘的绿洲，布兰迪韦恩瀑布、运河步道，还能坐复古蒸汽小火车穿行。'},
{id:'deathvalley',en:'Death Valley',zh:'死亡谷',st:'加州/内华达',yr:1994,lat:36.51,lng:-117.08,rg:'加州',em:'🔥',hl:'北美最低最热·盐田星空',intro:'北美海拔最低、最干最热之地，盐田、沙丘与彩色山丘并存，冬季是观星圣地。'},
{id:'denali',en:'Denali',zh:'德纳里',st:'阿拉斯加 AK',yr:1917,lat:63.33,lng:-150.50,rg:'阿拉斯加',em:'🏔️',hl:'北美最高峰 6190m·棕熊',intro:'北美最高峰所在，一条公路深入苔原荒野，灰熊、驼鹿、北美驯鹿出没。'},
{id:'drytortugas',en:'Dry Tortugas',zh:'干龟',st:'佛州 FL',yr:1992,lat:24.63,lng:-82.87,rg:'东南',em:'🏰',hl:'海中古堡·只能坐船/水上飞机',intro:'远在墨西哥湾、只能乘船或水上飞机抵达，巨大的杰斐逊堡与清澈海水中的珊瑚。'},
{id:'everglades',en:'Everglades',zh:'大沼泽',st:'佛州 FL',yr:1934,lat:25.32,lng:-80.93,rg:'东南',em:'🐊',hl:'美洲鳄 + 红树湿地',intro:'北美最大的亚热带湿地，"流动的草河"，鳄鱼、短吻鳄、涉禽与海牛的家园。'},
{id:'gatesarctic',en:'Gates of the Arctic',zh:'北极之门',st:'阿拉斯加 AK',yr:1980,lat:67.78,lng:-153.30,rg:'阿拉斯加',em:'🧊',hl:'全美访客最少·无路无径',intro:'完全在北极圈内，没有路、没有步道、没有手机信号，是真正的极致荒野。'},
{id:'gatewayarch',en:'Gateway Arch',zh:'圣路易斯拱门',st:'密苏里 MO',yr:2018,lat:38.62,lng:-90.19,rg:'中西部',em:'⛩️',hl:'192m 不锈钢大拱门',intro:'全美最小的国家公园，标志是 192 米高的不锈钢大拱门，可乘舱登顶俯瞰密西西比河。'},
{id:'glacier',en:'Glacier',zh:'冰川',st:'蒙大拿 MT',yr:1910,lat:48.70,lng:-113.72,rg:'落基山',em:'🏞️',hl:'向阳大道·冰蚀湖群',intro:'"通往太阳之路"穿越壮丽群山，冰蚀湖、雪峰与山羊，号称"大陆的皇冠"。'},
{id:'glacierbay',en:'Glacier Bay',zh:'冰川湾',st:'阿拉斯加 AK',yr:1980,lat:58.67,lng:-136.90,rg:'阿拉斯加',em:'🚢',hl:'潮水冰川崩塌·座头鲸',intro:'乘船驶入峡湾，看潮水冰川大块崩落入海，座头鲸、海獭、海豹随处可见。'},
{id:'grandcanyon',en:'Grand Canyon',zh:'大峡谷',st:'亚利桑那 AZ',yr:1919,lat:36.11,lng:-112.11,rg:'西南',em:'🌅',hl:'地球最壮观的峡谷',intro:'科罗拉多河历经数百万年切出的巨壑，层层岩壁记录着地球的历史，日落震撼人心。'},
{id:'grandteton',en:'Grand Teton',zh:'大提顿',st:'怀俄明 WY',yr:1929,lat:43.73,lng:-110.80,rg:'落基山',em:'🏔️',hl:'陡峭雪峰倒映湖中',intro:'提顿山脉拔地而起、没有缓坡，雪峰倒映在杰克逊湖与蛇河上，美得像明信片。'},
{id:'greatbasin',en:'Great Basin',zh:'大盆地',st:'内华达 NV',yr:1986,lat:38.98,lng:-114.30,rg:'西南',em:'🌲',hl:'千年狐尾松 + 极暗夜空',intro:'偏远而宁静，有世界最古老的狐尾松、地下溶洞和惊艳银河，游客稀少。'},
